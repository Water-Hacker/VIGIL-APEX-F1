# Regional values — Nord-Ouest (NW), capital Bamenda.
#
# Anglophone region; Crisis Group conflict context. Adapter set
# is conservative — sectoral feeds only, no payments-tier work
# until on-the-ground operating conditions stabilise.

region:
  code: "NW"
  name: "Nord-Ouest"
  capital: "Bamenda"
  signingKeyId: "NW:1"

federation:
  coreEndpoint: "vigil-federation.core.vigilapex.cm:9443"
  coreWireguardPubkey: "<<core-wireguard-pubkey-set-during-cutover>>"
  maxBacklog: 1000000
  retainHours: 168

adapters:
  enabled:
    - "mintp-public-works"
    - "minsante-health"
    - "minedub-basic-ed"
    - "minesec-secondary-ed"
    - "dgi-attestations"
    - "minepat-bip"
    - "minee-energy"

postgres:
  primaryHost: "postgres-primary.core.vigilapex.cm"
  primaryPort: 5432
  replicationUser: "vigil_replica"
  maxLagSeconds: 60

vault:
  subordinateCaUrl: "https://vault.core.vigilapex.cm/v1/pki-region-nw/ca"

multiSiteReplication:
  regionalNas:
    host: "nas-nw.regions.vigilapex.cm"
    rsyncModule: "vigil-region-nw"
    # Lower bandwidth ceiling — uplink contention in Bamenda.
    bandwidthLimitKbps: 25000  # 25 Mbps cap
  retentionDays: 90

networkPolicy:
  enabled: true
  coreCidr: "10.99.0.0/24"
