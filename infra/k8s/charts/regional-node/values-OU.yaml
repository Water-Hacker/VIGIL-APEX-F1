# Regional values — Ouest (OU), capital Bafoussam.
#
# Densely populated, important agricultural and tertiary-trade hub.
# Public-housing programs are active here, so minhdu-housing is
# enabled.

region:
  code: "OU"
  name: "Ouest"
  capital: "Bafoussam"
  signingKeyId: "OU:1"

federation:
  coreEndpoint: "vigil-federation.core.vigilapex.cm:9443"
  coreWireguardPubkey: "<<core-wireguard-pubkey-set-during-cutover>>"
  maxBacklog: 1000000
  retainHours: 168

adapters:
  enabled:
    - "mintp-public-works"
    - "minsante-health"
    - "minedub-basic-ed"
    - "minesec-secondary-ed"
    - "dgi-attestations"
    - "minepat-bip"
    - "minhdu-housing"

postgres:
  primaryHost: "postgres-primary.core.vigilapex.cm"
  primaryPort: 5432
  replicationUser: "vigil_replica"
  maxLagSeconds: 60

vault:
  subordinateCaUrl: "https://vault.core.vigilapex.cm/v1/pki-region-ou/ca"

multiSiteReplication:
  regionalNas:
    host: "nas-ou.regions.vigilapex.cm"
    rsyncModule: "vigil-region-ou"
    bandwidthLimitKbps: 50000
  retentionDays: 90

networkPolicy:
  enabled: true
  coreCidr: "10.99.0.0/24"
