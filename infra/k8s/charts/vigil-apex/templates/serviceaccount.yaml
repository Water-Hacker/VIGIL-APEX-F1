# One SA per role. ExternalSecrets binds its Vault Kubernetes-auth role
# to the worker SA, so a worker pod's projected-token grants Vault read
# on its policy paths only — no namespace-wide read.
{{- range tuple "postgres" "redis" "vault" "worker" "dashboard" "caddy" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" $ "component" .) }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" $ "component" .) | nindent 4 }}
automountServiceAccountToken: true
{{- end }}
