---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "worker-secrets-reader") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "worker") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "worker") }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "worker-secrets-reader") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-secrets-reader") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard") }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-secrets-reader") }}
