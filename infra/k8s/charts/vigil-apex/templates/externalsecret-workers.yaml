{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "worker-vault-token") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "worker") | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "vault-store") }}
    kind: SecretStore
  target:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "worker-vault-token") }}
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: vigil/vault-tokens/worker
        property: token
    - secretKey: anthropic_api_key
      remoteRef:
        key: vigil/anthropic
        property: api_key
{{- end }}
