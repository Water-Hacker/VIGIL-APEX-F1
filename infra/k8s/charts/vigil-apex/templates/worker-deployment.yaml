{{- /*
Generic worker Deployment template — driven by `.Values.workers[]`.
Each entry in the array becomes a Deployment + Service (+ HPA when
its `autoscaling.enabled` flag is set). Any new worker is one values
entry, not a new template. Keep this template in lock-step with
`apps/worker-*` — config conventions are identical (env-driven,
metrics on PROMETHEUS_PORT, vault token at /run/secrets/vault_token_*).

`workersDisabled[]` (top-level values) is the per-env opt-in subset
mechanism. The canonical workers[] list stays intact (worker-parity
lint stays happy); a per-env file can list worker names to skip
without touching workers[].
*/}}
{{- $disabled := .Values.workersDisabled | default list }}
{{- range .Values.workers }}
{{- $worker := . }}
{{- $root := $ }}
{{- if has $worker.name $disabled }}
{{/* worker '{{ $worker.name }}' disabled by .Values.workersDisabled */}}
{{- else }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" $root "component" $worker.name) }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" $root "component" $worker.name) | nindent 4 }}
spec:
  replicas: {{ $worker.replicas | default 1 }}
  selector:
    matchLabels:
      {{- include "vigil-apex.componentSelector" (dict "root" $root "component" $worker.name) | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "vigil-apex.componentLabels" (dict "root" $root "component" $worker.name) | nindent 8 }}
      annotations:
        prometheus.io/scrape: {{ $root.Values.observability.prometheusScrape | quote }}
        prometheus.io/port: {{ $root.Values.observability.prometheusPort | quote }}
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "vigil-apex.componentName" (dict "root" $root "component" "worker") }}
      securityContext:
        {{- include "vigil-apex.podSecurityContext" $root | nindent 8 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "vigil-apex.componentSelector" (dict "root" $root "component" $worker.name) | nindent 20 }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "vigil-apex.componentSelector" (dict "root" $root "component" $worker.name) | nindent 14 }}
      containers:
        - name: {{ $worker.name }}
          image: {{ include "vigil-apex.image" (dict "root" $root "image" $worker.image) }}
          imagePullPolicy: {{ $root.Values.global.imagePullPolicy }}
          securityContext:
            {{- include "vigil-apex.containerSecurityContext" $root | nindent 12 }}
          ports:
            - name: metrics
              containerPort: {{ $root.Values.observability.prometheusPort }}
          env:
            - name: NODE_ENV
              value: production
            - name: TZ
              value: Africa/Douala
            - name: POSTGRES_HOST
              value: {{ include "vigil-apex.componentName" (dict "root" $root "component" "postgres") }}
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              value: vigil
            - name: POSTGRES_USER
              value: vigil
            - name: REDIS_HOST
              value: {{ include "vigil-apex.componentName" (dict "root" $root "component" "redis") }}
            - name: REDIS_PORT
              value: "6379"
            - name: VAULT_ADDR
              value: http://{{ include "vigil-apex.componentName" (dict "root" $root "component" "vault") }}:8200
            {{- range $k, $v := $worker.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vigil-apex.componentName" (dict "root" $root "component" "postgres-secret") }}
                  key: password
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vigil-apex.componentName" (dict "root" $root "component" "redis-secret") }}
                  key: password
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml $worker.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi
{{- end }}
{{- end }}
