{{- if .Values.externalSecrets.enabled }}
# Fabric MSP material for worker-fabric-bridge + audit-verifier.
# When the Phase-G Fabric scaffold lands in K8s the same secret store
# pattern applies — three keys (tls_root, client_cert, client_key)
# pulled from secret/vigil/fabric/org1/*.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "fabric-msp") }}
  labels:
    {{- include "vigil-apex.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "vault-store") }}
    kind: SecretStore
  target:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "fabric-msp") }}
    creationPolicy: Owner
  data:
    - secretKey: tls_root
      remoteRef:
        key: vigil/fabric/org1/tls_root
        property: pem
    - secretKey: client_cert
      remoteRef:
        key: vigil/fabric/org1/client_cert
        property: pem
    - secretKey: client_key
      remoteRef:
        key: vigil/fabric/org1/client_key
        property: pem
{{- end }}
