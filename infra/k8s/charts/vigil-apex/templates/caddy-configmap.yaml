{{- if .Values.caddy.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "caddy-config") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "caddy") | nindent 4 }}
data:
  Caddyfile: |
    # K8s-native Caddyfile. Mirrors the Compose Caddyfile behaviour
    # (Phase B2 rate-limit, D10 compression, ratelimit plugin); the
    # full source-of-truth is infra/docker/caddy/Caddyfile and this
    # file is regenerated when that one changes (a CI step + Argo CD
    # auto-sync handles the propagation).
    {
        email {{ .Values.certManager.email | default "ops@vigilapex.cm" }}
        auto_https {{ .Values.certManager.enabled | ternary "on" "off" }}
        servers {
            protocols h1 h2 h3
        }
        order rate_limit before reverse_proxy
    }

    :80 {
        @health path /healthz
        handle @health { respond "ok" 200 }
        {{- if .Values.certManager.enabled }}
        redir https://{host}{uri} permanent
        {{- end }}
    }

    {{- $dashboardSvc := include "vigil-apex.componentName" (dict "root" . "component" "dashboard") }}
    {{- range .Values.caddy.hosts }}
    {{ . }} {
        encode {
            zstd
            gzip 6
            minimum_length 1024
        }
        header {
            Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
            X-Content-Type-Options "nosniff"
            -Server
        }

        @council_vote path /api/council/vote*
        rate_limit @council_vote {
            zone council_vote {
                key {remote_host}
                events 20
                window 1m
            }
        }
        @findings_api path /api/findings/* /api/dead-letter/* /api/calibration/*
        rate_limit @findings_api {
            zone findings_api {
                key {remote_host}
                events 60
                window 1m
            }
        }
        @tip_submit path /api/tip/submit
        rate_limit @tip_submit {
            zone tip_submit {
                key {remote_host}
                events 5
                window 1m
            }
        }

        reverse_proxy {{ $dashboardSvc }}:3000 {
            lb_policy round_robin
            lb_try_duration 5s
            health_uri /api/health
            health_interval 10s
        }
    }
    {{- end }}
{{- end }}
