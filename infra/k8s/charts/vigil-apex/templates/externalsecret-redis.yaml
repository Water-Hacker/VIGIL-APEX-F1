{{- if and .Values.externalSecrets.enabled .Values.redis.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "redis-secret") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "vault-store") }}
    kind: SecretStore
  target:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "redis-secret") }}
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: vigil/redis
        property: password
{{- end }}
