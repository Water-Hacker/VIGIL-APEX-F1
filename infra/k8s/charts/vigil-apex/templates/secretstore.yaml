{{- if .Values.externalSecrets.enabled }}
# ESO SecretStore — points at the in-cluster Vault. Authenticates via
# Kubernetes ServiceAccount-token review; Vault's `kubernetes` auth
# method maps the SA → vault role → policy chain.
#
# The Vault role / policy bind happens at install time per
# docs/runbooks/R8-k8s-cutover.md §3 — we cannot template it because
# it requires a one-shot Vault API call against an unsealed Vault.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "vault-store") }}
  labels:
    {{- include "vigil-apex.labels" . | nindent 4 }}
spec:
  provider:
    vault:
      server: http://{{ include "vigil-apex.componentName" (dict "root" . "component" "vault") }}:8200
      path: secret/
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: {{ .Values.externalSecrets.vaultRole | quote }}
          serviceAccountRef:
            name: {{ include "vigil-apex.componentName" (dict "root" . "component" "worker") }}
{{- end }}
