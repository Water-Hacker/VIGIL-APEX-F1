{{- if .Values.postgres.enabled }}
# Headless service for StatefulSet identity. Workers use the
# `<release>-postgres` ClusterIP service below; this one only exists
# so each pod gets a stable DNS A record.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "postgres-headless") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "vigil-apex.componentSelector" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "postgres") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "vigil-apex.componentSelector" (dict "root" . "component" "postgres") | nindent 4 }}
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
{{- end }}
