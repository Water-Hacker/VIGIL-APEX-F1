# Per-role Roles. Each can read only the secrets ExternalSecrets has
# materialised for it; a worker SA cannot read the dashboard's secrets,
# and vice versa. Mirrors the Vault policy split from Phase B6.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "worker-secrets-reader") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "worker") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ include "vigil-apex.componentName" (dict "root" . "component" "postgres-secret") }}
      - {{ include "vigil-apex.componentName" (dict "root" . "component" "redis-secret") }}
      - {{ include "vigil-apex.componentName" (dict "root" . "component" "worker-vault-token") }}
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-secrets-reader") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames:
      - {{ include "vigil-apex.componentName" (dict "root" . "component" "postgres-secret") }}
      - {{ include "vigil-apex.componentName" (dict "root" . "component" "redis-secret") }}
      - {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-vault-token") }}
      - {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-turnstile") }}
      - {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-keycloak") }}
    verbs: ["get"]
