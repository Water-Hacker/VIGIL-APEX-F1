{{- if .Values.keycloak.enabled }}
# Keycloak — 3 replicas behind a ClusterIP Service. Uses the cluster
# Postgres as its datastore (separate database `keycloak`). Anti-affinity
# spreads pods across all 3 cluster nodes so the OIDC endpoint survives
# a single-node failure.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "keycloak") | nindent 4 }}
spec:
  replicas: {{ .Values.keycloak.replicaCount | default 3 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "vigil-apex.componentSelector" (dict "root" . "component" "keycloak") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vigil-apex.componentLabels" (dict "root" . "component" "keycloak") | nindent 8 }}
    spec:
      serviceAccountName: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak") }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 0
        fsGroup: 0
        seccompProfile: { type: RuntimeDefault }
      affinity:
        {{- include "vigil-apex.antiAffinity" (dict "root" . "component" "keycloak") | nindent 8 }}
      topologySpreadConstraints:
        {{- include "vigil-apex.topologySpread" (dict "root" . "component" "keycloak") | nindent 8 }}
      terminationGracePeriodSeconds: 30
      containers:
        - name: keycloak
          image: {{ include "vigil-apex.image" (dict "root" . "image" .Values.keycloak.image) }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: false
            seccompProfile: { type: RuntimeDefault }
          args: [ "start", "--optimized" ]
          env:
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: {{ include "vigil-apex.componentName" (dict "root" . "component" "postgres") }}
            - name: KC_DB_URL_DATABASE
              value: keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak-secrets") }}
                  key: db-username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak-secrets") }}
                  key: db-password
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak-secrets") }}
                  key: admin-username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak-secrets") }}
                  key: admin-password
            - name: KC_HOSTNAME
              value: {{ .Values.keycloak.hostname | default "kc.vigilapex.cm" }}
            - name: KC_PROXY
              value: edge
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            - name: KC_LOG_LEVEL
              value: INFO
            - name: KC_LOG
              value: console
            - name: KC_CACHE
              value: ispn
            - name: KC_CACHE_STACK
              value: kubernetes
            - name: JAVA_OPTS_KC_HEAP
              value: "-Xms512m -Xmx2g"
            # Infinispan cluster discovery via K8s DNS — pod IPs in the
            # headless service auto-discover peers.
            - name: JGROUPS_DISCOVERY_PROTOCOL
              value: dns.DNS_PING
            - name: JGROUPS_DISCOVERY_PROPERTIES
              value: dns_query={{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak-headless") }}.{{ .Release.Namespace }}.svc.cluster.local
          ports:
            - { name: http, containerPort: 8080, protocol: TCP }
            - { name: management, containerPort: 9000, protocol: TCP }
          livenessProbe:
            httpGet: { path: /health/live, port: management }
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            httpGet: { path: /health/ready, port: management }
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.keycloak.resources | nindent 12 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak") }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "keycloak") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "vigil-apex.componentSelector" (dict "root" . "component" "keycloak") | nindent 4 }}
  ports:
    - { name: http, port: 8080, targetPort: http }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak-headless") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "keycloak") | nindent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    {{- include "vigil-apex.componentSelector" (dict "root" . "component" "keycloak") | nindent 4 }}
  ports:
    - { name: http, port: 8080, targetPort: http }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "keycloak") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "keycloak") | nindent 4 }}
spec:
  minAvailable: 2
  selector:
    matchLabels:
      {{- include "vigil-apex.componentSelector" (dict "root" . "component" "keycloak") | nindent 6 }}
{{- end }}
