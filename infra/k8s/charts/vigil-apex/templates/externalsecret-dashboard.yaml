{{- if and .Values.externalSecrets.enabled .Values.dashboard.enabled }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-vault-token") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "vault-store") }}
    kind: SecretStore
  target:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-vault-token") }}
    creationPolicy: Owner
  data:
    - secretKey: token
      remoteRef:
        key: vigil/vault-tokens/dashboard
        property: token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-turnstile") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "vault-store") }}
    kind: SecretStore
  target:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-turnstile") }}
    creationPolicy: Owner
  data:
    - secretKey: secret_key
      remoteRef:
        key: vigil/turnstile
        property: secret_key
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-keycloak") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "vault-store") }}
    kind: SecretStore
  target:
    name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-keycloak") }}
    creationPolicy: Owner
  data:
    - secretKey: admin
      remoteRef:
        key: vigil/keycloak
        property: admin
{{- end }}
