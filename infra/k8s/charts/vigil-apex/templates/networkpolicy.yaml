{{- if .Values.networkPolicy.enabled }}
# Default-deny: nothing is allowed to ingress into the namespace
# unless an allowlist below explicitly permits it. Mirrors the
# `vigil-internal` private bridge from the Compose stack.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "default-deny") }}
  labels:
    {{- include "vigil-apex.labels" . | nindent 4 }}
spec:
  podSelector: {}
  policyTypes: ["Ingress", "Egress"]
  ingress: []
  egress:
    # DNS to kube-system CoreDNS — every Pod needs this.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Postgres: ingress from data-plane clients only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "postgres-allow") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "postgres") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vigil-apex.componentSelector" (dict "root" . "component" "postgres") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        {{- range .Values.networkPolicy.dataPlaneClients }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 5432
---
# Redis: same idea.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "redis-allow") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vigil-apex.componentSelector" (dict "root" . "component" "redis") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        {{- range .Values.networkPolicy.dataPlaneClients }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 6379
---
# Vault: ESO operator + workers + dashboard read it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "vault-allow") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "vault") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vigil-apex.componentSelector" (dict "root" . "component" "vault") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: external-secrets
        {{- range .Values.networkPolicy.dataPlaneClients }}
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: {{ . | quote }}
        {{- end }}
      ports:
        - protocol: TCP
          port: 8200
---
# Dashboard ingress: from caddy only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "dashboard-allow") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "dashboard") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vigil-apex.componentSelector" (dict "root" . "component" "dashboard") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: caddy
      ports:
        - protocol: TCP
          port: 3000
---
# Caddy: ingress from anywhere on 80/443 (it's the LoadBalancer).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "vigil-apex.componentName" (dict "root" . "component" "caddy-allow") }}
  labels:
    {{- include "vigil-apex.componentLabels" (dict "root" . "component" "caddy") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "vigil-apex.componentSelector" (dict "root" . "component" "caddy") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
{{- end }}
