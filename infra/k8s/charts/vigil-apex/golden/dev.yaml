# Source: vigil-apex/templates/networkpolicy.yaml
# Allow Prometheus to scrape every workload exposing :9100 (worker metrics)
# and the component-specific exporter ports.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vigil-apex-prometheus-scrape
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: dev-local
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: prometheus
spec:
  podSelector: {}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: vigil
              app.kubernetes.io/name: prometheus
      ports:
        - protocol: TCP
          port: 9100   # workers (per-pod prom_client default)
        - protocol: TCP
          port: 9090   # Prometheus self-scrape
        - protocol: TCP
          port: 9093   # Alertmanager
        - protocol: TCP
          port: 9443   # Fabric peer/orderer ops
        - protocol: TCP
          port: 8200   # Vault metrics
        - protocol: TCP
          port: 5070   # IPFS-Cluster metrics
