# Source: vigil-apex/templates/caddy-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vigil-apex-caddy-config
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: dev-local
    app.kubernetes.io/name: caddy
    app.kubernetes.io/component: caddy
data:
  Caddyfile: |
    # K8s-native Caddyfile. Mirrors the Compose Caddyfile behaviour
    # (Phase B2 rate-limit, D10 compression, ratelimit plugin); the
    # full source-of-truth is infra/docker/caddy/Caddyfile and this
    # file is regenerated when that one changes (a CI step + Argo CD
    # auto-sync handles the propagation).
    {
        email ops@vigilapex.cm
        auto_https off
        servers {
            protocols h1 h2 h3
        }
        order rate_limit before reverse_proxy
    }

    :80 {
        @health path /healthz
        handle @health { respond "ok" 200 }
    }
    localhost {
        encode {
            zstd
            gzip 6
            minimum_length 1024
        }
        header {
            Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
            X-Content-Type-Options "nosniff"
            -Server
        }

        @council_vote path /api/council/vote*
        rate_limit @council_vote {
            zone council_vote {
                key {remote_host}
                events 20
                window 1m
            }
        }
        @findings_api path /api/findings/* /api/dead-letter/* /api/calibration/*
        rate_limit @findings_api {
            zone findings_api {
                key {remote_host}
                events 60
                window 1m
            }
        }
        @tip_submit path /api/tip/submit
        rate_limit @tip_submit {
            zone tip_submit {
                key {remote_host}
                events 5
                window 1m
            }
        }

        reverse_proxy vigil-apex-dashboard:3000 {
            lb_policy round_robin
            lb_try_duration 5s
            health_uri /api/health
            health_interval 10s
        }
    }
---
# Source: vigil-apex/templates/postgres-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vigil-apex-postgres-config
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: dev-local
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: postgres
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 50
    shared_buffers = 128MB
    work_mem = 16MB
    statement_timeout = 30000
    idle_in_transaction_session_timeout = 300000
    # Phase E2 — surface pool / saturation metrics through pg_stat_statements
    shared_preload_libraries = 'pg_stat_statements'
    pg_stat_statements.track = all
    # WAL archiving for vigil-backup (Phase F1) — on-cluster the archive
    # path is a PVC mount; ops decides whether to also stream to Synology.
    wal_level = replica
    archive_mode = on
    archive_command = 'test ! -f /wal-archive/%f && cp %p /wal-archive/%f'
    log_destination = 'stderr'
    log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '
    log_lock_waits = on
    log_min_duration_statement = 1000
---
# Source: vigil-apex/templates/redis-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vigil-apex-redis-config
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: dev-local
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: redis
data:
  redis.conf: |
    bind 0.0.0.0
    protected-mode yes
    port 6379
    tcp-backlog 511
    timeout 300
    aclfile /etc/redis/users.acl
    appendonly yes
    appendfsync everysec
    auto-aof-rewrite-percentage 100
    auto-aof-rewrite-min-size 64mb
    save 900 1
    save 300 10
    save 60 10000
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    loglevel notice
  users.acl.template: |
    user default off nopass nocommands
    user vigil_app on >__VIGIL_REDIS_PASSWORD__ ~* &* +@all
  redis-entrypoint.sh: |
    #!/bin/sh
    # Phase B5 — render ACL with the synced password, then exec redis-server.
    set -eu
    PASSWORD="$(cat /run/redis-secret/password)"
    PASSWORD="${PASSWORD}" awk '
      { gsub(/__VIGIL_REDIS_PASSWORD__/, ENVIRON["PASSWORD"]); print }
    ' /etc/redis/users.acl.template > /tmp/users.acl
    cp /etc/redis/redis.conf /tmp/redis.conf
    # ACL file path in conf points at /etc/redis/users.acl which is the
    # ConfigMap mount; we cannot write into a ConfigMap volume so we
    # symlink via tmpfs.
    sed -i 's|aclfile /etc/redis/users.acl|aclfile /tmp/users.acl|' /tmp/redis.conf
    unset PASSWORD
    exec redis-server /tmp/redis.conf
---
