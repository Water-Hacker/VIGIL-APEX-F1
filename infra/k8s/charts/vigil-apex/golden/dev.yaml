              containerPort: 8200
            - name: cluster
              containerPort: 8201
          env:
            - name: VAULT_ADDR
              value: "http://0.0.0.0:8200"
          command: ["vault"]
          args: ["server", "-config=/vault/config/config.hcl"]
          volumeMounts:
            - name: data
              mountPath: /vault/file
            - name: logs
              mountPath: /vault/logs
            - name: config
              mountPath: /vault/config
              readOnly: true
          readinessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204
              port: 8200
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          resources:
            limits:
              cpu: 250m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: vigil-apex-vault-config
        - name: logs
          emptyDir:
            sizeLimit: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          helm.sh/chart: vigil-apex-0.1.0
