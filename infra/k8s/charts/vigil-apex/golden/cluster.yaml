---
# Source: vigil-apex/templates/secretstore.yaml
# ESO SecretStore — points at the in-cluster Vault. Authenticates via
# Kubernetes ServiceAccount-token review; Vault's `kubernetes` auth
# method maps the SA → vault role → policy chain.
#
# The Vault role / policy bind happens at install time per
# docs/runbooks/R8-k8s-cutover.md §3 — we cannot template it because
# it requires a one-shot Vault API call against an unsealed Vault.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vigil-apex-vault-store
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: cm-yaounde
spec:
  provider:
    vault:
      server: http://vigil-apex-vault:8200
      path: secret/
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: "vigil-eso"
          serviceAccountRef:
            name: vigil-apex-worker
