            - { name: secrets, mountPath: /run/secrets, readOnly: true }
        # ──────────────────────────────────────────────────────────────────
        # Sentinel sidecar. One per pod; quorum 2 of 3.
        # ──────────────────────────────────────────────────────────────────
        - name: sentinel
          image: ghcr.io/water-hacker/vigil-apex/redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -c
            - |
              set -e
              PRIMARY_HOST="$(echo "${POD_NAME%-*}-0").vigil-apex-redis-headless.default.svc.cluster.local"
              POD_FQDN="${POD_NAME}.vigil-apex-redis-headless.default.svc.cluster.local"
              # Resolve the primary's IP for the initial sentinel monitor directive
              # (Sentinel updates this internally after failover; this is the seed).
              for _ in $(seq 1 30); do
                if PRIMARY_IP=$(getent hosts "${PRIMARY_HOST}" | awk '{print $1}'); then
                  [ -n "${PRIMARY_IP}" ] && break
                fi
                sleep 2
              done
              if [ -z "${PRIMARY_IP}" ]; then
                # Fall back to the hostname; Sentinel will retry until DNS resolves.
                PRIMARY_IP="${PRIMARY_HOST}"
              fi
              sed -e "s|MASTER_HOST|${PRIMARY_IP}|g" \
                  -e "s|ANNOUNCE_IP|${POD_FQDN}|g" \
                  /etc/sentinel-template/sentinel.conf > /tmp/sentinel.conf
              exec redis-server /tmp/sentinel.conf --sentinel
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
          ports:
            - { name: sentinel, containerPort: 26379, protocol: TCP }
          livenessProbe:
            tcpSocket:
              port: sentinel
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: sentinel
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests: { memory: "64Mi", cpu: "50m" }
            limits:   { memory: "256Mi", cpu: "200m" }
          volumeMounts:
            - { name: config, mountPath: /etc/sentinel-template, readOnly: true }
            - { name: tmp, mountPath: /tmp }
            - { name: secrets, mountPath: /run/secrets, readOnly: true }
      volumes:
        - name: config
          configMap:
            name: vigil-apex-redis-config
        - name: tmp
          emptyDir: { sizeLimit: 64Mi }
        - name: secrets
          secret:
            secretName: vigil-apex-redis-secrets
            items:
              - { key: redis-password, path: redis_password, mode: 0400 }
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          helm.sh/chart: vigil-apex-0.1.0
          app.kubernetes.io/managed-by: Helm
          app.kubernetes.io/instance: vigil
          app.kubernetes.io/version: "0.1.0"
          app.kubernetes.io/part-of: vigil-apex
          vigil-apex.cm/cluster-region: cm-yaounde
          app.kubernetes.io/name: redis
          app.kubernetes.io/component: redis
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "fast-ssd"
        resources:
          requests:
            storage: 50Gi
