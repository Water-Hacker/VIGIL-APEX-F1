data:
  torrc: |
    # VIGIL APEX Tor — v3 hidden service for the citizen tip portal.
    User tor
    DataDirectory /var/lib/tor
    SocksPort 0.0.0.0:9050
    ControlPort 0.0.0.0:9051

    # Hidden service — reverse-proxies to the cluster Caddy VIP for /tip.
    HiddenServiceDir /var/lib/tor/hidden-services/vigil-tip
    HiddenServiceVersion 3
    HiddenServicePort 80 vigil-apex-caddy:80
    HiddenServicePoWDefensesEnabled 1
    HiddenServicePoWQueueRate 250
    HiddenServicePoWQueueBurst 1000

    # Bridge / obfs4 — Tor-friendly fallback for citizens in jurisdictions
    # where direct Tor is blocked. Optional; the architect provisions the
    # bridge lines as a Secret (tor-bridge-lines) when used.
    UseBridges 0

    # Logging
    Log notice stdout
    SafeLogging 1

    # Hardening
    AvoidDiskWrites 1
    DisableDebuggerAttachment 1
    ClientUseIPv6 1
