              value: vigil-apex-postgres
            - name: KC_DB_URL_DATABASE
              value: keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vigil-apex-keycloak-secrets
                  key: db-username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vigil-apex-keycloak-secrets
                  key: db-password
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: vigil-apex-keycloak-secrets
                  key: admin-username
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vigil-apex-keycloak-secrets
                  key: admin-password
            - name: KC_HOSTNAME
              value: kc.vigilapex.cm
            - name: KC_PROXY
