        app.kubernetes.io/part-of: vigil-apex
        vigil-apex.cm/cluster-region: cm-yaounde
        app.kubernetes.io/name: redis
        app.kubernetes.io/component: redis
      annotations:
        checksum/config: 5d953012b19e2ea923d9709378001d865589e455a60c705d9b3973c34f0e983a
    spec:
      serviceAccountName: vigil-apex-redis
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: redis
                  app.kubernetes.io/instance: vigil
              topologyKey: vigil.cluster/node
      terminationGracePeriodSeconds: 30
      containers:
        # ──────────────────────────────────────────────────────────────────
        # Redis itself. Pod 0 starts as primary; pods 1+ replicate.
        # ──────────────────────────────────────────────────────────────────
        - name: redis
          image: ghcr.io/water-hacker/vigil-apex/redis:7.4-alpine
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
          command:
            - /bin/sh
            - -c
            - |
              set -e
              ORDINAL="${POD_NAME##*-}"
