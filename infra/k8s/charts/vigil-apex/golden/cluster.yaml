# Source: vigil-apex/templates/networkpolicy.yaml
# Fabric peer: workers/bridge query/invoke chaincode.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vigil-apex-fabric-peer-allow
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: cm-yaounde
    app.kubernetes.io/name: fabric-peer
    app.kubernetes.io/component: fabric-peer
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: vigil
      app.kubernetes.io/name: fabric-peer
  policyTypes: ["Ingress"]
  ingress:
    # Chaincode container (sidecar) talks back to peer on 7052.
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 7052
    # Workers + audit-verifier query the peer on 7051.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: worker-fabric-bridge
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: audit-verifier
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: "vigil-apex-dashboard"
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: "vigil-apex-worker-pattern"
      ports:
        - protocol: TCP
          port: 7051
