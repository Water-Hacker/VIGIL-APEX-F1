    vigil-apex.cm/cluster-region: cm-yaounde
    app.kubernetes.io/name: neo4j
    app.kubernetes.io/component: neo4j
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            helm.sh/chart: vigil-apex-0.1.0
            app.kubernetes.io/managed-by: Helm
            app.kubernetes.io/instance: vigil
            app.kubernetes.io/version: "0.1.0"
            app.kubernetes.io/part-of: vigil-apex
            vigil-apex.cm/cluster-region: cm-yaounde
            app.kubernetes.io/name: neo4j
            app.kubernetes.io/component: neo4j
            app.kubernetes.io/role: backup
        spec:
          restartPolicy: OnFailure
          serviceAccountName: vigil-apex-neo4j
          # Pin the backup job to node-c so a node-b failure doesn't lose
          # both the primary and the most recent backup at once.
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                  - matchExpressions:
                      - key: vigil.cluster/node
                        operator: In
                        values: [ "c" ]
          securityContext:
            runAsNonRoot: true
            runAsUser: 7474
            runAsGroup: 7474
            fsGroup: 7474
            seccompProfile: { type: RuntimeDefault }
          containers:
            - name: backup
              image: ghcr.io/water-hacker/vigil-apex/neo4j:5.23-community
              command:
                - /bin/sh
                - -c
                - |
                  set -eu
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  neo4j-admin database dump neo4j \
                    --to-path=/backup \
                    --verbose
                  mv /backup/neo4j.dump /backup/neo4j-${TS}.dump
                  # Retain last 28 dumps (≈ 7 days at 6h cadence).
                  ls -1t /backup/neo4j-*.dump | tail -n +29 | xargs -r rm -f
              env:
                - name: NEO4J_AUTH
                  valueFrom:
                    secretKeyRef:
                      name: vigil-apex-neo4j-secrets
                      key: auth
              volumeMounts:
                - { name: backup, mountPath: /backup }
                - { name: data, mountPath: /data, readOnly: true }
          volumes:
            - name: backup
              persistentVolumeClaim:
                claimName: vigil-apex-neo4j-backup
            - name: data
              persistentVolumeClaim:
                claimName: data-vigil-apex-neo4j-0
