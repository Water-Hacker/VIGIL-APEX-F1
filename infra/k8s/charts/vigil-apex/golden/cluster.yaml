data:
  Caddyfile: |
    # K8s-native Caddyfile. Mirrors the Compose Caddyfile behaviour
    # (Phase B2 rate-limit, D10 compression, ratelimit plugin); the
    # full source-of-truth is infra/docker/caddy/Caddyfile and this
    # file is regenerated when that one changes (a CI step + Argo CD
    # auto-sync handles the propagation).
    {
        email ops@vigilapex.cm
        auto_https on
        servers {
            protocols h1 h2 h3
        }
        order rate_limit before reverse_proxy
    }

    :80 {
        @health path /healthz
        handle @health { respond "ok" 200 }
        redir https://{host}{uri} permanent
    }
    vigilapex.cm {
        encode {
            zstd
            gzip 6
            minimum_length 1024
        }
        header {
            Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
            X-Content-Type-Options "nosniff"
            -Server
        }

        @council_vote path /api/council/vote*
        rate_limit @council_vote {
            zone council_vote {
                key {remote_host}
