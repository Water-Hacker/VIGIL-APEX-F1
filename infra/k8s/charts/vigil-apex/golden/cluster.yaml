              app.kubernetes.io/instance: vigil
              app.kubernetes.io/name: fabric-orderer
      ports:
        - protocol: TCP
          port: 7050
        - protocol: TCP
          port: 8443
    # Peer broadcast/deliver — Fabric peers submit/receive blocks.
