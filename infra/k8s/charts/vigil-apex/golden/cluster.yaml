            - { name: data, mountPath: /vault/file }
            - { name: tls, mountPath: /vault/tls, readOnly: true }
            - { name: logs, mountPath: /vault/logs }
      volumes:
        - name: config
          configMap:
            name: vigil-apex-vault-config
