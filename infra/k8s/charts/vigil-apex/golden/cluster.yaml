# Source: vigil-apex/templates/tor-statefulset.yaml
# Tor — singleton, pinned to a specific cluster node so the v3
# hidden-service keys never re-key on pod restart. Multiple .onion
# listeners would each generate distinct keys; we want a stable address
# for the citizen tip portal.
#
# The hidden-service keys are pre-provisioned via a Secret named
# `<release>-tor-hidden-service` containing:
#   hs_ed25519_secret_key   — the persistent v3 secret
#   hs_ed25519_public_key   — derivable from the secret
#   hostname                — the .onion address
# These come from the architect's bootstrap, not the chart.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vigil-apex-tor
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: cm-yaounde
    app.kubernetes.io/name: tor
    app.kubernetes.io/component: tor
spec:
  replicas: 1
  serviceName: vigil-apex-tor-headless
  selector:
    matchLabels:
      app.kubernetes.io/instance: vigil
      app.kubernetes.io/name: tor
  template:
    metadata:
      labels:
        helm.sh/chart: vigil-apex-0.1.0
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/instance: vigil
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/part-of: vigil-apex
        vigil-apex.cm/cluster-region: cm-yaounde
        app.kubernetes.io/name: tor
        app.kubernetes.io/component: tor
      annotations:
        checksum/config: 800818462051890fa6a69478d079ba3ec5e3c23a53ca6c79bf61c859f5f3c632
    spec:
      serviceAccountName: vigil-apex-tor
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 101
        fsGroup: 101
        seccompProfile: { type: RuntimeDefault }
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: vigil.cluster/node
                    operator: In
                    values: [ "a" ]
      terminationGracePeriodSeconds: 30
      # ──────────────────────────────────────────────────────────────────
      # Hidden-service keys must be world-unreadable (mode 0700 dir + 0600
      # files) or the Tor daemon refuses to start. We project from the
      # Secret into an emptyDir via initContainer that sets correct perms.
      # ──────────────────────────────────────────────────────────────────
      initContainers:
        - name: prepare-hidden-service
          image: busybox:1.37
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: true
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /hs/vigil-tip
              cp /secrets/hs_ed25519_secret_key /hs/vigil-tip/hs_ed25519_secret_key
              cp /secrets/hs_ed25519_public_key /hs/vigil-tip/hs_ed25519_public_key
              cp /secrets/hostname /hs/vigil-tip/hostname
              chmod 0700 /hs/vigil-tip
              chmod 0600 /hs/vigil-tip/hs_ed25519_secret_key
              chmod 0600 /hs/vigil-tip/hs_ed25519_public_key
              chmod 0644 /hs/vigil-tip/hostname
          volumeMounts:
            - { name: secrets, mountPath: /secrets, readOnly: true }
            - { name: hidden-service, mountPath: /hs }
      containers:
        - name: tor
          image: ghcr.io/water-hacker/vigil-apex/dperson/torproxy:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 100
            capabilities: { drop: ["ALL"] }
            readOnlyRootFilesystem: false
            seccompProfile: { type: RuntimeDefault }
          command:
            - tor
            - -f
            - /etc/tor/torrc
          ports:
            - { name: socks, containerPort: 9050, protocol: TCP }
            - { name: control, containerPort: 9051, protocol: TCP }
          livenessProbe:
            tcpSocket: { port: socks }
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket: { port: socks }
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - { name: config, mountPath: /etc/tor, readOnly: true }
            - { name: hidden-service, mountPath: /var/lib/tor/hidden-services }
            - { name: data, mountPath: /var/lib/tor }
      volumes:
        - name: config
          configMap:
            name: vigil-apex-tor-config
        - name: secrets
          secret:
            secretName: vigil-apex-tor-hidden-service
            defaultMode: 0400
        - name: hidden-service
          emptyDir: { sizeLimit: 1Mi }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "fast-ssd"
        resources:
          requests:
            storage: 2Gi
