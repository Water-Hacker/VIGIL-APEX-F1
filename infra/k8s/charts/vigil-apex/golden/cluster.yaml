      ports:
        - protocol: TCP
          port: 7050
    # Worker-fabric-bridge submits envelopes.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: worker-fabric-bridge
      ports:
        - protocol: TCP
          port: 7050
