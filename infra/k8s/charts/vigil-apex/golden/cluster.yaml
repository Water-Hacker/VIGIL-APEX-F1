        app.kubernetes.io/component: vault
      annotations:
        checksum/config: db0bbf6441367919603688e30af106ef52ea714ea6516f83cf5ee68d4e3f942c
    spec:
      serviceAccountName: vigil-apex-vault
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
