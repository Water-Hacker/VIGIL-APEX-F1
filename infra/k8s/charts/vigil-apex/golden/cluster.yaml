# Source: vigil-apex/templates/postgres-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vigil-apex-postgres-config
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: cm-yaounde
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: postgres
data:
  postgresql.conf: |
    listen_addresses = '*'
    max_connections = 200
    shared_buffers = 512MB
    work_mem = 16MB
    statement_timeout = 30000
    idle_in_transaction_session_timeout = 300000
    # Phase E2 — surface pool / saturation metrics through pg_stat_statements
    shared_preload_libraries = 'pg_stat_statements'
    pg_stat_statements.track = all
    # WAL archiving for vigil-backup (Phase F1) — on-cluster the archive
    # path is a PVC mount; ops decides whether to also stream to Synology.
    wal_level = replica
    archive_mode = on
    archive_command = 'test ! -f /wal-archive/%f && cp %p /wal-archive/%f'
    log_destination = 'stderr'
    log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '
    log_lock_waits = on
    log_min_duration_statement = 1000
---
# Source: vigil-apex/templates/postgres-patroni-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vigil-apex-postgres-patroni
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: cm-yaounde
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: postgres
data:
  # Spilo bootstrap configuration. Spilo reads SPILO_CONFIGURATION as
  # YAML at boot and converts it into the underlying Patroni config.
  # This mirrors the infra/docker/postgres/postgresql.conf settings.
  spilo.yaml: |
    bootstrap:
      dcs:
        ttl: 30
        loop_wait: 10
        retry_timeout: 10
        maximum_lag_on_failover: 16777216
        master_start_timeout: 30
        synchronous_mode: true
        synchronous_node_count: 1
        postgresql:
          use_pg_rewind: true
          use_slots: true
          parameters:
            wal_level: replica
            max_wal_senders: 10
            max_replication_slots: 10
            wal_keep_size: 8GB
            wal_compression: lz4
            hot_standby: 'on'
            hot_standby_feedback: 'on'
            archive_mode: 'on'
            archive_command: 'wal-g wal-push %p'
            checkpoint_timeout: '10min'
            checkpoint_completion_target: 0.9
            shared_buffers: "512MB"
            work_mem: "16MB"
            maintenance_work_mem: 512MB
            effective_cache_size: 12GB
            random_page_cost: 1.1
            effective_io_concurrency: 200
            max_connections: 200
            password_encryption: scram-sha-256
            row_security: 'on'
            statement_timeout: 30000
            idle_in_transaction_session_timeout: 300000
            deadlock_timeout: '1s'
            log_min_duration_statement: '250ms'
            log_lock_waits: 'on'
            log_temp_files: '10MB'
            log_checkpoints: 'on'
            log_connections: 'on'
            log_disconnections: 'on'
            log_statement: 'ddl'
            timezone: 'Africa/Douala'
            log_timezone: 'Africa/Douala'
            synchronous_commit: 'on'
      initdb:
        - encoding: UTF8
        - locale: en_US.UTF-8
        - data-checksums
      pg_hba:
        - host  replication replicator  10.244.0.0/16  scram-sha-256
        - host  replication replicator  0.0.0.0/0      scram-sha-256
        - host  all         all         10.244.0.0/16  scram-sha-256
        - host  all         all         0.0.0.0/0      scram-sha-256
        - local all         postgres                   trust
      users:
        vigil:
          password: '${VIGIL_APP_PASSWORD}'
          options:
            - createrole
            - createdb
