apiVersion: batch/v1
kind: CronJob
metadata:
  name: vigil-apex-neo4j-backup
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
