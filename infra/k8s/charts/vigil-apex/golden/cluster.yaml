# Source: vigil-apex/templates/vault-configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vigil-apex-vault-config
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: cm-yaounde
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: vault
data:
  config.hcl: |
    # Raft integrated storage — 3-voter HA across the DL380 Gen11 cluster.
    storage "raft" {
      path    = "/vault/file"
      node_id = "VAULT_NODE_ID"
      retry_join {
        leader_api_addr     = "https://vigil-apex-vault-0.vigil-apex-vault-headless.default.svc.cluster.local:8200"
        leader_ca_cert_file = "/vault/tls/ca.crt"
      }
      retry_join {
        leader_api_addr     = "https://vigil-apex-vault-1.vigil-apex-vault-headless.default.svc.cluster.local:8200"
        leader_ca_cert_file = "/vault/tls/ca.crt"
      }
      retry_join {
        leader_api_addr     = "https://vigil-apex-vault-2.vigil-apex-vault-headless.default.svc.cluster.local:8200"
        leader_ca_cert_file = "/vault/tls/ca.crt"
      }
      performance_multiplier = 5
    }

    # Transit auto-unseal — unsealing key on Hetzner N02 (off-jurisdiction).
    seal "transit" {
      address            = "https://n02.vigilapex.cm:8200"
      token              = "VAULT_TRANSIT_TOKEN"
      disable_renewal    = "false"
      key_name           = "vigil-unseal"
      mount_path         = "transit/"
      tls_ca_cert        = "/vault/tls/n02-ca.crt"
      tls_skip_verify    = "false"
    }

    listener "tcp" {
      address                            = "0.0.0.0:8200"
      cluster_address                    = "0.0.0.0:8201"
      tls_disable                        = "false"
      tls_cert_file                      = "/vault/tls/server.crt"
      tls_key_file                       = "/vault/tls/server.key"
      tls_client_ca_file                 = "/vault/tls/ca.crt"
      tls_require_and_verify_client_cert = "true"
      tls_min_version                    = "tls13"
    }
    api_addr     = "https://VAULT_NODE_HOSTNAME:8200"
    cluster_addr = "https://VAULT_NODE_HOSTNAME:8201"
    ui = false
    disable_mlock = false
    log_level = "info"
    log_format = "json"
    raw_storage_endpoint = false
