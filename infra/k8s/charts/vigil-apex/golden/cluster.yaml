              cp /etc/redis-template/redis.conf /tmp/redis.conf
              if [ "${ORDINAL}" != "0" ]; then
                echo "replicaof ${PRIMARY_HOST} 6379" >> /tmp/redis.conf
              fi
              exec redis-server /tmp/redis.conf
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
          ports:
