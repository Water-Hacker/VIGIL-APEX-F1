spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: vigil
      app.kubernetes.io/name: fabric-orderer
  policyTypes: ["Ingress"]
  ingress:
    # Raft membership cluster — orderers gossip with each other.
    - from:
        - podSelector:
