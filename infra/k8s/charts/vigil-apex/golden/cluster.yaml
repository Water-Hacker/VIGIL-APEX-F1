# Source: vigil-apex/templates/networkpolicy.yaml
# IPFS: swarm (4001) is peer-to-peer, gateway/api restricted to in-cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vigil-apex-ipfs-allow
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: cm-yaounde
    app.kubernetes.io/name: ipfs
    app.kubernetes.io/component: ipfs
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: vigil
      app.kubernetes.io/name: ipfs
  policyTypes: ["Ingress"]
  ingress:
    # Swarm — open to peers (the cluster mesh + external IPFS DHT).
    - ports:
        - protocol: TCP
          port: 4001
        - protocol: UDP
          port: 4001
    # ipfs-cluster mesh — peers gossip on 9096 + REST on 9094.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: vigil
              app.kubernetes.io/name: ipfs
      ports:
        - protocol: TCP
          port: 9094
        - protocol: TCP
          port: 9095
        - protocol: TCP
          port: 9096
    # API + gateway — only from data-plane clients (workers + dashboard).
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: "vigil-apex-dashboard"
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: "vigil-apex-worker-pattern"
      ports:
        - protocol: TCP
          port: 5001
        - protocol: TCP
          port: 8080
        - protocol: TCP
          port: 9094
