# Fabric orderer: Raft peers + fabric peer clients only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vigil-apex-fabric-orderer-allow
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
