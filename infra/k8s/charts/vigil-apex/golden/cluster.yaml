# Falco — DaemonSet, one pod per cluster node. eBPF-based host-level
# syscall monitoring; rules from infra/observability/falco/.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vigil-apex-falco
  labels:
    helm.sh/chart: vigil-apex-0.1.0
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/instance: vigil
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/part-of: vigil-apex
    vigil-apex.cm/cluster-region: cm-yaounde
    app.kubernetes.io/name: falco
    app.kubernetes.io/component: falco
spec:
  selector:
    matchLabels:
      app.kubernetes.io/instance: vigil
      app.kubernetes.io/name: falco
  template:
    metadata:
      labels:
        helm.sh/chart: vigil-apex-0.1.0
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/instance: vigil
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/part-of: vigil-apex
        vigil-apex.cm/cluster-region: cm-yaounde
        app.kubernetes.io/name: falco
        app.kubernetes.io/component: falco
    spec:
      serviceAccountName: vigil-apex-falco
      hostNetwork: true
      hostPID: true
      tolerations:
        - effect: NoSchedule
          operator: Exists
      containers:
        - name: falco
          image: ghcr.io/water-hacker/vigil-apex/falcosecurity/falco-no-driver:0.39.0
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true   # required for eBPF probe attach
          args:
            - /usr/bin/falco
            - --modern-bpf
            - -K
            - /var/run/secrets/kubernetes.io/serviceaccount/token
            - -k
            - https://kubernetes.default.svc.cluster.local
          ports:
            - { name: http, containerPort: 8765, protocol: TCP }
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            limits:
              cpu: 500m
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 256Mi
          volumeMounts:
            - { name: dev, mountPath: /host/dev }
            - { name: proc, mountPath: /host/proc, readOnly: true }
            - { name: boot, mountPath: /host/boot, readOnly: true }
            - { name: lib-modules, mountPath: /host/lib/modules, readOnly: true }
            - { name: usr, mountPath: /host/usr, readOnly: true }
            - { name: etc, mountPath: /host/etc, readOnly: true }
      volumes:
        - { name: dev, hostPath: { path: /dev } }
        - { name: proc, hostPath: { path: /proc } }
        - { name: boot, hostPath: { path: /boot } }
        - { name: lib-modules, hostPath: { path: /lib/modules } }
        - { name: usr, hostPath: { path: /usr } }
        - { name: etc, hostPath: { path: /etc } }
