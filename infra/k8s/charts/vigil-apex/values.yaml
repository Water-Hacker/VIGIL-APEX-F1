# VIGIL APEX — base values. Override per-env via values-{dev,prod}.yaml.
#
# Naming convention: every resource is `vigil-apex-<component>` so
# multi-tenant clusters can install us into a non-default namespace
# without collisions. The shared `_helpers.tpl` derives names from
# `.Values.fullnameOverride` when set — we pin it here so the rendered
# name matches the convention regardless of the Helm release name.
# Operators installing under a different release name must override.
fullnameOverride: vigil-apex

global:
  # Pinned by the architect; bumps require a decision-log entry.
  imageRegistry: ghcr.io/water-hacker/vigil-apex
  imagePullPolicy: IfNotPresent
  # Per-cluster region label propagated onto every Pod for the
  # F11 multi-region failover script.
  clusterRegion: cm-yaounde
  # Architect-pinned image tag root. Per-component overrides allowed
  # below; default keeps every image at appVersion.
  imageTag: '0.1.0'

# StorageClass — operations override per cluster. `""` means cluster
# default; named SCs (e.g. "fast-ssd") are honoured if present.
storageClass: ''

# Pod-security standards — `restricted` per the SRD §17. Anything
# weaker requires architect sign-off in decisions/log.md.
podSecurity:
  enforced: restricted
  audit: restricted
  warn: restricted

# ----------------------------------------------------------------------
# Data plane
# ----------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: postgres
    tag: '16.4-alpine'
  resources:
    requests: { memory: '1Gi', cpu: '500m' }
    limits: { memory: '8Gi', cpu: '4' }
  persistence:
    size: 200Gi
  # Tuning passed into postgresql.conf via the ConfigMap
  config:
    max_connections: 200
    shared_buffers: 512MB
    work_mem: 16MB
    statement_timeout: 30000
    idle_in_transaction_session_timeout: 300000
  # HA mode (Patroni). Off in dev; enabled in values-cluster.yaml for
  # production. When enabled, postgres-patroni-statefulset.yaml ships
  # the 3-replica Patroni cluster + ConfigMap; the single-replica
  # statefulset is suppressed.
  ha:
    enabled: false
    backend: patroni
    image:
      repository: ghcr.io/zalando/spilo-16
      tag: '3.2-p2'
    replicaCount: 3
    clusterName: vigil-postgres-ha
    synchronousMode: true
    synchronousNodeCount: 1
    maxLagOnFailover: 16777216
    masterStartTimeout: 30

redis:
  enabled: true
  image:
    repository: redis
    tag: '7.4-alpine'
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '8Gi', cpu: '2' }
  persistence:
    size: 50Gi
  config:
    maxmemory: '6gb'
    maxmemoryPolicy: 'noeviction'
  # HA mode (Sentinel). Off in dev; enabled in values-cluster.yaml.
  ha:
    enabled: false
    backend: sentinel
    replicaCount: 3
    sentinel:
      enabled: true
      replicaCount: 3
      quorum: 2
      downAfterMilliseconds: 5000
      failoverTimeout: 30000
      parallelSyncs: 1
    masterReplica:
      enabled: true
      replicaCount: 3
      minReplicasToWrite: 1
      minReplicasMaxLag: 10

vault:
  enabled: true
  image:
    repository: hashicorp/vault
    tag: '1.17.5'
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '2Gi', cpu: '1' }
  persistence:
    size: 20Gi
  # The unseal Shamir shares are NOT chart-managed — they're a
  # per-cluster Secret created by the operator after install.
  config:
    address: '0.0.0.0:8200'
    api_addr: 'http://vigil-vault:8200'
    cluster_addr: 'http://vigil-vault:8201'
  # HA mode (Raft). Off in dev; enabled in values-cluster.yaml.
  ha:
    enabled: false
    replicaCount: 3
    performanceMultiplier: 5
    transit:
      address: 'https://n02.vigilapex.cm:8200'
      keyName: vigil-unseal
      mountPath: 'transit/'

