# ----------------------------------------------------------------------
# UI plane
# ----------------------------------------------------------------------
dashboard:
  enabled: true
  image:
    repository: vigil-apex/dashboard
    tag: '0.1.0'
  replicas: 3
  env:
    NODE_ENV: production
    SESSION_STORE: redis
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }

caddy:
  enabled: true
  image:
    repository: vigil-caddy
    tag: 'rl-2.8' # B2 — caddy-ratelimit plugin baked in
  replicas: 2
  service:
    # `LoadBalancer` for external traffic. cert-manager handles ACME.
    type: LoadBalancer
  hosts:
    - vigilapex.cm
    - www.vigilapex.cm
    - verify.vigilapex.cm
    - tip.vigilapex.cm
    - kc.vigilapex.cm
  resources:
    requests: { memory: '128Mi', cpu: '100m' }
    limits: { memory: '512Mi', cpu: '500m' }

# ----------------------------------------------------------------------
# Cert-manager — issues the Caddy LoadBalancer's TLS cert
# ----------------------------------------------------------------------
certManager:
  enabled: true
  clusterIssuer: letsencrypt-prod
  email: ops@vigilapex.cm

# ----------------------------------------------------------------------
# ExternalSecrets — Vault as the secret store
# ----------------------------------------------------------------------
externalSecrets:
  enabled: true
  refreshInterval: '1h'
  vaultPath: 'secret/vigil'
  authMethod: kubernetes # SA token → Vault role
  vaultRole: vigil-eso

# ----------------------------------------------------------------------
# NetworkPolicy
# ----------------------------------------------------------------------
networkPolicy:
  enabled: true
  # Components allowed to reach Postgres/Redis/Vault directly.
  dataPlaneClients:
    - vigil-apex-dashboard
    - vigil-apex-worker-pattern
    # other workers add themselves here as their charts land

# ----------------------------------------------------------------------
# Observability — most Phase-1 metrics ship via the worker side-car.
# Cluster mode (values-cluster.yaml) enables full Prometheus +
# Alertmanager + Grafana + Falco stack via the keys below.
# ----------------------------------------------------------------------
observability:
  prometheusScrape: true
  prometheusPort: 9100
  prometheus:
    enabled: false
    image:
      repository: prom/prometheus
      tag: 'v2.55.0'
    replicaCount: 1
    pinnedNode: 'c'
    retention: 30d
    persistence:
      size: 100Gi
    resources:
      requests: { memory: '512Mi', cpu: '250m' }
      limits: { memory: '2Gi', cpu: '1' }
  alertmanager:
    enabled: false
    image:
      repository: prom/alertmanager
      tag: 'v0.27.0'
    replicaCount: 3
    resources:
      requests: { memory: '128Mi', cpu: '100m' }
      limits: { memory: '512Mi', cpu: '500m' }
  grafana:
    enabled: false
    image:
      repository: grafana/grafana
      tag: '11.2.2'
    replicaCount: 2
    resources:
      requests: { memory: '256Mi', cpu: '100m' }
      limits: { memory: '1Gi', cpu: '500m' }
  falco:
    enabled: false
    image:
      repository: falcosecurity/falco-no-driver
      tag: '0.39.0'
    resources:
      requests: { memory: '256Mi', cpu: '100m' }
      limits: { memory: '1Gi', cpu: '500m' }

# ----------------------------------------------------------------------
# etcd — Patroni DCS. Only used when postgres.ha.enabled = true.
# ----------------------------------------------------------------------
etcd:
  enabled: false
  image:
    repository: bitnami/etcd
    tag: '3.5.16-debian-12-r1'
  replicaCount: 3
  quotaBackendBytes: 2147483648
  persistence:
    size: 8Gi
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }

# ----------------------------------------------------------------------
# Neo4j — single-node, pinned to node-b (values-cluster.yaml override).
# ----------------------------------------------------------------------
neo4j:
  enabled: false
  image:
    repository: neo4j
    tag: '5.23-community'
  pinnedNode: 'b'
  heap:
    initial: '4G'
    max: '16G'
  pageCache: '8G'
  resources:
    requests: { memory: '8Gi', cpu: '2' }
    limits: { memory: '32Gi', cpu: '4' }
  persistence:
    size: 200Gi
  backup:
    enabled: true
    schedule: '0 */6 * * *'
    pinnedNode: 'c'
    size: 100Gi

# ----------------------------------------------------------------------
# IPFS — Kubo + ipfs-cluster sidecar, 3 replicas anti-affinity.
# ----------------------------------------------------------------------
ipfs:
  enabled: false
  image:
    repository: ipfs/kubo
    tag: 'v0.30.0'
  replicaCount: 3
  persistence:
    size: 500Gi
  resources:
    requests: { memory: '1Gi', cpu: '500m' }
    limits: { memory: '8Gi', cpu: '2' }

ipfsCluster:
  enabled: false
  image:
    repository: ipfs/ipfs-cluster
    tag: 'v1.1.2'
  config:
    replicationFactorMin: 2
    replicationFactorMax: 3
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }

# ----------------------------------------------------------------------
# Hyperledger Fabric — 3-orderer Raft + Org1 peer.
# ----------------------------------------------------------------------
fabricOrderer:
  enabled: false
  image:
    repository: hyperledger/fabric-orderer
    tag: '2.5.10'
  replicaCount: 3
  persistence:
    size: 20Gi
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '2Gi', cpu: '1' }

fabricPeer:
  enabled: false
  image:
    repository: hyperledger/fabric-peer
    tag: '2.5.10'
  pinnedNode: 'a'
  persistence:
    size: 20Gi
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '2Gi', cpu: '1' }

# ----------------------------------------------------------------------
# Tor — singleton, pinned, hidden-service keys via Secret.
# ----------------------------------------------------------------------
tor:
  enabled: false
  image:
    repository: dperson/torproxy
    tag: 'latest'
  pinnedNode: 'a'
  upstream: 'vigil-apex-caddy:80'
  bridges:
    enabled: false
  persistence:
    size: 2Gi
  resources:
    requests: { memory: '128Mi', cpu: '100m' }
    limits: { memory: '512Mi', cpu: '1' }

# ----------------------------------------------------------------------
# Keycloak — 3 replicas, anti-affinity, OIDC for operator dashboard.
# ----------------------------------------------------------------------
keycloak:
  enabled: false
  image:
    repository: quay.io/keycloak/keycloak
    tag: '25.0.6'
  replicaCount: 3
  hostname: 'kc.vigilapex.cm'
  resources:
    requests: { memory: '1Gi', cpu: '500m' }
    limits: { memory: '4Gi', cpu: '2' }

# ----------------------------------------------------------------------
# Phase 12a — cosign image-signature verification (modes 9.9 + 10.8)
# ----------------------------------------------------------------------
#
# `enabled: false` by default — Phase 12a ships the framework only.
# Activation prerequisites:
#   1. Kyverno operator installed in the cluster (kyverno.io CRDs).
#   2. cosignVerify.publicKey populated with the architect's cosign
#      public key (same key whose private half lives in the
#      `COSIGN_PRIVATE_KEY` GitHub Actions secret).
#   3. Every chart-deployed image signed by the security.yml
