# VIGIL APEX — base values. Override per-env via values-{dev,prod}.yaml.
#
# Naming convention: every resource is `vigil-apex-<component>` so
# multi-tenant clusters can install us into a non-default namespace
# without collisions. The shared `_helpers.tpl` derives names from
# `.Values.fullnameOverride` when set — we pin it here so the rendered
# name matches the convention regardless of the Helm release name.
# Operators installing under a different release name must override.
fullnameOverride: vigil-apex

global:
  # Pinned by the architect; bumps require a decision-log entry.
  imageRegistry: ghcr.io/water-hacker/vigil-apex
  imagePullPolicy: IfNotPresent
  # Per-cluster region label propagated onto every Pod for the
  # F11 multi-region failover script.
  clusterRegion: cm-yaounde
  # Architect-pinned image tag root. Per-component overrides allowed
  # below; default keeps every image at appVersion.
  imageTag: '0.1.0'

# StorageClass — operations override per cluster. `""` means cluster
# default; named SCs (e.g. "fast-ssd") are honoured if present.
storageClass: ''

# Pod-security standards — `restricted` per the SRD §17. Anything
# weaker requires architect sign-off in decisions/log.md.
podSecurity:
  enforced: restricted
  audit: restricted
  warn: restricted

# ----------------------------------------------------------------------
# Data plane
# ----------------------------------------------------------------------
postgres:
  enabled: true
  image:
    repository: postgres
    tag: '16.4-alpine'
  resources:
    requests: { memory: '1Gi', cpu: '500m' }
    limits: { memory: '8Gi', cpu: '4' }
  persistence:
    size: 200Gi
  # Tuning passed into postgresql.conf via the ConfigMap
  config:
    max_connections: 200
    shared_buffers: 512MB
    work_mem: 16MB
    statement_timeout: 30000
    idle_in_transaction_session_timeout: 300000
  # HA mode (Patroni). Off in dev; enabled in values-cluster.yaml for
  # production. When enabled, postgres-patroni-statefulset.yaml ships
  # the 3-replica Patroni cluster + ConfigMap; the single-replica
  # statefulset is suppressed.
  ha:
    enabled: false
    backend: patroni
    image:
      repository: ghcr.io/zalando/spilo-16
      tag: '3.2-p2'
    replicaCount: 3
    clusterName: vigil-postgres-ha
    synchronousMode: true
    synchronousNodeCount: 1
    maxLagOnFailover: 16777216
    masterStartTimeout: 30

redis:
  enabled: true
  image:
    repository: redis
    tag: '7.4-alpine'
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '8Gi', cpu: '2' }
  persistence:
    size: 50Gi
  config:
    maxmemory: '6gb'
    maxmemoryPolicy: 'noeviction'
  # HA mode (Sentinel). Off in dev; enabled in values-cluster.yaml.
  ha:
    enabled: false
    backend: sentinel
    replicaCount: 3
    sentinel:
      enabled: true
      replicaCount: 3
      quorum: 2
      downAfterMilliseconds: 5000
      failoverTimeout: 30000
      parallelSyncs: 1
    masterReplica:
      enabled: true
      replicaCount: 3
      minReplicasToWrite: 1
      minReplicasMaxLag: 10

vault:
  enabled: true
  image:
    repository: hashicorp/vault
    tag: '1.17.5'
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '2Gi', cpu: '1' }
  persistence:
    size: 20Gi
  # The unseal Shamir shares are NOT chart-managed — they're a
  # per-cluster Secret created by the operator after install.
  config:
    address: '0.0.0.0:8200'
    api_addr: 'http://vigil-vault:8200'
    cluster_addr: 'http://vigil-vault:8201'
  # HA mode (Raft). Off in dev; enabled in values-cluster.yaml.
  ha:
    enabled: false
    replicaCount: 3
    performanceMultiplier: 5
    transit:
      address: 'https://n02.vigilapex.cm:8200'
      keyName: vigil-unseal
      mountPath: 'transit/'

# ----------------------------------------------------------------------
# Worker plane (parametric fan-out)
# ----------------------------------------------------------------------
workers:
  - name: worker-pattern
    image:
      repository: vigil-apex/worker-pattern
      tag: '0.1.0'
    replicas: 3
    env:
      OTEL_SERVICE_NAME: worker-pattern
      WORKER_NAME: worker-pattern
      PROMETHEUS_PORT: '9100'
    resources:
      requests: { memory: '512Mi', cpu: '250m' }
      limits: { memory: '2Gi', cpu: '1' }
    autoscaling:
      enabled: false
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilization: 70
  # Add new workers here — the worker-deployment.yaml template iterates.
  # Each worker's Deployment, Service, and (optional) HPA fall out for
  # free; ExternalSecret reuse is automatic via the shared
  # `vigil-apex-worker-secrets` reference.

# ----------------------------------------------------------------------
# UI plane
# ----------------------------------------------------------------------
dashboard:
  enabled: true
  image:
    repository: vigil-apex/dashboard
    tag: '0.1.0'
  replicas: 3
  env:
    NODE_ENV: production
    SESSION_STORE: redis
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }

caddy:
  enabled: true
  image:
    repository: vigil-caddy
    tag: 'rl-2.8' # B2 — caddy-ratelimit plugin baked in
  replicas: 2
  service:
    # `LoadBalancer` for external traffic. cert-manager handles ACME.
    type: LoadBalancer
  hosts:
    - vigilapex.cm
    - www.vigilapex.cm
    - verify.vigilapex.cm
    - tip.vigilapex.cm
    - kc.vigilapex.cm
  resources:
    requests: { memory: '128Mi', cpu: '100m' }
    limits: { memory: '512Mi', cpu: '500m' }

# ----------------------------------------------------------------------
# Cert-manager — issues the Caddy LoadBalancer's TLS cert
# ----------------------------------------------------------------------
certManager:
  enabled: true
  clusterIssuer: letsencrypt-prod
  email: ops@vigilapex.cm

# ----------------------------------------------------------------------
# ExternalSecrets — Vault as the secret store
# ----------------------------------------------------------------------
externalSecrets:
  enabled: true
  refreshInterval: '1h'
  vaultPath: 'secret/vigil'
  authMethod: kubernetes # SA token → Vault role
  vaultRole: vigil-eso

# ----------------------------------------------------------------------
# NetworkPolicy
# ----------------------------------------------------------------------
networkPolicy:
  enabled: true
  # Components allowed to reach Postgres/Redis/Vault directly.
  dataPlaneClients:
    - vigil-apex-dashboard
    - vigil-apex-worker-pattern
    # other workers add themselves here as their charts land

# ----------------------------------------------------------------------
# Observability — most Phase-1 metrics ship via the worker side-car.
# Cluster mode (values-cluster.yaml) enables full Prometheus +
# Alertmanager + Grafana + Falco stack via the keys below.
# ----------------------------------------------------------------------
observability:
  prometheusScrape: true
  prometheusPort: 9100
  prometheus:
    enabled: false
    image:
      repository: prom/prometheus
      tag: 'v2.55.0'
    replicaCount: 1
    pinnedNode: 'c'
    retention: 30d
    persistence:
      size: 100Gi
    resources:
      requests: { memory: '512Mi', cpu: '250m' }
      limits: { memory: '2Gi', cpu: '1' }
  alertmanager:
    enabled: false
    image:
      repository: prom/alertmanager
      tag: 'v0.27.0'
    replicaCount: 3
    resources:
      requests: { memory: '128Mi', cpu: '100m' }
      limits: { memory: '512Mi', cpu: '500m' }
  grafana:
    enabled: false
    image:
      repository: grafana/grafana
      tag: '11.2.2'
    replicaCount: 2
    resources:
      requests: { memory: '256Mi', cpu: '100m' }
      limits: { memory: '1Gi', cpu: '500m' }
  falco:
    enabled: false
    image:
      repository: falcosecurity/falco-no-driver
      tag: '0.39.0'
    resources:
      requests: { memory: '256Mi', cpu: '100m' }
      limits: { memory: '1Gi', cpu: '500m' }

# ----------------------------------------------------------------------
# etcd — Patroni DCS. Only used when postgres.ha.enabled = true.
# ----------------------------------------------------------------------
etcd:
  enabled: false
  image:
    repository: bitnami/etcd
    tag: '3.5.16-debian-12-r1'
  replicaCount: 3
  quotaBackendBytes: 2147483648
  persistence:
    size: 8Gi
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }

# ----------------------------------------------------------------------
# Neo4j — single-node, pinned to node-b (values-cluster.yaml override).
# ----------------------------------------------------------------------
neo4j:
  enabled: false
  image:
    repository: neo4j
    tag: '5.23-community'
  pinnedNode: 'b'
  heap:
    initial: '4G'
    max: '16G'
  pageCache: '8G'
  resources:
    requests: { memory: '8Gi', cpu: '2' }
    limits: { memory: '32Gi', cpu: '4' }
  persistence:
    size: 200Gi
  backup:
    enabled: true
    schedule: '0 */6 * * *'
    pinnedNode: 'c'
    size: 100Gi

# ----------------------------------------------------------------------
# IPFS — Kubo + ipfs-cluster sidecar, 3 replicas anti-affinity.
# ----------------------------------------------------------------------
ipfs:
  enabled: false
  image:
    repository: ipfs/kubo
    tag: 'v0.30.0'
  replicaCount: 3
  persistence:
    size: 500Gi
  resources:
    requests: { memory: '1Gi', cpu: '500m' }
    limits: { memory: '8Gi', cpu: '2' }

ipfsCluster:
  enabled: false
  image:
    repository: ipfs/ipfs-cluster
    tag: 'v1.1.2'
  config:
    replicationFactorMin: 2
    replicationFactorMax: 3
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }

# ----------------------------------------------------------------------
# Hyperledger Fabric — 3-orderer Raft + Org1 peer.
# ----------------------------------------------------------------------
fabricOrderer:
  enabled: false
  image:
    repository: hyperledger/fabric-orderer
    tag: '2.5.10'
  replicaCount: 3
  persistence:
    size: 20Gi
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '2Gi', cpu: '1' }

fabricPeer:
  enabled: false
  image:
    repository: hyperledger/fabric-peer
    tag: '2.5.10'
  pinnedNode: 'a'
  persistence:
    size: 20Gi
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '2Gi', cpu: '1' }

# ----------------------------------------------------------------------
# Tor — singleton, pinned, hidden-service keys via Secret.
# ----------------------------------------------------------------------
tor:
  enabled: false
  image:
    repository: dperson/torproxy
    tag: 'latest'
  pinnedNode: 'a'
  upstream: 'vigil-apex-caddy:80'
  bridges:
    enabled: false
  persistence:
    size: 2Gi
  resources:
    requests: { memory: '128Mi', cpu: '100m' }
    limits: { memory: '512Mi', cpu: '1' }

# ----------------------------------------------------------------------
# Keycloak — 3 replicas, anti-affinity, OIDC for operator dashboard.
# ----------------------------------------------------------------------
keycloak:
  enabled: false
  image:
    repository: quay.io/keycloak/keycloak
    tag: '25.0.6'
  replicaCount: 3
  hostname: 'kc.vigilapex.cm'
  resources:
    requests: { memory: '1Gi', cpu: '500m' }
    limits: { memory: '4Gi', cpu: '2' }
