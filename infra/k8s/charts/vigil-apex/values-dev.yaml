# Dev-cluster overrides — kind / minikube / k3d. Use for the
# install smoke described in docs/runbooks/R8-k8s-cutover.md.

global:
  clusterRegion: dev-local

storageClass: 'standard' # kind/minikube default

postgres:
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }
  persistence:
    size: 5Gi
  config:
    max_connections: 50
    shared_buffers: 128MB

redis:
  resources:
    requests: { memory: '128Mi', cpu: '50m' }
    limits: { memory: '512Mi', cpu: '250m' }
  persistence:
    size: 1Gi
  config:
    maxmemory: '256mb'
    maxmemoryPolicy: 'allkeys-lru'

vault:
  resources:
    requests: { memory: '128Mi', cpu: '50m' }
    limits: { memory: '512Mi', cpu: '250m' }
  persistence:
    size: 1Gi

# T11 follow-up of TODO.md sweep (2026-05-17) — workers list inherited
# from values.yaml (full 25-worker fleet). Pre-T11 this block overrode
# workers[] to a single entry (worker-pattern); after T11 the symmetric
# override was removed from values-prod.yaml. Helm overlay semantics
# replace arrays, so keeping a dev override would force the
# helm-values-drift gate's worker-parity check (T11-aware: walks
# effective workers per file) to flag 24 workers as "in prod but not
# in dev". Dev inherits the canonical fleet for the same reason.
#
# Per-worker dev tuning (smaller resources, dev image tag) is achievable
# via additional override files or a future per-worker overlay mechanism.
# For now, dev runs the same 25-worker fleet as prod with values.yaml's
# defaults (each worker has resources.limits.memory <= 2 GiB; the
# 25-worker total is well within a kind/minikube budget on a workstation).

dashboard:
  replicas: 1
  resources:
    requests: { memory: '128Mi', cpu: '50m' }
    limits: { memory: '512Mi', cpu: '500m' }

caddy:
  replicas: 1
  service:
    type: NodePort # kind / minikube don't have LB by default
  hosts:
    - localhost

certManager:
  enabled: false # Dev clusters use self-signed via Caddy's internal mTLS

externalSecrets:
  enabled: true
  refreshInterval: '5m'
  vaultRole: vigil-eso-dev
