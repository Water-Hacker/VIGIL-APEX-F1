# Dev-cluster overrides — kind / minikube / k3d. Use for the
# install smoke described in docs/runbooks/R8-k8s-cutover.md.

global:
  clusterRegion: dev-local

storageClass: 'standard' # kind/minikube default

postgres:
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }
  persistence:
    size: 5Gi
  config:
    max_connections: 50
    shared_buffers: 128MB

redis:
  resources:
    requests: { memory: '128Mi', cpu: '50m' }
    limits: { memory: '512Mi', cpu: '250m' }
  persistence:
    size: 1Gi
  config:
    maxmemory: '256mb'
    maxmemoryPolicy: 'allkeys-lru'

vault:
  resources:
    requests: { memory: '128Mi', cpu: '50m' }
    limits: { memory: '512Mi', cpu: '250m' }
  persistence:
    size: 1Gi

# Concern 1 of the post-#69 followup (2026-05-17) — dev runs ONLY
# worker-pattern for fast-iteration loops. The other 24 workers stay
# in the canonical values.yaml workers[] list (so the
# helm-values-drift worker-parity check sees both envs sharing the
# SAME workers[] decl), but they're disabled at render time via the
# `workersDisabled[]` mechanism the worker-{deployment,service,hpa}
# templates honour.
#
# To run a different subset in dev, edit this list. To run ALL
# workers in dev, set `workersDisabled: []` (or delete this block).
workersDisabled:
  - worker-pattern-discovery
  - worker-extractor
  - worker-entity
  - worker-document
  - worker-score
  - worker-counter-evidence
  - worker-anchor
  - worker-dossier
  - worker-conac-sftp
  - worker-governance
  - worker-tip-triage
  - worker-tip-channels
  - worker-audit-watch
  - worker-reconcil-audit
  - worker-fabric-bridge
  - worker-federation-agent
  - worker-federation-receiver
  - worker-outcome-feedback
  - worker-adapter-repair
  - worker-minfi-api
  - worker-satellite
  - worker-image-forensics
  - audit-bridge
  - adapter-runner

dashboard:
  replicas: 1
  resources:
    requests: { memory: '128Mi', cpu: '50m' }
    limits: { memory: '512Mi', cpu: '500m' }

caddy:
  replicas: 1
  service:
    type: NodePort # kind / minikube don't have LB by default
  hosts:
    - localhost

certManager:
  enabled: false # Dev clusters use self-signed via Caddy's internal mTLS

externalSecrets:
  enabled: true
  refreshInterval: '5m'
  vaultRole: vigil-eso-dev
