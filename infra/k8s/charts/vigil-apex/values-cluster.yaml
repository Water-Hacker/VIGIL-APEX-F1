# VIGIL APEX — HA-cluster overrides for the 3-node DL380 Gen11 deployment.
#
# Apply on top of values.yaml + values-prod.yaml:
#   helm upgrade --install vigil-apex ./infra/k8s/charts/vigil-apex \
#     -f infra/k8s/charts/vigil-apex/values.yaml \
#     -f infra/k8s/charts/vigil-apex/values-prod.yaml \
#     -f infra/k8s/charts/vigil-apex/values-cluster.yaml
#
# Plan reference: /home/kali/.claude/plans/crispy-pondering-teapot.md
#  §"Replication / quorum rules", §"Roles per node".
#
# Once the 3 DL380 Gen11 nodes are racked, OS-installed, labelled
# (vigil.cluster/node=a|b|c), and joined to k3s, this single file flips
# every service into its HA configuration. No code changes required.

global:
  clusterMode: ha-3-node
  imagePullPolicy: IfNotPresent

# ─── Stateful — control plane ─────────────────────────────────────────────

etcd:
  enabled: true
  replicaCount: 3
  persistence:
    size: 8Gi

vault:
  ha:
    enabled: true
    replicaCount: 3
    performanceMultiplier: 5
    transit:
      address: 'https://n02.vigilapex.cm:8200'
      keyName: vigil-unseal
      mountPath: 'transit/'
  persistence:
    size: 20Gi
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '2Gi', cpu: '1' }

fabricOrderer:
  enabled: true
  replicaCount: 3
  persistence:
    size: 20Gi

# ─── Stateful — data plane ────────────────────────────────────────────────

postgres:
  ha:
    enabled: true
    replicaCount: 3
    clusterName: vigil-postgres-ha
    synchronousMode: true
    synchronousNodeCount: 1
  image:
    repository: ghcr.io/zalando/spilo-16
    tag: '3.2-p2'
  persistence:
    size: 1Ti
  resources:
    requests: { memory: '2Gi', cpu: '1' }
    limits: { memory: '16Gi', cpu: '4' }

redis:
  ha:
    enabled: true
    replicaCount: 3
    sentinel:
      quorum: 2
      downAfterMilliseconds: 5000
      failoverTimeout: 30000
      parallelSyncs: 1
    masterReplica:
      replicaCount: 3
      minReplicasToWrite: 1
      minReplicasMaxLag: 10
  persistence:
    size: 50Gi

neo4j:
  enabled: true
  pinnedNode: 'b'
  backup:
    enabled: true
    pinnedNode: 'c'
    schedule: '0 */6 * * *'
  resources:
    requests: { memory: '8Gi', cpu: '2' }
    limits: { memory: '32Gi', cpu: '4' }

ipfs:
  enabled: true
  replicaCount: 3
  persistence:
    size: 500Gi

ipfsCluster:
  enabled: true
  config:
    replicationFactorMin: 2
    replicationFactorMax: 3

fabricPeer:
  enabled: true
  pinnedNode: 'a'

# ─── Stateless — workers + dashboard + edge ───────────────────────────────

dashboard:
  replicas: 3

caddy:
  replicas: 3 # one per node — runs behind keepalived VIP

keycloak:
  enabled: true
  replicaCount: 3

tor:
  enabled: true
  pinnedNode: 'a'

# ─── Observability ────────────────────────────────────────────────────────

observability:
  prometheus:
    enabled: true
    pinnedNode: 'c'
    retention: 30d
    persistence:
      size: 100Gi
  alertmanager:
    enabled: true
    replicaCount: 3
  grafana:
    enabled: true
    replicaCount: 2
  falco:
    enabled: true
