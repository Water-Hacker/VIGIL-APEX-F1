# VIGIL APEX — HA-cluster overrides for the 3-node DL380 Gen11 deployment.
#
# Hardware tier: AI / Security Node (per DECISION-020) —
#   2× Intel Xeon Platinum 8xxx (32c+/socket = 64c+ per node)
#   1 TB+ DDR5-5200 RDIMM
#   ~19 TB usable NVMe per node (4× 1.92 TB hot + 8× 3.84 TB warm, RAID-10)
#   4–8× NVIDIA L4 (24 GB GDDR6 each; 96–192 GB pooled VRAM per node)
#   2× 1600 W Platinum PSU, HPE iLO 6, TPM 2.0
# Reference: docs/decisions/decision-020-dl380-ai-security-tier.md
#
# Resource limits below are scaled to the AI/Security tier — 4× the
# leaner Gold/256 GB spec the previous revision targeted. If procurement
# falls back to the leaner spec (see DECISION-020 re-open triggers),
# halve every memory limit and drop the `nvidia.com/gpu:` sections.
#
# Apply on top of values-prod.yaml:
#   helm upgrade --install vigil-apex ./infra/k8s/charts/vigil-apex \
#     -f infra/k8s/charts/vigil-apex/values.yaml \
#     -f infra/k8s/charts/vigil-apex/values-prod.yaml \
#     -f infra/k8s/charts/vigil-apex/values-cluster.yaml
#
# Reference: /home/kali/.claude/plans/crispy-pondering-teapot.md
#  §"Replication / quorum rules", §"Roles per node".
#
# The existing chart skeleton (29 templates) covers the single-host deploy.
# This values file documents the cluster-mode intent. Some sections turn on
# subcharts (etcd, patroni-operator); others rewrite the existing
# StatefulSets to 3 replicas with node-affinity pinning. A follow-up
# templates pass will land the chart-side template work; the configs +
# host-bootstrap scripts (14-patroni-init.sh, 15-keepalived-vip.sh) are
# the canonical source for cluster setup until then.

global:
  # Pinned per-node affinity. Node labels are set by infra/host-bootstrap/
  # 01-system-prep.sh which writes /etc/kubernetes/node-labels.conf based on
  # /etc/vigil/cluster-node.env. The labels in use:
  #   vigil.cluster/node=a|b|c
  #   vigil.cluster/role=control-plane,data-plane,stateless
  clusterMode: ha-3-node

  # Topology spread constraint applied to every multi-replica Deployment:
  # max-skew 1 forces replicas to live on different nodes whenever possible.
  topologySpreadConstraints:
    enabled: true
    maxSkew: 1
    topologyKey: vigil.cluster/node

# ============================================================================
# Stateful — control plane
# ============================================================================

# etcd ensemble — used by Patroni as its distributed configuration store.
# SEPARATE from k3s's embedded etcd (which is for k8s control plane only).
# This etcd is a dedicated 3-peer cluster for Patroni-only state.
etcd:
  enabled: true
  image:
    repository: bitnami/etcd
    tag: '3.5.16-debian-12-r1'
  # 3 replicas — quorum 2. Each pod pinned to one cluster node by
  # nodeAffinity so the ensemble survives a single node loss.
  replicaCount: 3
  auth:
    rbac:
      create: true
      rootPassword: '' # set by ExternalSecrets from Vault
  persistence:
    size: 8Gi
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels: { app.kubernetes.io/name: etcd }
          topologyKey: vigil.cluster/node

# Vault Raft — 3-voter HA. Replaces the single-node file backend.
# config.hcl is rendered into a ConfigMap from infra/docker/vault/config.hcl
# (which now ships the Raft + Transit auto-unseal directives).
vault:
  replicas: 3
  ha:
    enabled: true
    raft:
      enabled: true
      # node_id is set per-pod via downward API (metadata.name).
      retryJoin:
        - 'https://vigil-apex-vault-0.vigil-apex-vault:8200'
        - 'https://vigil-apex-vault-1.vigil-apex-vault:8200'
        - 'https://vigil-apex-vault-2.vigil-apex-vault:8200'
  seal:
    type: transit
    # The transit token + N02 endpoint are provisioned by ExternalSecrets
    # from Vault path `secret/vigil-cluster/transit-unseal`.
    address: '' # set via externalsecret
    tokenFromSecret: vault-transit-token
    keyName: vigil-unseal
    mountPath: 'transit/'
  persistence:
    size: 20Gi
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '2Gi', cpu: '1' }
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels: { app.kubernetes.io/name: vault }
          topologyKey: vigil.cluster/node

# Fabric orderer — 3-orderer Raft consenters, one per cluster node.
fabricOrderer:
  enabled: true
  image:
    repository: hyperledger/fabric-orderer
    tag: '2.5.10'
  replicaCount: 3
  consensusType: etcdraft
  # Genesis block is generated by infra/host-bootstrap during cluster init
  # (configtxgen consuming infra/docker/fabric/configtx.yaml).
  genesisBlockSecret: fabric-genesis-block
  persistence:
    size: 20Gi
  resources:
    requests: { memory: '512Mi', cpu: '250m' }
    limits: { memory: '2Gi', cpu: '1' }
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels: { app.kubernetes.io/name: fabric-orderer }
          topologyKey: vigil.cluster/node

# ============================================================================
# Stateful — data plane
# ============================================================================

# Postgres — Patroni-managed HA. The existing postgres-statefulset.yaml
# (single-replica) is superseded by a Patroni operator subchart in this
# values file. The Patroni operator handles leader election + standby
# bootstrap automatically; we declare the desired cluster shape.
postgres:
  ha:
    enabled: true
    backend: patroni
    operator:
      enabled: true # spiff/postgres-operator or zalando/postgres-operator
      chart: postgres-operator
      version: '1.14.0'
    cluster:
      name: vigil-postgres-ha
      replicas: 3 # 1 primary + 2 sync standbys
      synchronousMode: true
      synchronousNodeCount: 1 # ANY 1 standby must ack
      maxLagOnFailover: 16777216 # 16 MB
      masterStartTimeout: 30
      # WAL archive ships to Hetzner N02 via rclone sidecar.
      walArchive:
        enabled: true
        destination: rclone:hetzner-n02:/vigil/wal-archive/
  resources:
    # DECISION-020: 4× memory budget for Postgres on the AI/Security tier.
    # shared_buffers can be sized to ~256 GB (25% of 1 TB node RAM) — moves
    # heavy OLTP working set into RAM.
    requests: { memory: '32Gi', cpu: '4' }
    limits: { memory: '64Gi', cpu: '16' }
  persistence:
    size: 1Ti # NVMe hot tier on each node
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels: { app.kubernetes.io/name: postgres }
          topologyKey: vigil.cluster/node

# Redis Sentinel — 1 primary + 2 replicas + 3 Sentinels (one per node).
redis:
  ha:
    enabled: true
    backend: sentinel
    sentinel:
      enabled: true
      replicaCount: 3
      quorum: 2
      downAfterMilliseconds: 5000
      failoverTimeout: 30000
      parallelSyncs: 1
    masterReplica:
      enabled: true
      replicaCount: 3 # 1 primary + 2 replicas
      minReplicasToWrite: 1
      minReplicasMaxLag: 10
  persistence:
    size: 50Gi
  resources:
    # DECISION-020: 4× memory budget for Redis. Larger maxmemory absorbs
    # higher stream-length retention + LLM call-result cache.
    requests: { memory: '4Gi', cpu: '1' }
    limits: { memory: '32Gi', cpu: '4' }
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels: { app.kubernetes.io/name: redis }
          topologyKey: vigil.cluster/node

# Neo4j Community — single primary on Node B, scheduled dump to Node C.
# Workers fall back to Postgres entity tables when Neo4j is down (per
# worker-pattern's existing fallback code).
neo4j:
  enabled: true
  image:
    repository: neo4j
    tag: '5.23-community'
  edition: community
  # Pinned to Node B by nodeAffinity so the data directory stays put.
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: vigil.cluster/node
              operator: In
              values: ['b']
  backup:
    enabled: true
    schedule: '0 */6 * * *' # every 6 hours
    destinationPVC: neo4j-backup-pvc
  resources:
    # DECISION-020: 4× memory budget for Neo4j. 96 GB heap +
    # 32 GB page cache fits the entity graph at the projected
    # entity-resolution corpus size.
    requests: { memory: '32Gi', cpu: '4' }
    limits: { memory: '128Gi', cpu: '16' }
  persistence:
    size: 200Gi

# IPFS Cluster — 3 Kubo peers + 3 cluster peers, replication factor 2/3.
ipfs:
  enabled: true
  image:
    repository: ipfs/kubo
    tag: 'v0.30.0'
  replicaCount: 3
  resources:
    # DECISION-020: with no SAS HDD bulk tier, IPFS pinset lives on the
    # warm NVMe tier (~15.36 TB usable per node). The increased memory
    # accommodates a larger pin index + pin-cache.
    requests: { memory: '4Gi', cpu: '1' }
    limits: { memory: '32Gi', cpu: '4' }
  persistence:
    # DECISION-020: bulk-tier collapse — IPFS now lives on the warm
    # NVMe pool (was SAS HDD bulk in the previous spec). 5 TiB per
    # node leaves headroom for evidence growth without committing the
    # full warm budget.
    size: 5Ti
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels: { app.kubernetes.io/name: ipfs }
          topologyKey: vigil.cluster/node

ipfsCluster:
  enabled: true
  image:
    repository: ipfs/ipfs-cluster
    tag: 'v1.1.2'
  replicaCount: 3
  config:
    # service.json template lives at infra/docker/ipfs-cluster/service.json
    # — rendered into a ConfigMap by the chart.
    replicationFactorMin: 2
    replicationFactorMax: 3
  resources:
    requests: { memory: '256Mi', cpu: '100m' }
    limits: { memory: '1Gi', cpu: '500m' }
  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels: { app.kubernetes.io/name: ipfs-cluster }
          topologyKey: vigil.cluster/node

# ============================================================================
# Stateless — dashboard + workers
# ============================================================================
#
# Already cluster-aware in the existing chart (see workers list in
# values.yaml). The only adjustment here is topology-spread to ensure
# replicas land on different nodes.

dashboard:
  replicas: 3
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: vigil.cluster/node
      whenUnsatisfiable: DoNotSchedule
      labelSelector:
        matchLabels:
          app.kubernetes.io/name: dashboard

# Workers — every worker gets at least 2 replicas with anti-affinity.
# The existing values.yaml workers[] list is left as-is; this section
# documents the per-worker minimum for production.
workersDefaults:
  replicas: 2
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: vigil.cluster/node
      whenUnsatisfiable: ScheduleAnyway
      labelSelector:
        matchLabels:
          app.kubernetes.io/component: worker

# ============================================================================
# Edge — Caddy DaemonSet behind keepalived VIP
# ============================================================================

caddy:
  daemonSet: true # one pod per node
  vip:
    enabled: true
    address: 10.50.0.250/24
    interface: bond0
    # keepalived itself runs on the HOST, not as a pod, because VRRP needs
    # raw sockets. Pod priority follows node label vigil.cluster/node value.
    managedBy: keepalived-host-bootstrap
  resources:
    requests: { memory: '128Mi', cpu: '100m' }
    limits: { memory: '512Mi', cpu: '500m' }

# Tor — pinned to a single node (multiple .onion listeners would force
# v3 hidden-service re-keying, breaking the existing onion address).
tor:
  enabled: true
  replicaCount: 1
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: vigil.cluster/node
              operator: In
              values: ['a']
  persistence:
    # Hidden-service keys MUST survive pod restart. Pinned to node-a's
    # local-path-provisioner volume.
    storageClass: local-path
    size: 1Gi

# ============================================================================
# Observability — Prometheus / Grafana / Alertmanager / Falco / Logstash
# ============================================================================

observability:
  prometheus:
    enabled: true
    replicaCount: 1 # pinned to node-c; Thanos sidecar for HA in Phase 3
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: vigil.cluster/node
                operator: In
                values: ['c']
    persistence:
      size: 100Gi
    retention: 30d
  alertmanager:
    enabled: true
    replicaCount: 3 # one per node — HA via gossip mesh
  grafana:
    enabled: true
    replicaCount: 2
  falco:
    enabled: true
    daemonSet: true # one per node — host-level eBPF telemetry

# ============================================================================
# GPU-bound workloads (DECISION-020 — AI/Security Node tier)
# ============================================================================
#
# These sections are gated off until:
#   (a) NVIDIA device plugin is installed in the k3s cluster
#       (`kubectl apply -f https://raw.githubusercontent.com/NVIDIA/k8s-device-plugin/.../nvidia-device-plugin.yml`).
#   (b) DECISION-011 (AI-SAFETY-DOCTRINE) review for local-LLM lands.
#   (c) The architect's procurement closure on the actual GPU count
#       (4× L4 minimum, 8× L4 maximum per node).
#
# Each section's `enabled: false` is the safe default; flip to true
# once the gates above are met and the corresponding worker images
# are published.

# Local LLM inference — Qwen-72B-Instruct-Q4 or DeepSeek-V3-Q4 served
# via vLLM. Wraps the existing `packages/llm/src/providers/` interface
# so the rest of the codebase consumes it through the same LlmRouter.
# Requires a follow-up `packages/llm/src/providers/local-vllm.ts`.
workerLocalLlm:
  enabled: false # DECISION-011 review gate
  image:
    repository: vllm/vllm-openai
    # Pin a specific patch; DECISION-020 §"Procurement order-of-events"
    # marks model-weight verification as a per-deploy step.
    tag: 'v0.6.4'
  replicaCount: 2 # 1 GPU node per replica; cluster has 3 GPU-equipped nodes
  resources:
    requests:
      cpu: '4'
      memory: '32Gi'
      nvidia.com/gpu: 2 # half of a 4-L4 node, or quarter of an 8-L4 node
    limits:
      cpu: '16'
      memory: '128Gi'
      nvidia.com/gpu: 2
  nodeSelector:
    nvidia.com/gpu.present: 'true'
  # Model weights live on a persistent volume so the pod doesn't re-download
  # on every restart. The volume is sha256-verified at mount (cosign + the
  # weight-signing key, landing in the same Phase 12 closure as the image
  # cosign chain).
  modelVolume:
    enabled: true
    size: 200Gi # Qwen-72B-Q4 ≈ 40 GB; DeepSeek-V3-Q4 ≈ 350 GB
    storageClass: local-path

# ZK proof generation — rapidsnark for the council-vote ceremony's
# 3-of-5 partial-signature aggregation. Currently CPU-only at scale 10²;
# moving to GPU keeps the ceremony under the 30-second decision window
# as the council count scales toward 9-of-15 in Phase 3.
workerZkProve:
  enabled: false # follow-up; requires the worker code to land first
  image:
    repository: vigil-apex/worker-zk-prove
    tag: '0.1.0'
  replicaCount: 3 # one per node
  resources:
    requests:
      cpu: '2'
      memory: '8Gi'
      nvidia.com/gpu: 1
    limits:
      cpu: '8'
      memory: '32Gi'
      nvidia.com/gpu: 1
  nodeSelector:
    nvidia.com/gpu.present: 'true'

# Satellite ML acceleration — CUDA-backed NDVI / NDBI computation and
# the future built-up classifier. The existing `worker-satellite`
# `compute_activity` is CPU-only (numpy); a CUDA variant via CuPy
# or rasterio's GDAL-CUDA backend speeds large-scene processing by
# 10-50×.
workerSatelliteCuda:
  enabled: false # follow-up; CuPy + rasterio-cuda pipeline not yet upstreamed
  image:
    repository: vigil-apex/worker-satellite
    tag: '0.2.0-cuda'
  replicaCount: 1 # one per node opportunistic; existing CPU workers handle baseline
  resources:
    requests:
      cpu: '2'
      memory: '8Gi'
      nvidia.com/gpu: 1
    limits:
      cpu: '8'
      memory: '32Gi'
      nvidia.com/gpu: 1
  nodeSelector:
    nvidia.com/gpu.present: 'true'

# Image-forensics ML acceleration — currently OpenCV CPU; can move to
# CUDA-OpenCV for font/signature similarity at higher throughput.
# Same caveat as workerSatelliteCuda: opportunistic, baseline stays CPU.
workerImageForensicsCuda:
  enabled: false
  image:
    repository: vigil-apex/worker-image-forensics
    tag: '0.2.0-cuda'
  replicaCount: 1
  resources:
    requests:
      cpu: '2'
      memory: '8Gi'
      nvidia.com/gpu: 1
    limits:
      cpu: '8'
      memory: '32Gi'
      nvidia.com/gpu: 1
  nodeSelector:
    nvidia.com/gpu.present: 'true'

# Security-node workloads — NIDS/HIDS (Suricata + Falco rules engine
# beyond the per-node DaemonSet) + behaviour-anomaly detection on
# audit-chain traffic.
workerSecurityAnomaly:
  enabled: false # awaits architect's "Security Node" worker design
  image:
    repository: vigil-apex/worker-security-anomaly
    tag: '0.1.0'
  replicaCount: 3
  resources:
    requests:
      cpu: '2'
      memory: '4Gi'
    # CPU-only baseline; GPU optional for ML-classifier ensemble.
    limits:
      cpu: '8'
      memory: '16Gi'
