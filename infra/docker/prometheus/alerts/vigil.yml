groups:
  - name: vigil_apex
    interval: 30s
    rules:
      - alert: AdapterFailing
        expr: rate(vigil_adapter_runs_total{outcome="failed"}[10m]) > 0.5
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: 'Adapter {{ $labels.source }} failing'
          description: 'Source-website change suspected. Check first-contact archive.'

      - alert: HashChainBreak
        expr: increase(vigil_errors_total{code="AUDIT_HASH_CHAIN_BROKEN"}[5m]) > 0
        labels: { severity: critical }
        annotations:
          summary: 'FATAL: hash chain integrity violated'
          description: 'Stop all writes; investigate; restore from last-known-good.'

      - alert: PolygonAnchorFailing
        expr: increase(vigil_polygon_anchor_total{outcome="failed"}[1h]) > 5
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: 'Polygon anchor failing repeatedly'

      - alert: LlmCircuitOpen
        expr: increase(vigil_llm_calls_total{outcome="error"}[5m]) > 10
        labels: { severity: warning }
        annotations:
          summary: 'LLM circuit-breaker tripped — failing over to Bedrock'

      - alert: LlmCostCeiling
        expr: increase(vigil_llm_cost_usd_total[1d]) > 30
        labels: { severity: warning }
        annotations:
          summary: 'LLM daily soft-ceiling exceeded'

      - alert: LlmCostHardCeiling
        expr: increase(vigil_llm_cost_usd_total[1d]) > 100
        labels: { severity: critical }
        annotations:
          summary: 'LLM daily HARD ceiling — calls throttled'

      - alert: WorkerUnhealthy
        expr: up{job="vigil-workers"} == 0
        for: 5m
        labels: { severity: warning }

      - alert: ECEHigh
        expr: vigil_calibration_ece_overall > 0.10
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: 'Expected calibration error above alarm threshold'

      - alert: PyWorkerUnhealthy
        expr: up{job="vigil-py-workers"} == 0
        for: 5m
        labels: { severity: warning }

      - alert: SatelliteWorkerStarved
        expr: rate(vigil_satellite_scenes_total[1h]) == 0 and vigil_worker_inflight{worker="worker-satellite"} == 0
        for: 6h
        labels: { severity: info }
        annotations:
          summary: 'worker-satellite has processed no scenes in 6h'
          description: 'Either no vigil:satellite:request events arrived or the STAC API is unreachable.'

      - alert: ForensicsWorkerStarved
        expr: rate(vigil_forensics_documents_total[1h]) == 0 and vigil_worker_inflight{worker="worker-image-forensics"} == 0
        for: 6h
        labels: { severity: info }
        annotations:
          summary: 'worker-image-forensics has processed no documents in 6h'

      # Phase G — Fabric witness divergence. ANY non-zero increase is a
      # P0 incident — Postgres and Fabric disagree on at least one
      # audit row's body_hash. Same alert tier as HashChainBreak
      # because the consequence is identical.
      - alert: FabricWitnessDivergence
        expr: increase(vigil_errors_total{service="worker-fabric-bridge", code="AUDIT_HASH_CHAIN_BROKEN"}[5m]) > 0
        labels: { severity: critical }
        annotations:
          summary: 'FATAL: Fabric witness divergence — Postgres ↔ Fabric audit-row mismatch'
          description: 'worker-fabric-bridge reported a divergence; investigate immediately. See docs/incident-response/finding-leak.md (audit forensics) + RESTORE.md.'

      - alert: FabricBridgeBacklog
        expr: vigil_worker_inflight{worker="worker-fabric-bridge"} > 50
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: 'worker-fabric-bridge backlog growing; Fabric peer may be slow or unhealthy'

      # AUDIT-076 — generic per-worker stall alert. Fires when ANY
      # worker's consume-loop has not ticked in over an hour. Catches
      # worker-entity / worker-pattern / worker-score / worker-extractor
      # (and every future worker) without per-worker hand-crafting.
      # The metric is updated on every WorkerBase.loopReadGroup
      # iteration in packages/queue/src/worker.ts.
      - alert: WorkerLoopStalled
        expr: time() - vigil_worker_last_tick_seconds > 3600
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: 'Worker {{ $labels.worker }} consume-loop stalled (no tick in >1h)'
          description: "WorkerBase.loopReadGroup has not iterated for over an hour. The worker is likely stuck in a degraded state long before /healthz returns red. Investigate the worker's logs and Redis stream consumption."

      # Block-A reconciliation §5.b — Neo4j mirror-state visibility.
      # The worker-entity flips canonical rows to 'failed' after the
      # bounded retry budget is exhausted. Any row in 'failed' is an
      # operator-actionable mirror gap; the deferred reconcile worker
      # picks them up but pages oncall in the meantime.
      - alert: Neo4jMirrorFailedRows
        expr: vigil_neo4j_mirror_state_total{state="failed"} > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: 'entity.canonical rows with neo4j_mirror_state=failed (count: {{ $value }})'
          description: 'worker-entity exhausted its retry budget on at least one Neo4j mirror. The Postgres canonical row stands; the Neo4j twin is missing. Check worker-entity logs for `neo4j-mirror-failed`.'

      # Persistent backlog of canonicals waiting on Neo4j mirror.
      # 'pending' rows are normal between Postgres commit and Cypher
      # write; a sustained backlog indicates the Neo4j path is wedged.
      - alert: Neo4jMirrorPendingBacklog
        expr: vigil_neo4j_mirror_state_total{state="pending"} > 100
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: 'entity.canonical pending Neo4j mirror backlog ({{ $value }} rows for >30m)'
          description: 'Sustained pending-mirror backlog. Either Neo4j is unreachable or the worker-entity mirror retry path is throttled. Check Neo4j connectivity and worker-entity logs.'

      # Block-D D.3 / C3 — Tor onion service health.
      # scripts/sentinel-tor-check.ts runs hourly from the Hetzner
      # sentinel monitors and pushes vigil_tor_onion_up{target} to
      # the Prometheus pushgateway. Stale or zero values indicate
      # the .onion is unreachable from outside the host network —
      # affects /tip submissions (W-09) and any other public hidden
      # service. Spec: alert if down for > 30 min.
      - alert: TorOnionDown
        expr: vigil_tor_onion_up == 0
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: 'Tor hidden service "{{ $labels.target }}" unreachable for > 30 min'
          description: 'sentinel-tor-check reports vigil_tor_onion_up{target="{{ $labels.target }}"}=0. Possible causes: Tor daemon down on the host, hidden-service descriptor expired, ISP blocking Tor. Check vigil-tor container + tor logs; confirm hidden-service hostname matches TIP_ONION_HOSTNAME / VERIFY_ONION_HOSTNAME envs.'

      - alert: TorOnionStale
        # Pushgateway metric ages out as `vigil_tor_onion_up` stops
        # being refreshed. If the metric vanishes for > 2 h, the
        # sentinel-tor-check cron itself is the problem (the check
        # didn't fire), distinct from the onion being down.
        expr: absent(vigil_tor_onion_up)
        for: 2h
        labels: { severity: warning }
        annotations:
          summary: 'sentinel-tor-check has not pushed in > 2 h'
          description: 'No vigil_tor_onion_up metric in pushgateway for the last 2 hours — sentinel cron likely not firing. Check Hetzner sentinel monitor logs; verify the hourly cron is registered.'
