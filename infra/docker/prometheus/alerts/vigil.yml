groups:
  - name: vigil_apex
    interval: 30s
    rules:
      - alert: AdapterFailing
        expr: rate(vigil_adapter_runs_total{outcome="failed"}[10m]) > 0.5
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: 'Adapter {{ $labels.source }} failing'
          description: 'Source-website change suspected. Check first-contact archive.'

      - alert: HashChainBreak
        expr: increase(vigil_errors_total{code="AUDIT_HASH_CHAIN_BROKEN"}[5m]) > 0
        labels: { severity: critical }
        annotations:
          summary: 'FATAL: hash chain integrity violated'
          description: 'Stop all writes; investigate; restore from last-known-good.'

      - alert: PolygonAnchorFailing
        expr: increase(vigil_polygon_anchor_total{outcome="failed"}[1h]) > 5
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: 'Polygon anchor failing repeatedly'

      - alert: LlmCircuitOpen
        expr: increase(vigil_llm_calls_total{outcome="error"}[5m]) > 10
        labels: { severity: warning }
        annotations:
          summary: 'LLM circuit-breaker tripped — failing over to Bedrock'

      - alert: LlmCostCeiling
        expr: increase(vigil_llm_cost_usd_total[1d]) > 30
        labels: { severity: warning }
        annotations:
          summary: 'LLM daily soft-ceiling exceeded'

      - alert: LlmCostHardCeiling
        expr: increase(vigil_llm_cost_usd_total[1d]) > 100
        labels: { severity: critical }
        annotations:
          summary: 'LLM daily HARD ceiling — calls throttled'

      - alert: WorkerUnhealthy
        expr: up{job="vigil-workers"} == 0
        for: 5m
        labels: { severity: warning }

      - alert: ECEHigh
        expr: vigil_calibration_ece_overall > 0.10
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: 'Expected calibration error above alarm threshold'

      - alert: PyWorkerUnhealthy
        expr: up{job="vigil-py-workers"} == 0
        for: 5m
        labels: { severity: warning }

      - alert: SatelliteWorkerStarved
        expr: rate(vigil_satellite_scenes_total[1h]) == 0 and vigil_worker_inflight{worker="worker-satellite"} == 0
        for: 6h
        labels: { severity: info }
        annotations:
          summary: 'worker-satellite has processed no scenes in 6h'
          description: 'Either no vigil:satellite:request events arrived or the STAC API is unreachable.'

      - alert: ForensicsWorkerStarved
        expr: rate(vigil_forensics_documents_total[1h]) == 0 and vigil_worker_inflight{worker="worker-image-forensics"} == 0
        for: 6h
        labels: { severity: info }
        annotations:
          summary: 'worker-image-forensics has processed no documents in 6h'

      # Phase G — Fabric witness divergence. ANY non-zero increase is a
      # P0 incident — Postgres and Fabric disagree on at least one
      # audit row's body_hash. Same alert tier as HashChainBreak
      # because the consequence is identical.
      - alert: FabricWitnessDivergence
        expr: increase(vigil_errors_total{service="worker-fabric-bridge", code="AUDIT_HASH_CHAIN_BROKEN"}[5m]) > 0
        labels: { severity: critical }
        annotations:
          summary: 'FATAL: Fabric witness divergence — Postgres ↔ Fabric audit-row mismatch'
          description: 'worker-fabric-bridge reported a divergence; investigate immediately. See docs/incident-response/finding-leak.md (audit forensics) + RESTORE.md.'

      - alert: FabricBridgeBacklog
        expr: vigil_worker_inflight{worker="worker-fabric-bridge"} > 50
        for: 15m
        labels: { severity: warning }
        annotations:
          summary: 'worker-fabric-bridge backlog growing; Fabric peer may be slow or unhealthy'

      # AUDIT-076 — generic per-worker stall alert. Fires when ANY
      # worker's consume-loop has not ticked in over an hour. Catches
      # worker-entity / worker-pattern / worker-score / worker-extractor
      # (and every future worker) without per-worker hand-crafting.
      # The metric is updated on every WorkerBase.loopReadGroup
      # iteration in packages/queue/src/worker.ts.
      - alert: WorkerLoopStalled
        expr: time() - vigil_worker_last_tick_seconds > 3600
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: 'Worker {{ $labels.worker }} consume-loop stalled (no tick in >1h)'
          description: "WorkerBase.loopReadGroup has not iterated for over an hour. The worker is likely stuck in a degraded state long before /healthz returns red. Investigate the worker's logs and Redis stream consumption."

      # Block-A reconciliation §5.b — Neo4j mirror-state visibility.
      # The worker-entity flips canonical rows to 'failed' after the
      # bounded retry budget is exhausted. Any row in 'failed' is an
      # operator-actionable mirror gap; the deferred reconcile worker
      # picks them up but pages oncall in the meantime.
      - alert: Neo4jMirrorFailedRows
        expr: vigil_neo4j_mirror_state_total{state="failed"} > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: 'entity.canonical rows with neo4j_mirror_state=failed (count: {{ $value }})'
          description: 'worker-entity exhausted its retry budget on at least one Neo4j mirror. The Postgres canonical row stands; the Neo4j twin is missing. Check worker-entity logs for `neo4j-mirror-failed`.'

      # Persistent backlog of canonicals waiting on Neo4j mirror.
      # 'pending' rows are normal between Postgres commit and Cypher
      # write; a sustained backlog indicates the Neo4j path is wedged.
      - alert: Neo4jMirrorPendingBacklog
        expr: vigil_neo4j_mirror_state_total{state="pending"} > 100
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: 'entity.canonical pending Neo4j mirror backlog ({{ $value }} rows for >30m)'
          description: 'Sustained pending-mirror backlog. Either Neo4j is unreachable or the worker-entity mirror retry path is throttled. Check Neo4j connectivity and worker-entity logs.'

      # Block-D D.3 / C3 — Tor onion service health.
      # scripts/sentinel-tor-check.ts runs hourly from the Hetzner
      # sentinel monitors and pushes vigil_tor_onion_up{target} to
      # the Prometheus pushgateway. Stale or zero values indicate
      # the .onion is unreachable from outside the host network —
      # affects /tip submissions (W-09) and any other public hidden
      # service. Spec: alert if down for > 30 min.
      - alert: TorOnionDown
        expr: vigil_tor_onion_up == 0
        for: 30m
        labels: { severity: warning }
        annotations:
          summary: 'Tor hidden service "{{ $labels.target }}" unreachable for > 30 min'
          description: 'sentinel-tor-check reports vigil_tor_onion_up{target="{{ $labels.target }}"}=0. Possible causes: Tor daemon down on the host, hidden-service descriptor expired, ISP blocking Tor. Check vigil-tor container + tor logs; confirm hidden-service hostname matches TIP_ONION_HOSTNAME / VERIFY_ONION_HOSTNAME envs.'

      - alert: TorOnionStale
        # Pushgateway metric ages out as `vigil_tor_onion_up` stops
        # being refreshed. If the metric vanishes for > 2 h, the
        # sentinel-tor-check cron itself is the problem (the check
        # didn't fire), distinct from the onion being down.
        expr: absent(vigil_tor_onion_up)
        for: 2h
        labels: { severity: warning }
        annotations:
          summary: 'sentinel-tor-check has not pushed in > 2 h'
          description: 'No vigil_tor_onion_up metric in pushgateway for the last 2 hours — sentinel cron likely not firing. Check Hetzner sentinel monitor logs; verify the hourly cron is registered.'

      # Block-E E.11 / A5.4 — TAL-PA salt-collision alert.
      # The salt-collision-check trigger (apps/adapter-runner) runs the
      # morning after each quarterly export and queries the
      # `audit.public_export_salt_collisions` view. The gauge is set to
      # the row-count it observes; a non-zero value means a previous
      # quarter's salt was reused — a forgotten rotation. This makes
      # `actor_id_hash` rainbow-tableable across the affected periods.
      # Fires immediately when > 0 (no `for:` window): the operator
      # must rotate `AUDIT_PUBLIC_EXPORT_SALT` and re-export the
      # affected quarter(s) at the next cron tick.
      - alert: AuditSaltCollision
        expr: vigil_audit_salt_collisions_total > 0
        labels: { severity: critical }
        annotations:
          summary: 'TAL-PA quarterly export salt collision ({{ $value }} pair(s))'
          description: "audit.public_export_salt_collisions returned {{ $value }} row(s) — a prior quarter's `AUDIT_PUBLIC_EXPORT_SALT` was reused. actor_id_hash is rainbow-tableable across the affected periods. Action: (1) rotate AUDIT_PUBLIC_EXPORT_SALT to a fresh 32-byte hex; (2) re-run the quarterly export for the affected period(s); (3) audit-of-audit log a salt-rotation entry per docs/runbooks/audit-salt-rotation.md."

      # Block-E E.11 / A5.4 — companion alert: salt-collision-check did
      # not fire. The trigger runs quarterly (default 06:00 day-2 of
      # Jan / Apr / Jul / Oct Africa/Douala), so the gauge is set
      # exactly 4 times per year. If the metric is stale > 100 days,
      # the cron is the problem — distinct from a clean run.
      - alert: AuditSaltCollisionCheckStale
        expr: time() - timestamp(vigil_audit_salt_collisions_total) > 8640000
        for: 1h
        labels: { severity: warning }
        annotations:
          summary: 'salt-collision-check has not run in > 100 days'
          description: 'The vigil_audit_salt_collisions_total gauge has not been refreshed in over 100 days, but the check is scheduled quarterly. Either AUDIT_SALT_COLLISION_CHECK_ENABLED is false, the cron expression is invalid, or the adapter-runner did not boot. Check adapter-runner logs for `salt-collision-check-scheduled` at boot.'

      # Hardening mode 2.1 — Postgres pool saturation. The
      # `vigil_db_pool_waiting` gauge is populated by
      # `startPoolMetricsScraper()` in packages/db-postgres/src/client.ts.
      # Sustained > 10 waiters for 30 s means foreground requests are
      # queueing behind background work. Background callers using
      # `acquireWithPriority(pool, 'background')` will already be
      # rejecting with PoolSaturatedError at this point — this alert
      # surfaces the underlying pressure so the operator can either
      # scale `POSTGRES_POOL_MAX` or investigate the slow-query source.
      - alert: DbPoolSaturated
        expr: vigil_db_pool_waiting > 10
        for: 30s
        labels: { severity: warning }
        annotations:
          summary: 'Postgres pool saturated (waiting = {{ $value }})'
          description: 'vigil_db_pool_waiting has stayed > 10 for 30 s. Background workers are rejecting with PoolSaturatedError (mode 2.1). Investigate slow queries; consider increasing POSTGRES_POOL_MAX if the demand is legitimate.'

      # Hardening mode 6.2 — backup component status.
      # The vigil-backup script writes vigil_backup_component_status
      # via node_exporter's textfile collector. Per-component values:
      #   1 = ok, 0 = fail, -1 = skip (explicit operator-acknowledged
      #   skip, e.g. VAULT_BACKUP_TOKEN unset). The pre-initialised
      # value of 0 (fail) for every component means a partial-run
      # leaves the un-reached components flagged as fail.
      - alert: BackupComponentFailed
        expr: vigil_backup_component_status == 0
        for: 5m
        labels: { severity: critical }
        annotations:
          summary: 'Backup component {{ $labels.component }} failed'
          description: 'The most recent vigil-backup run reported {{ $labels.component }} = fail. Check backup logs under /var/log/vigil-backup/. Restore-ability is at risk for this component.'

      - alert: BackupComponentSkipped
        expr: vigil_backup_component_status == -1
        for: 24h
        labels: { severity: warning }
        annotations:
          summary: 'Backup component {{ $labels.component }} has been skipped for 24h+'
          description: 'The vigil-backup script is skipping {{ $labels.component }} (likely VAULT_BACKUP_TOKEN unset). Operator action required to restore full backup coverage. See docs/runbooks/backup.md.'

      # Companion: backup-not-run-recently. The script writes
      # vigil_backup_last_run_timestamp_seconds on every run; if the
      # nightly cron has stopped firing (cron failure, host down, timer
      # disabled), this alert surfaces the missing backup before the
      # operator notices via a recovery scenario.
      - alert: BackupNotRunRecently
        expr: time() - vigil_backup_last_run_timestamp_seconds > 86400 * 2
        for: 1h
        labels: { severity: critical }
        annotations:
          summary: 'vigil-backup has not run in > 48 hours'
          description: 'No backup completion observed in 48h. The nightly cron may have stopped firing; the host may be down; the timer may be disabled. Investigate and restore the schedule.'

      # Hardening mode 6.7 — NTP clock skew.
      # The ntp-check script (invoked every 5 min by systemd timer)
      # writes vigil_ntp_synced + vigil_ntp_offset_seconds via the
      # node_exporter textfile collector. Two alerts: sync flag
      # (catches lost-NTP outright) and absolute offset > 1 s
      # (catches drift even when the daemon claims sync).
      - alert: NtpClockNotSynced
        expr: vigil_ntp_synced == 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: 'NTP not synced on {{ $labels.host }}'
          description: 'systemd-timesyncd / chrony reports the local clock is NOT synchronised with an NTP source. Vault token TTL math + audit timestamps + dedup-window enforcement all rely on monotonic clock. Restore NTP before this cascades into downstream failures.'

      - alert: NtpClockSkew
        expr: abs(vigil_ntp_offset_seconds) > 1
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: 'NTP offset on {{ $labels.host }} is {{ $value }} seconds (> 1 s)'
          description: 'Local clock has drifted > 1 second from NTP. Even with synced=1, sustained drift indicates a struggling time source or network issue between this host and the configured NTP server.'

      # Hardening mode 6.6 — TLS certificate expiry monitoring.
      # The cert-expiry-check script (invoked hourly by systemd timer)
      # writes vigil_certificate_expiry_days_remaining via the
      # node_exporter textfile collector. We alert at 7 days
      # (operators have a week to investigate) and at 0 days
      # (emergency — cert is expired or expiring within hours).
      - alert: CertificateExpiringSoon
        expr: vigil_certificate_expiry_days_remaining < 7
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: 'Certificate {{ $labels.cert_name }} expires in {{ $value }} day(s)'
          description: 'TLS cert {{ $labels.cert_name }} has {{ $value }} days remaining. Renew before expiry. cert-manager / Vault PKI / age-plugin-yubikey paths each have their own rotation runbook.'

      - alert: CertificateExpiredOrExpiringWithinDay
        expr: vigil_certificate_expiry_days_remaining < 1
        labels: { severity: critical }
        annotations:
          summary: 'Certificate {{ $labels.cert_name }} expired or expires within 24h ({{ $value }} days)'
          description: 'EMERGENCY: TLS cert {{ $labels.cert_name }} is either expired or expires within 24 hours. Service outage imminent. Trigger the cert-rotation runbook immediately.'

      # Companion: the script itself stalled. The textfile collector
      # only knows what was last written; if the systemd timer fails
      # the gauge becomes stale-but-non-zero. Add a freshness signal
      # via the textfile mtime exporter (operator config) — this
      # alert assumes the freshness metric is exposed; if not, see
      # the runbook for manual checks.

      # Hardening mode 6.4 — LLM provider rate-limit exhaustion.
      # vigil_llm_rate_limit_exhausted_total fires when an LLM SDK's
      # internal 429 retry budget is exhausted (default 3 retries
      # for Anthropic). Sustained firing means the platform is being
      # throttled by the provider — distinct signal from "model
      # outage" or "auth error" so the operator can take the right
      # action (back off, upgrade quota, fail over to Bedrock).
      - alert: LlmRateLimitExhausted
        expr: rate(vigil_llm_rate_limit_exhausted_total[5m]) > 0.083
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: 'LLM provider {{ $labels.provider }} rate-limit exhaustion (model {{ $labels.model }})'
          description: 'vigil_llm_rate_limit_exhausted_total has fired > 5 times in 5 minutes (0.083 per second). The SDK retries 429 internally; sustained exhaustion means the platform is throttled. Investigate provider quota or fail over to a different tier.'

      # Hardening mode 1.5 — global retry-budget exhaustion.
      # RetryBudget.tryReserve() increments
      # vigil_retry_budget_exhausted_total when the per-window ceiling
      # is exceeded — that's the signal that a shared dependency
      # (Polygon, LLM provider, Fabric) is in trouble and workers
      # across the fleet are correctly backing off. Sustained
      # exhaustion is critical: it means the actual failure rate is
      # above the operator-configured ceiling.
      - alert: RetryBudgetExhausted
        expr: rate(vigil_retry_budget_exhausted_total[5m]) > 0
        for: 5m
        labels: { severity: warning }
        annotations:
          summary: 'Retry budget {{ $labels.name }} exhausted'
          description: 'vigil_retry_budget_exhausted_total{name="{{ $labels.name }}"} has fired for 5 minutes. The shared dependency under this budget is failing and the fleet is throttling its retries to avoid a cascade. Investigate the dependency (logs at the worker level will show the underlying error).'

      # Hardening mode 1.7 — startup-failure circuit breaker pressure.
      # StartupGuard.check() emits this counter when a worker has
      # tripped the failure ceiling within its window (defaults: 5
      # failures in 5 minutes). The counter fires once per trip; a
      # sustained rate indicates a worker that cannot start at all
      # (missing env, unreachable dependency, container image bug).
      - alert: WorkerStartupCrashLoop
        expr: rate(vigil_worker_startup_failures_total[5m]) > 0
        for: 1m
        labels: { severity: critical }
        annotations:
          summary: 'Worker {{ $labels.service }} is in a startup crash-loop'
          description: 'StartupGuard tripped — {{ $labels.service }} has failed to start at least 5 times in the last 5 minutes. The worker will sleep and exit with code 42 between attempts. Check logs for the root cause (missing env, Vault token, Postgres unavailable).'

      # Mode 2.1 companion — the pool-metrics scraper itself has stalled.
      # The scraper writes to `vigil_db_pool_total` every 5 s; if the
      # gauge isn't refreshed for > 60 s, either the worker that owns
      # the pool has died or `startPoolMetricsScraper()` was never called.
      - alert: DbPoolScraperStale
        expr: time() - timestamp(vigil_db_pool_total) > 60
        for: 2m
        labels: { severity: warning }
        annotations:
          summary: 'Postgres pool metrics scraper stalled'
          description: 'vigil_db_pool_total has not been refreshed in > 60 s. Either startPoolMetricsScraper was not invoked at worker init, or the owning process has died without firing the alert.'
