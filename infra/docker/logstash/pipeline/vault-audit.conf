# Logstash pipeline — Vault audit JSON → Postgres `audit.vault_log`.
#
# Phase E7 wiring. The table is created in migration 0003_audit_pipeline.sql
# (TODO E7b — separate migration). Schema:
#   audit.vault_log(id UUID PK, time TIMESTAMPTZ, type TEXT, auth JSONB,
#                   request JSONB, response JSONB, raw JSONB)
#
# We INSERT — no UPSERT; Vault audit records are append-only by design,
# Filebeat retries on connection drop, and the (time, type, auth.client_token)
# tuple is unique enough not to collide in practice. A duplicate event is
# preferable to a dropped one for compliance.

input {
  beats {
    port => 5044
  }
}

filter {
  if [vigil_source] != "vault-audit" {
    drop {}
  }

  # Materialise the Postgres-bound JSON columns
  ruby {
    code => '
      event.set("[@metadata][raw_json]", event.to_json)
    '
  }
}

output {
  jdbc {
    connection_string => "jdbc:postgresql://vigil-postgres:5432/vigil"
    username => "vigil"
    password => "${POSTGRES_PASSWORD}"
    driver_class => "org.postgresql.Driver"
    statement => [
      "INSERT INTO audit.vault_log (id, time, type, auth, request, response, raw)
         VALUES (gen_random_uuid(), ?::timestamptz, ?, ?::jsonb, ?::jsonb, ?::jsonb, ?::jsonb)",
      "%{[time]}",
      "%{[type]}",
      "%{[auth]}",
      "%{[request]}",
      "%{[response]}",
      "%{[@metadata][raw_json]}"
    ]
  }
}
