# VIGIL APEX redis.conf

bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 300

# Auth — ACL file rendered by the secret-init container at boot. The
# template at users.acl.template is interpolated with the password from
# /run/secrets/redis_password and written to /etc/redis/users.acl. Every
# client (workers, dashboard, minfi-api) AUTHs as `vigil_app` with the
# same password. The default user is disabled.
aclfile /etc/redis/users.acl

# Persistence — AOF + RDB; AOF for streams durability
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 900 1
save 300 10
save 60 10000

# Memory
maxmemory 6gb
# Streams + cache mix: don't evict LRU on streams (keys with prefix vigil:dedup:* are throwaway)
maxmemory-policy noeviction

# Logging
loglevel notice

# TLS — disabled on the internal network (mTLS at app layer instead)
