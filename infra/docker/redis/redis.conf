# VIGIL APEX redis.conf

bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 300

# Auth — password from secret file
requirepass-file /run/secrets/redis_password

# Persistence — AOF + RDB; AOF for streams durability
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 900 1
save 300 10
save 60 10000

# Memory
maxmemory 6gb
# Streams + cache mix: don't evict LRU on streams (keys with prefix vigil:dedup:* are throwaway)
maxmemory-policy noeviction

# Logging
loglevel notice

# TLS — disabled on the internal network (mTLS at app layer instead)
