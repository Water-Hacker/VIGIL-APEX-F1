# VIGIL APEX redis.conf

bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
timeout 300

# Auth — ACL file rendered by the secret-init container at boot. The
# template at users.acl.template is interpolated with the password from
# /run/secrets/redis_password and written to /etc/redis/users.acl. Every
# client (workers, dashboard, minfi-api) AUTHs as `vigil_app` with the
# same password. The default user is disabled.
aclfile /etc/redis/users.acl

# Persistence — AOF + RDB; AOF for streams durability
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

save 900 1
save 300 10
save 60 10000

# Memory
maxmemory 6gb
# Streams + cache mix: don't evict LRU on streams (keys with prefix vigil:dedup:* are throwaway)
maxmemory-policy noeviction

# Logging
loglevel notice

# TLS — disabled on the internal network (mTLS at app layer instead)

# ─────────────────────────────────────────────────────────────────────────────
# Replication — DL380 Gen11 cluster migration plan (§"Replication / quorum
# rules"). 1 primary on Node A + 2 replicas on Nodes B and C. Sentinel runs
# alongside on all 3 nodes (separate config at /etc/redis/sentinel.conf, see
# infra/docker/redis/sentinel.conf).
#
# On primary (Node A): the replicaof line is commented out.
# On replicas (Node B/C): the entrypoint replaces `# replicaof MASTER_HOST 6379`
# with `replicaof vigil-redis-a 6379` before starting redis-server. The
# entrypoint reads NODE_ROLE env var ('primary'|'replica') to choose.
# ─────────────────────────────────────────────────────────────────────────────
# replicaof MASTER_HOST 6379

# Authenticate to the primary using the same redis_password projected by Vault.
masterauth /run/secrets/redis_password
masteruser vigil_app

# Sentinel-aware durability: refuse writes if fewer than 1 replica is in sync
# within 10s. This converts a writer-only network partition into a graceful
# error rather than silent data loss when Sentinel later promotes a behind
# replica. Tune higher in Phase 3 when regional replicas join.
min-replicas-to-write 1
min-replicas-max-lag 10

# Replica behaviour
replica-read-only yes
replica-serve-stale-data yes
# Disable diskless sync — DL380 NVMe RAID-10 is fast enough for normal sync
# and diskless can starve the primary on large RDB transfers.
repl-diskless-sync no
repl-diskless-sync-delay 5
# Replication backlog: how much WAL Redis holds in memory so a briefly-
# disconnected replica can resume without a full RDB transfer. 256MB covers
# ~5 minutes of typical Streams traffic.
repl-backlog-size 256mb
repl-backlog-ttl 3600
