# Redis Sentinel — DL380 Gen11 cluster migration (§"Replication / quorum rules").
#
# One Sentinel instance runs on each of the 3 cluster nodes. Quorum = 2 of 3.
# Each Sentinel monitors the same Redis primary (vigil-redis-a:6379) and
# automatically promotes a replica to master when Sentinel quorum sees the
# primary fail.
#
# Failover SLO: < 30s for new master election + reconfigure clients.
#
# This file is templated by the entrypoint script — MASTER_NAME, MASTER_HOST,
# QUORUM, and the announce-ip values are set per-node from environment.

port 26379
bind 0.0.0.0
protected-mode no

# Auth against the monitored master (Redis password projected by Vault into
# /run/secrets/redis_password and read by the entrypoint).
sentinel auth-pass vigil-master /run/secrets/redis_password
sentinel auth-user vigil-master vigil_app

# Monitor the canonical master. Quorum 2 means at least 2 of the 3 Sentinels
# must agree the master is down before initiating failover. The entrypoint
# replaces MASTER_HOST with the IP of the current primary (resolved via DNS
# at boot — Sentinel updates this internally after failover).
sentinel monitor vigil-master MASTER_HOST 6379 2

# Down-after milliseconds: how long the master has to be unresponsive before
# Sentinel marks it +sdown (subjectively down). Quorum of +sdown promotes to
# +odown (objectively down) and triggers failover.
sentinel down-after-milliseconds vigil-master 5000

# Failover timeout: how long Sentinel waits for failover to complete before
# considering it failed and retrying. Keep ≥ 2x down-after.
sentinel failover-timeout vigil-master 30000

# Parallel-syncs: how many replicas Sentinel can reconfigure to the new master
# at the same time. 1 ensures we don't saturate the new master with RDB sync
# traffic from multiple replicas.
sentinel parallel-syncs vigil-master 1

# Resolve Sentinels by hostname (k3s DNS) rather than fixed IP — pods restart
# with new IPs but the same service name.
sentinel resolve-hostnames yes
sentinel announce-hostnames yes

# Per-node announce-ip is templated by the entrypoint. Sentinels gossip these
# so they can find each other after a restart.
sentinel announce-ip ANNOUNCE_IP
sentinel announce-port 26379

# Logging
loglevel notice
logfile ""

# Sentinel-level deny-scripts-reconfig is required by recent Redis versions
# to prevent CONFIG-rewrite drift across the 3 instances.
sentinel deny-scripts-reconfig yes
