# VIGIL APEX pg_hba.conf — restrictive by default.
# SRD §9.2.

# TYPE  DATABASE  USER          ADDRESS              METHOD

# Local socket (init scripts only)
local   all       all                                trust

# Internal Docker network — vigil only, scram-sha-256
host    vigil     vigil         172.20.0.0/16        scram-sha-256
host    keycloak  vigil         172.20.0.0/16        scram-sha-256

# Reject everything else — including 127.0.0.1 from outside the container
host    all       all           0.0.0.0/0            reject
host    all       all           ::/0                 reject
