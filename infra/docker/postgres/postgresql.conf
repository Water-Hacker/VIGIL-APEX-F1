# VIGIL APEX postgresql.conf — non-default values only.
# Per SRD §9.1.

listen_addresses = '*'
max_connections = 200

shared_buffers = 4GB
effective_cache_size = 12GB
work_mem = 32MB
maintenance_work_mem = 512MB

wal_level = replica
max_wal_senders = 4
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal-archive/%f && cp %p /var/lib/postgresql/wal-archive/%f'
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9

random_page_cost = 1.1
effective_io_concurrency = 200

# Logging — JSON-friendly
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 250ms
log_lock_waits = on
log_temp_files = 10MB
log_checkpoints = on
log_connections = on
log_disconnections = on
log_statement = 'ddl'

# Time / locale (containers' /etc/localtime is bind-mounted)
timezone = 'Africa/Douala'
log_timezone = 'Africa/Douala'

# Auth — SCRAM only
password_encryption = scram-sha-256

# Slow lock detection
deadlock_timeout = 1s

# Per-tenant isolation
row_security = on

# Statement timeout — emergency floor; per-session timeouts override
statement_timeout = 60s
idle_in_transaction_session_timeout = 60s
