# VIGIL APEX postgresql.conf — non-default values only.
# Per SRD §9.1.

listen_addresses = '*'
max_connections = 200

shared_buffers = 4GB
effective_cache_size = 12GB
work_mem = 32MB
maintenance_work_mem = 512MB

wal_level = replica
# Cluster migration (DL380 Gen11 plan, §"Replication / quorum rules"): 3-node
# Patroni cluster — 1 primary + 2 sync standbys. max_wal_senders bumped from 4
# to 10 to give pg_basebackup + replication + future pgbackrest enough slots.
# wal_keep_size guarantees a standby that lags briefly can catch up without
# triggering a full base-backup.
max_wal_senders = 10
max_replication_slots = 10
wal_keep_size = 8GB
wal_compression = lz4
hot_standby = on
hot_standby_feedback = on
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal-archive/%f && cp %p /var/lib/postgresql/wal-archive/%f'
checkpoint_timeout = 10min
checkpoint_completion_target = 0.9

# Synchronous replication. ANY 1 (b, c) tolerates 1 standby loss without
# blocking the primary; tolerates primary loss with Patroni-orchestrated
# promotion of whichever standby is current. The standby_names match the
# Patroni node names declared in infra/host-bootstrap/14-patroni-init.sh.
synchronous_commit = on
synchronous_standby_names = 'ANY 1 (vigil_postgres_b, vigil_postgres_c)'

random_page_cost = 1.1
effective_io_concurrency = 200

# Logging — JSON-friendly
log_destination = 'stderr'
logging_collector = off
log_min_duration_statement = 250ms
log_lock_waits = on
log_temp_files = 10MB
log_checkpoints = on
log_connections = on
log_disconnections = on
log_statement = 'ddl'

# Time / locale (containers' /etc/localtime is bind-mounted)
timezone = 'Africa/Douala'
log_timezone = 'Africa/Douala'

# Auth — SCRAM only
password_encryption = scram-sha-256

# Slow lock detection
deadlock_timeout = 1s

# Per-tenant isolation
row_security = on

# Statement timeout — emergency floor; per-session timeouts override
statement_timeout = 60s
idle_in_transaction_session_timeout = 60s
