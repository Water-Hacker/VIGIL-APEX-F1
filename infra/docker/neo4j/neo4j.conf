# VIGIL APEX neo4j.conf — Community Edition.

server.default_listen_address=0.0.0.0
server.default_advertised_address=vigil-neo4j

# HTTP off in prod; Bolt only.
server.http.enabled=true
server.http.listen_address=:7474
server.bolt.enabled=true
server.bolt.listen_address=:7687

# Memory — see container env for heap / pagecache values.
dbms.security.auth_enabled=true

# APOC procs are loaded at runtime; restrict the unsafe ones.
dbms.security.procedures.unrestricted=apoc.*

# Logging
dbms.logs.query.enabled=INFO
dbms.logs.query.threshold=500ms
dbms.logs.query.parameter_logging_enabled=true
