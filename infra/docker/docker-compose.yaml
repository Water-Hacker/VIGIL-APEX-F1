# VIGIL APEX — Phase 1 Pilot Stack
# Run from repo root with:
#   make compose-up
# Stop with:
#   make compose-down
#
# Pre-start:
#   1. Vault must be unsealed (vigil-vault-unseal.service on host)
#   2. WireGuard wg0 must be up (host -> N02)
#   3. /srv/vigil bind mounts must exist (Btrfs subvolumes)
#
# Per SRD §04. All resource caps + healthchecks set per §3.5/§3.7.

name: vigil-apex

# ============================================================================
# Networks — internal data plane + edge (only the dashboard reverse proxy
# touches the edge network)
# ============================================================================
networks:
  vigil-internal:
    driver: bridge
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16
          gateway: 172.20.0.1
  vigil-edge:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.21.0.0/24
          gateway: 172.21.0.1

# ============================================================================
# Volumes — bind mounts for stateful services (inspectable from host, included
# in Btrfs snapshots; SRD §3.8). Only transient caches use named volumes.
# ============================================================================
volumes:
  pg-cache:
    driver: local
  npm-cache:
    driver: local

# ============================================================================
# Secrets — Docker secrets, sourced from /run/vigil/secrets on the host. The
# host-bootstrap script seeds these from Vault at boot.
# ============================================================================
secrets:
  pg_password:
    file: /run/vigil/secrets/pg_password
  redis_password:
    file: /run/vigil/secrets/redis_password
  neo4j_password:
    file: /run/vigil/secrets/neo4j_password
  keycloak_admin:
    file: /run/vigil/secrets/keycloak_admin
  vault_token_worker:
    file: /run/vigil/secrets/vault_token_worker
  anthropic_api_key:
    file: /run/vigil/secrets/anthropic_api_key
  sentinelhub_client_id:
    file: /run/vigil/secrets/sentinelhub_client_id
  sentinelhub_client_secret:
    file: /run/vigil/secrets/sentinelhub_client_secret
  alertmanager_smtp_password:
    file: /run/vigil/secrets/alertmanager_smtp_password
  alertmanager_slack_webhook:
    file: /run/vigil/secrets/alertmanager_slack_webhook
  ipfs_cluster_secret:
    file: /run/vigil/secrets/ipfs_cluster_secret

# ============================================================================
# YAML anchors — common env + restart policy
# ============================================================================
x-common-env: &common-env
  TZ: Africa/Douala
  LANG: en_US.UTF-8
  NODE_ENV: production

x-restart-policy: &restart
  restart: unless-stopped

x-security: &security
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp:noexec,nosuid,size=64m

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "100m"
      max-file: "5"

services:

  # ==========================================================================
  # N00 — vigil-secret-init  (runs first; rest of the stack depends on it)
  # ==========================================================================
  # Materialises /run/vigil/secrets/* on the HOST from Vault before any
  # service that uses Docker secrets starts. Implemented as a one-shot
  # container that re-execs the host bootstrap script via a bind-mount —
  # keeps the Vault token path out of every service container.
  #
  # This compose service exists so `docker compose up` is self-contained:
  # if the operator forgot the systemd timer, the stack still refuses to
  # start until secrets are present rather than booting half-broken.
  vigil-secret-init:
    image: hashicorp/vault:1.17
    container_name: vigil-secret-init
    hostname: vigil-secret-init
    networks:
      vigil-internal: { ipv4_address: 172.20.0.5 }
    volumes:
      - /run/vigil/secrets:/run/vigil/secrets
      - ../host-bootstrap/05-secret-materialisation.sh:/bootstrap.sh:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      VAULT_ADDR: ${VAULT_ADDR:-https://vigil-vault:8200}
      VAULT_BIN: /bin/vault
      SECRET_ROOT: /run/vigil/secrets
      VAULT_TOKEN_FILE: /run/vigil/vault-init-token
    user: "0:0"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        if [ -f "$$VAULT_TOKEN_FILE" ]; then
          export VAULT_TOKEN="$$(cat $$VAULT_TOKEN_FILE)"
        fi
        # The script greps `vault status` to decide whether Vault is unsealed
        # and bails if not — exactly what we want from a compose dependency.
        apk add --no-cache bash >/dev/null
        bash /bootstrap.sh
    depends_on:
      vigil-vault: { condition: service_healthy }
    restart: "no"
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # N03 — vigil-postgres
  # ==========================================================================
  vigil-postgres:
    image: postgres:16.4-alpine
    container_name: vigil-postgres
    hostname: vigil-postgres
    <<: [*restart, *logging]
    networks:
      vigil-internal:
        ipv4_address: 172.20.0.10
    volumes:
      - /srv/vigil/postgres/data:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - /srv/vigil/postgres/wal-archive:/var/lib/postgresql/wal-archive
      - /etc/localtime:/etc/localtime:ro
    environment:
      <<: *common-env
      POSTGRES_DB: vigil
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=en_US.UTF-8 --auth=scram-sha-256"
    depends_on:
      vigil-secret-init: { condition: service_completed_successfully }
    secrets: [pg_password]
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    deploy:
      resources:
        limits: { memory: 16g, cpus: "4.0" }
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vigil -d vigil"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # N04 — vigil-neo4j
  # ==========================================================================
  vigil-neo4j:
    image: neo4j:5.23-community
    container_name: vigil-neo4j
    hostname: vigil-neo4j
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.11 }
    volumes:
      - /srv/vigil/neo4j/data:/data
      - /srv/vigil/neo4j/logs:/logs
      - /srv/vigil/neo4j/import:/var/lib/neo4j/import
      - /srv/vigil/neo4j/plugins:/plugins
      - ./neo4j/neo4j.conf:/conf/neo4j.conf:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      <<: *common-env
      NEO4J_AUTH_FILE: /run/secrets/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 16G
      NEO4J_server_memory_heap_max__size: 16G
      NEO4J_server_memory_pagecache_size: 14G
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    depends_on:
      vigil-secret-init: { condition: service_completed_successfully }
    secrets: [neo4j_password]
    deploy:
      resources:
        limits: { memory: 32g, cpus: "4.0" }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # N05 — vigil-redis
  # ==========================================================================
  vigil-redis:
    image: redis:7.4-alpine
    container_name: vigil-redis
    hostname: vigil-redis
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.12 }
    volumes:
      - /srv/vigil/redis/data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
      - ./redis/users.acl.template:/etc/redis/users.acl.template:ro
      - ./redis/redis-entrypoint.sh:/usr/local/bin/redis-entrypoint.sh:ro
      - /etc/localtime:/etc/localtime:ro
    entrypoint: ["/usr/local/bin/redis-entrypoint.sh"]
    command: ["/etc/redis/redis.conf"]
    depends_on:
      vigil-secret-init: { condition: service_completed_successfully }
    secrets: [redis_password]
    environment: *common-env
    deploy:
      resources:
        limits: { memory: 8g, cpus: "2.0" }
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$(cat /run/secrets/redis_password) ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # N06 — vigil-ipfs (Kubo)
  # ==========================================================================
  vigil-ipfs:
    image: ipfs/kubo:v0.30.0
    container_name: vigil-ipfs
    hostname: vigil-ipfs
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.13 }
    volumes:
      - /srv/vigil/ipfs/data:/data/ipfs
      - /srv/vigil/ipfs/staging:/export
      - ./ipfs/init.sh:/container-init.d/001-init.sh:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      <<: *common-env
      IPFS_PROFILE: server
    deploy:
      resources:
        limits: { memory: 8g, cpus: "2.0" }
    healthcheck:
      test: ["CMD-SHELL", "ipfs --api=/ip4/127.0.0.1/tcp/5001 id || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # vigil-ipfs-2 — second Kubo node for replication (Phase D8)
  # ==========================================================================
  # Two-node Kubo replication: every CID added by vigil-ipfs propagates
  # to vigil-ipfs-2 via the cluster service below. If either node fails
  # the other still serves /verify reads. Phase 2 will graduate this to
  # a 3+ node ipfs-cluster with per-CID replication factor 2.
  vigil-ipfs-2:
    image: ipfs/kubo:v0.30.0
    container_name: vigil-ipfs-2
    hostname: vigil-ipfs-2
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.14 }
    volumes:
      - /srv/vigil/ipfs2/data:/data/ipfs
      - /srv/vigil/ipfs2/staging:/export
      - ./ipfs/init.sh:/container-init.d/001-init.sh:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      <<: *common-env
      IPFS_PROFILE: server
    deploy:
      resources:
        limits: { memory: 8g, cpus: "2.0" }
    healthcheck:
      test: ["CMD-SHELL", "ipfs --api=/ip4/127.0.0.1/tcp/5001 id || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt: [ "no-new-privileges:true" ]

  # ipfs-cluster — coordinates pinning between vigil-ipfs + vigil-ipfs-2
  # so CIDs added by either node are pinned by both. Cluster secret comes
  # from /run/secrets/ipfs_cluster_secret (B1 materialisation).
  vigil-ipfs-cluster:
    image: ipfs/ipfs-cluster:v1.1.2
    container_name: vigil-ipfs-cluster
    hostname: vigil-ipfs-cluster
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.16 }
    volumes:
      - /srv/vigil/ipfs-cluster/data:/data/ipfs-cluster
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      vigil-ipfs:    { condition: service_healthy }
      vigil-ipfs-2:  { condition: service_healthy }
      vigil-secret-init: { condition: service_completed_successfully }
    environment:
      <<: *common-env
      CLUSTER_PEERNAME: vigil-cluster-1
      CLUSTER_SECRET_FILE: /run/secrets/ipfs_cluster_secret
      CLUSTER_IPFSHTTP_NODEMULTIADDRESS: /dns4/vigil-ipfs/tcp/5001
      CLUSTER_REPLICATION_FACTOR_MIN: "2"
      CLUSTER_REPLICATION_FACTOR_MAX: "2"
    deploy:
      resources:
        limits: { memory: 1g, cpus: "0.5" }
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # N08 — vigil-vault
  # ==========================================================================
  vigil-vault:
    image: hashicorp/vault:1.17.5
    container_name: vigil-vault
    hostname: vigil-vault
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.15 }
    cap_add: [IPC_LOCK]
    volumes:
      - /srv/vigil/vault/file:/vault/file
      - /srv/vigil/vault/logs:/vault/logs
      - ./vault/config.hcl:/vault/config/config.hcl:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      <<: *common-env
      VAULT_ADDR: http://0.0.0.0:8200
    command: ["vault", "server", "-config=/vault/config/config.hcl"]
    deploy:
      resources:
        limits: { memory: 2g, cpus: "1.0" }
    healthcheck:
      test: ["CMD-SHELL", "vault status -tls-skip-verify >/dev/null || [ $$? -eq 2 ] || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # N09 — vigil-keycloak (FIDO2-only realm; SRD §17.9)
  # ==========================================================================
  vigil-keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: vigil-keycloak
    hostname: vigil-keycloak
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.16 }
    depends_on:
      vigil-postgres: { condition: service_healthy }
    environment:
      <<: *common-env
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://vigil-postgres:5432/keycloak
      KC_DB_USERNAME: vigil
      KC_DB_PASSWORD_FILE: /run/secrets/pg_password
      KC_HOSTNAME: kc.vigilapex.cm
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD_FILE: /run/secrets/keycloak_admin
    volumes:
      - ./keycloak/realm-vigil.json:/opt/keycloak/data/import/realm-vigil.json:ro
    secrets: [pg_password, keycloak_admin]
    command: ["start", "--import-realm", "--optimized"]
    deploy:
      resources:
        limits: { memory: 4g, cpus: "1.0" }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 180s
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # N10 — vigil-dashboard (Next.js)
  # ==========================================================================
  vigil-dashboard:
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/Dashboard.Dockerfile
    image: vigil-apex/dashboard:0.1.0
    # Phase D7 — horizontal scaling. Caddy fans out across replicas via
    # service-name DNS round-robin (`vigil-dashboard:3000` resolves all
    # IPs). Static container_name + ipv4_address removed so Compose can
    # spawn N instances; replicas controlled via deploy.replicas.
    hostname: vigil-dashboard
    <<: [*restart, *logging]
    networks: [vigil-internal, vigil-edge]
    depends_on:
      vigil-postgres: { condition: service_healthy }
      vigil-redis:    { condition: service_healthy }
      vigil-vault:    { condition: service_healthy }
      vigil-keycloak: { condition: service_healthy }
    secrets: [pg_password, redis_password, vault_token_worker]
    environment:
      <<: *common-env
      POSTGRES_HOST: vigil-postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      REDIS_HOST: vigil-redis
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      VAULT_ADDR: http://vigil-vault:8200
      VAULT_TOKEN_FILE: /run/secrets/vault_token_worker
      KEYCLOAK_URL: http://vigil-keycloak:8080
      OTEL_SERVICE_NAME: vigil-dashboard
      PROMETHEUS_PORT: "9100"
      # Session store in Redis so requests can hit any replica.
      SESSION_STORE: redis
    deploy:
      replicas: 3
      resources:
        limits: { memory: 4g, cpus: "2.0" }
      update_config:
        parallelism: 1
        order: start-first
        failure_action: rollback
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    user: "1000:1000"
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # vigil-tor — Tor v3 hidden service for the tip portal (B7 / W-12)
  # ==========================================================================
  vigil-tor:
    image: dperson/torproxy:latest
    container_name: vigil-tor
    hostname: vigil-tor
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.30 }
    volumes:
      - ./tor/torrc:/etc/tor/torrc:ro
      - /srv/vigil/tor:/var/lib/tor
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      vigil-caddy: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 512m, cpus: "1.0" }
    healthcheck:
      test: ["CMD-SHELL", "test -s /var/lib/tor/vigil-tip/hostname"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # Caddy reverse proxy — terminates TLS + serves /verify, /tip, etc.
  # ==========================================================================
  vigil-caddy:
    build:
      context: ..
      dockerfile: docker/dockerfiles/Caddy.Dockerfile
    image: vigil-caddy:rl-2.8
    container_name: vigil-caddy
    hostname: vigil-caddy
    <<: [*restart, *logging]
    ports:
      - "80:80"
      - "443:443"
    networks:
      vigil-edge: { ipv4_address: 172.21.0.5 }
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /srv/vigil/caddy/data:/data
      - /srv/vigil/caddy/config:/config
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # Workers (entity, pattern, score, dossier, anchor, governance, document, tip-triage,
  # conac-sftp, minfi-api, adapter-repair) — share a single base image.
  # ==========================================================================
  worker-entity: &worker-base
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/Worker.Dockerfile
      args:
        WORKER_NAME: worker-entity
    image: vigil-apex/worker-entity:0.1.0
    container_name: worker-entity
    hostname: worker-entity
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.20 }
    depends_on:
      vigil-postgres: { condition: service_healthy }
      vigil-redis:    { condition: service_healthy }
      vigil-neo4j:    { condition: service_healthy }
      vigil-vault:    { condition: service_healthy }
    secrets: [pg_password, redis_password, neo4j_password, vault_token_worker, anthropic_api_key]
    environment: &worker-env
      <<: *common-env
      WORKER_NAME: worker-entity
      POSTGRES_HOST: vigil-postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      REDIS_HOST: vigil-redis
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      NEO4J_URI: bolt://vigil-neo4j:7687
      NEO4J_PASSWORD_FILE: /run/secrets/neo4j_password
      VAULT_ADDR: http://vigil-vault:8200
      VAULT_TOKEN_FILE: /run/secrets/vault_token_worker
      ANTHROPIC_API_KEY_FILE: /run/secrets/anthropic_api_key
      OTEL_SERVICE_NAME: worker-entity
      PROMETHEUS_PORT: "9100"
    deploy:
      resources:
        limits: { memory: 6g, cpus: "2.0" }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9100/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3
    user: "1000:1000"
    security_opt: [ "no-new-privileges:true" ]

  worker-pattern:
    <<: *worker-base
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/Worker.Dockerfile
      args: { WORKER_NAME: worker-pattern }
    image: vigil-apex/worker-pattern:0.1.0
    container_name: worker-pattern
    hostname: worker-pattern
    networks: { vigil-internal: { ipv4_address: 172.20.0.21 } }
    environment:
      <<: *worker-env
      WORKER_NAME: worker-pattern
      OTEL_SERVICE_NAME: worker-pattern

  worker-score:
    <<: *worker-base
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/Worker.Dockerfile
      args: { WORKER_NAME: worker-score }
    image: vigil-apex/worker-score:0.1.0
    container_name: worker-score
    hostname: worker-score
    networks: { vigil-internal: { ipv4_address: 172.20.0.22 } }
    environment:
      <<: *worker-env
      WORKER_NAME: worker-score
      OTEL_SERVICE_NAME: worker-score

  worker-dossier:
    <<: *worker-base
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/Worker.Dockerfile
      args: { WORKER_NAME: worker-dossier }
    image: vigil-apex/worker-dossier:0.1.0
    container_name: worker-dossier
    hostname: worker-dossier
    networks: { vigil-internal: { ipv4_address: 172.20.0.23 } }
    environment:
      <<: *worker-env
      WORKER_NAME: worker-dossier
      OTEL_SERVICE_NAME: worker-dossier

  worker-anchor:
    <<: *worker-base
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/Worker.Dockerfile
      args: { WORKER_NAME: worker-anchor }
    image: vigil-apex/worker-anchor:0.1.0
    container_name: worker-anchor
    hostname: worker-anchor
    networks: { vigil-internal: { ipv4_address: 172.20.0.24 } }
    volumes:
      - /run/vigil/polygon-signer.sock:/run/vigil/polygon-signer.sock
    environment:
      <<: *worker-env
      WORKER_NAME: worker-anchor
      OTEL_SERVICE_NAME: worker-anchor
      POLYGON_SIGNER_SOCKET: /run/vigil/polygon-signer.sock

  worker-governance:
    <<: *worker-base
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/Worker.Dockerfile
      args: { WORKER_NAME: worker-governance }
    image: vigil-apex/worker-governance:0.1.0
    container_name: worker-governance
    hostname: worker-governance
    networks: { vigil-internal: { ipv4_address: 172.20.0.25 } }
    environment:
      <<: *worker-env
      WORKER_NAME: worker-governance
      OTEL_SERVICE_NAME: worker-governance

  # ==========================================================================
  # Python workers (Ring 1.5 — satellite + image forensics)
  # ==========================================================================
  worker-satellite:
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/PythonWorker.Dockerfile
      args:
        APP_NAME: worker-satellite
        APP_MODULE: vigil_satellite.main
    image: vigil-apex/worker-satellite:0.1.0
    container_name: worker-satellite
    hostname: worker-satellite
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.40 }
    depends_on:
      vigil-postgres: { condition: service_healthy }
      vigil-redis:    { condition: service_healthy }
      vigil-vault:    { condition: service_healthy }
      vigil-ipfs:     { condition: service_healthy }
    secrets: [pg_password, redis_password, vault_token_worker, sentinelhub_client_id, sentinelhub_client_secret]
    environment:
      <<: *common-env
      WORKER_NAME: worker-satellite
      OTEL_SERVICE_NAME: worker-satellite
      POSTGRES_HOST: vigil-postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      REDIS_HOST: vigil-redis
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      VAULT_ADDR: http://vigil-vault:8200
      VAULT_TOKEN_FILE: /run/secrets/vault_token_worker
      IPFS_API_URL: http://vigil-ipfs:5001
      SENTINELHUB_CLIENT_ID_FILE: /run/secrets/sentinelhub_client_id
      SENTINELHUB_CLIENT_SECRET_FILE: /run/secrets/sentinelhub_client_secret
      STAC_CATALOG_URL: https://planetarycomputer.microsoft.com/api/stac/v1
      PROMETHEUS_PORT: "9100"
    deploy:
      resources:
        limits: { memory: 6g, cpus: "3.0" }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9100/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    user: "1000:1000"
    security_opt: [ "no-new-privileges:true" ]

  worker-image-forensics:
    build:
      context: ../..
      dockerfile: infra/docker/dockerfiles/PythonWorker.Dockerfile
      args:
        APP_NAME: worker-image-forensics
        APP_MODULE: vigil_forensics.main
        EXTRA_APT: "tesseract-ocr tesseract-ocr-fra tesseract-ocr-eng"
    image: vigil-apex/worker-image-forensics:0.1.0
    container_name: worker-image-forensics
    hostname: worker-image-forensics
    <<: [*restart, *logging]
    networks:
      vigil-internal: { ipv4_address: 172.20.0.41 }
    depends_on:
      vigil-postgres: { condition: service_healthy }
      vigil-redis:    { condition: service_healthy }
      vigil-vault:    { condition: service_healthy }
      vigil-ipfs:     { condition: service_healthy }
    secrets: [pg_password, redis_password, vault_token_worker]
    environment:
      <<: *common-env
      WORKER_NAME: worker-image-forensics
      OTEL_SERVICE_NAME: worker-image-forensics
      POSTGRES_HOST: vigil-postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
      REDIS_HOST: vigil-redis
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      VAULT_ADDR: http://vigil-vault:8200
      VAULT_TOKEN_FILE: /run/secrets/vault_token_worker
      IPFS_API_URL: http://vigil-ipfs:5001
      TESSERACT_DATA_PATH: /usr/share/tesseract-ocr/5/tessdata
      PROMETHEUS_PORT: "9100"
    deploy:
      resources:
        limits: { memory: 4g, cpus: "2.0" }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9100/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    user: "1000:1000"
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # Observability
  # ==========================================================================
  # ==========================================================================
  # vigil-alertmanager — Slack/email routing for the Phase E4 alert tree
  # ==========================================================================
  vigil-alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: vigil-alertmanager
    hostname: vigil-alertmanager
    <<: [*restart, *logging]
    networks: { vigil-internal: { ipv4_address: 172.20.0.32 } }
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /srv/vigil/alertmanager/data:/alertmanager
    secrets: [alertmanager_smtp_password, alertmanager_slack_webhook]
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
      - --web.external-url=https://alerts.vigilapex.cm
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.25" }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt: [ "no-new-privileges:true" ]

  # ==========================================================================
  # vigil-logstash — Vault audit JSON → Postgres audit.vault_log (Phase E7)
  # ==========================================================================
  vigil-logstash:
    image: docker.elastic.co/logstash/logstash:8.15.3
    container_name: vigil-logstash
    hostname: vigil-logstash
    <<: [*restart, *logging]
    networks: { vigil-internal: { ipv4_address: 172.20.0.33 } }
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - /srv/vigil/logstash/data:/usr/share/logstash/data
    secrets: [pg_password]
    environment:
      <<: *common-env
      LS_JAVA_OPTS: "-Xms256m -Xmx512m"
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_password
    command: >
      /bin/sh -c "
      export POSTGRES_PASSWORD=\"$$(cat /run/secrets/pg_password)\";
      exec /usr/share/logstash/bin/logstash"
    depends_on:
      vigil-postgres: { condition: service_healthy }
      vigil-secret-init: { condition: service_completed_successfully }
    deploy:
      resources:
        limits: { memory: 1g, cpus: "0.5" }
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9600/_node/stats || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    security_opt: [ "no-new-privileges:true" ]

  # vigil-filebeat — tails Vault's audit.log and ships to vigil-logstash.
  vigil-filebeat:
    image: docker.elastic.co/beats/filebeat:8.15.3
    container_name: vigil-filebeat
    hostname: vigil-filebeat
    <<: [*restart, *logging]
    networks: { vigil-internal: { ipv4_address: 172.20.0.34 } }
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /srv/vigil/vault/logs:/vault/logs:ro
      - /srv/vigil/filebeat/data:/usr/share/filebeat/data
    user: "0:0"
    depends_on:
      vigil-logstash: { condition: service_healthy }
    deploy:
      resources:
        limits: { memory: 256m, cpus: "0.25" }
    security_opt: [ "no-new-privileges:true" ]

  vigil-prometheus:
    image: prom/prometheus:v2.55.0
    container_name: vigil-prometheus
    hostname: vigil-prometheus
    <<: [*restart, *logging]
    networks: { vigil-internal: { ipv4_address: 172.20.0.30 } }
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts:/etc/prometheus/alerts:ro
      - /srv/vigil/prometheus/data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    deploy:
      resources:
        limits: { memory: 2g, cpus: "1.0" }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt: [ "no-new-privileges:true" ]

  vigil-grafana:
    image: grafana/grafana:11.2.2
    container_name: vigil-grafana
    hostname: vigil-grafana
    <<: [*restart, *logging]
    networks: { vigil-internal: { ipv4_address: 172.20.0.31 } }
    volumes:
      - /srv/vigil/grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      <<: *common-env
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/keycloak_admin
    secrets: [keycloak_admin]
    deploy:
      resources:
        limits: { memory: 1g, cpus: "1.0" }
    security_opt: [ "no-new-privileges:true" ]
