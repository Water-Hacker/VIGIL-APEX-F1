# Fabric channel configuration for VIGIL APEX (Phase G).
#
# 3-orderer Raft Phase-2-prep topology (DL380 Gen11 cluster migration plan,
# §"Replication / quorum rules"). One orderer per cluster node — tolerates
# loss of any 1 orderer. When CONAC and Cour des Comptes peers join at
# Phase 2 entry, this file gains two Organizations stanzas + their own
# AnchorPeers; chaincode and channel structure stay untouched.
#
# Channel name: `vigil-audit`. The chaincode `audit-witness` lives on
# this channel and only this channel. No other channels are defined.

Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: /var/hyperledger/fabric/msp/orderer
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - vigil-fabric-orderer-a:7050
      - vigil-fabric-orderer-b:7050
      - vigil-fabric-orderer-c:7050

  - &Org1
    Name: Org1MSP
    ID: Org1MSP
    MSPDir: /var/hyperledger/fabric/msp/org1
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('Org1MSP.admin', 'Org1MSP.peer', 'Org1MSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('Org1MSP.admin', 'Org1MSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('Org1MSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('Org1MSP.peer')"
    AnchorPeers:
      - Host: vigil-fabric-peer0-org1
        Port: 7051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_5: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: 'ANY Readers'
    Writers:
      Type: ImplicitMeta
      Rule: 'ANY Writers'
    Admins:
      Type: ImplicitMeta
      Rule: 'MAJORITY Admins'
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: 'MAJORITY Endorsement'
    Endorsement:
      Type: ImplicitMeta
      Rule: 'MAJORITY Endorsement'
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  EtcdRaft:
    Consenters:
      # 3-orderer Raft consenters — DL380 Gen11 cluster migration. Quorum 2,
      # tolerates loss of any 1 orderer. Each orderer's TLS cert lives under
      # its own MSP directory (separate keypair per consenter — required by
      # Raft so leader election can identify the peer).
      - Host: vigil-fabric-orderer-a
        Port: 7050
        ClientTLSCert: /var/hyperledger/fabric/tls/orderer-a/server.crt
        ServerTLSCert: /var/hyperledger/fabric/tls/orderer-a/server.crt
      - Host: vigil-fabric-orderer-b
        Port: 7050
        ClientTLSCert: /var/hyperledger/fabric/tls/orderer-b/server.crt
        ServerTLSCert: /var/hyperledger/fabric/tls/orderer-b/server.crt
      - Host: vigil-fabric-orderer-c
        Port: 7050
        ClientTLSCert: /var/hyperledger/fabric/tls/orderer-c/server.crt
        ServerTLSCert: /var/hyperledger/fabric/tls/orderer-c/server.crt
    Options:
      # Raft heartbeat / election: 500ms tick, 10-tick heartbeat, 100-tick
      # election timeout. Default values; tightening them risks false-positive
      # elections under sub-second network blips on a busy 25 GbE bond.
      TickInterval: 500ms
      ElectionTick: 10
      HeartbeatTick: 1
      MaxInflightBlocks: 5
      SnapshotIntervalSize: 16 MB
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: 'ANY Readers'
    Writers:
      Type: ImplicitMeta
      Rule: 'ANY Writers'
    Admins:
      Type: ImplicitMeta
      Rule: 'MAJORITY Admins'
    BlockValidation:
      Type: ImplicitMeta
      Rule: 'ANY Writers'

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: 'ANY Readers'
    Writers:
      Type: ImplicitMeta
      Rule: 'ANY Writers'
    Admins:
      Type: ImplicitMeta
      Rule: 'MAJORITY Admins'
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  VigilAuditGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities:
        <<: *OrdererCapabilities
    Consortiums:
      VigilConsortium:
        Organizations:
          - *Org1

  VigilAuditChannel:
    Consortium: VigilConsortium
    <<: *ChannelDefaults
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Org1
      Capabilities:
        <<: *ApplicationCapabilities
