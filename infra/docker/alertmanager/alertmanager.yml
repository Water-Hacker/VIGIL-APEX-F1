# VIGIL APEX AlertManager — routes (Phase E4).
#
# Severities:
#   - critical → architect + backup + Slack #ops-pager. PagerDuty escalation
#                after 5 min unacknowledged.
#   - warning  → Slack #ops only.
#   - info     → suppressed unless ECE / cost ceiling / adapter starvation.
#
# Receiver secrets are injected via env vars from /run/secrets at start;
# placeholders below are kept intentionally so the file is committable.
# AlertManager re-reads env via amtool reload after rotation.

global:
  resolve_timeout: 5m
  smtp_smarthost: ${SMTP_HOST}:587
  smtp_from: alertmanager@vigilapex.cm
  smtp_auth_username: ${SMTP_USER}
  smtp_auth_password_file: /run/secrets/alertmanager_smtp_password

route:
  receiver: default
  group_by: ['alertname', 'service', 'source']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers: [severity="critical"]
      receiver: pager
      group_wait: 0s
      repeat_interval: 30m
      continue: true
    - matchers: [severity=~"warning|info"]
      receiver: slack-ops
      continue: false

inhibit_rules:
  # If the entire chain is broken (HashChainBreak fires), suppress
  # downstream PolygonAnchorFailing alerts to avoid noise.
  - source_matchers: [alertname="HashChainBreak"]
    target_matchers: [alertname="PolygonAnchorFailing"]
    equal: ['service']

receivers:
  - name: default
    slack_configs:
      - api_url_file: /run/secrets/alertmanager_slack_webhook
        channel: '#ops'
        send_resolved: true

  - name: pager
    slack_configs:
      - api_url_file: /run/secrets/alertmanager_slack_webhook
        channel: '#ops-pager'
        send_resolved: true
        title: '[CRITICAL] {{ .CommonLabels.alertname }}'
        text: |-
          {{ range .Alerts }}
          *{{ .Labels.alertname }}* — {{ .Annotations.summary }}
          {{ .Annotations.description }}
          {{ end }}
    email_configs:
      - to: 'satoshinakamotobull@gmail.com,backup-architect@vigilapex.cm,council-technical@vigilapex.cm'
        send_resolved: true

  - name: slack-ops
    slack_configs:
      - api_url_file: /run/secrets/alertmanager_slack_webhook
        channel: '#ops'
        send_resolved: true
