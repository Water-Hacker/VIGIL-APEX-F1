[pytest]
minversion = 8.0
addopts =
  -ra
  --strict-markers
  --strict-config
  --tb=short
  --cov-report=term-missing
  --cov-fail-under=70
testpaths = apps/worker-satellite/tests apps/worker-image-forensics/tests
filterwarnings =
  error
  ignore::DeprecationWarning:rasterio.*
  ignore::DeprecationWarning:sentinelhub.*
markers =
  network: tests that hit a live network resource
  slow: tests that take > 5s
