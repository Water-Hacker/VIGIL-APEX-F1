// VIGIL APEX — Phase 3 federation stream protocol.
//
// Regional nodes (one per Cameroonian region) push signed event
// envelopes to the Yaoundé core over gRPC tunnelled through
// WireGuard. The core verifies each envelope's ed25519 signature
// against the per-region subordinate CA's federation-signer cert
// (provisioned by infra/host-bootstrap/13-vault-pki-federation.sh)
// before forwarding into ingestion.
//
// Trust model:
//   - PushEvents is client-streaming (regional → core only). The
//     core acks per batch, not per envelope, to keep WireGuard
//     hop overhead low.
//   - HealthBeacon is unary; called every 30 s by the regional
//     federation-agent. The reply carries the core's view of the
//     region's lag so the agent can self-throttle if needed.
//   - Cross-region issuance is denied at the Vault policy layer
//     (architect-region-pki); cross-region forwarding is denied
//     at the receiver (a key id whose region prefix does not match
//     the connection's mTLS-presented region cert is rejected).
//
// Wire stability: the .proto in this file is authoritative. Any
// change requires an architect decision in docs/decisions/log.md
// AND a rotation plan for the regional federation-agents (they
// must be stopped, the proto bumped, and restarted in lockstep
// with the core receiver).

syntax = "proto3";

package vigil.federation.v1;

option go_package    = "github.com/vigilapex/federation;federationv1";
option java_package  = "cm.vigilapex.federation.v1";

// -----------------------------------------------------------------------------
// Service
// -----------------------------------------------------------------------------

service FederationStream {
  // Regional → core. The agent opens one long-lived stream per
  // adapter source and pushes envelopes as they are produced. The
  // core flushes a PushAck after each batch (size or time
  // boundary, whichever first).
  rpc PushEvents (stream EventEnvelope) returns (PushAck);

  // Liveness + lag report. Core's reply tells the agent how far
  // behind the core is on this region's stream — agents use this
  // to drive backpressure when the core is overloaded.
  rpc HealthBeacon (HealthBeaconRequest) returns (HealthBeaconReply);
}

// -----------------------------------------------------------------------------
// Messages
// -----------------------------------------------------------------------------

// EventEnvelope — one event from a regional adapter, carried over
// the federation stream. Every field except `signature` and
// `signing_key_id` is signed; signing canonicalisation is defined
// in src/sign.ts (concat of length-prefixed UTF-8 fields in field
// number order, then ed25519 over the resulting buffer).
//
// Field semantics:
//   envelope_id   — UUIDv7 generated by the regional agent. The
//                   core's PushAck echoes this for at-least-once
//                   delivery semantics.
//   region        — uppercase 2-letter Cameroonian region code
//                   (CE, LT, NW, SW, OU, SU, ES, EN, NO, AD).
//                   Must match the prefix of `signing_key_id`.
//   source_id     — adapter source id (matches the existing
//                   apps/adapter-runner source registry).
//   dedup_key     — adapter-supplied; the core's ingestion
//                   pipeline uses this for per-source idempotency.
//   payload       — opaque adapter-emitted payload. The core does
//                   NOT parse this until after signature verify.
//   observed_at_ms — adapter's observation timestamp, ms since
//                    epoch UTC. Used for replay-window enforcement
//                    (default 24h forward, 7d backward).
//   signature     — ed25519 detached signature over canonical bytes.
//   signing_key_id — Vault PKI key id (region-prefix:rotation-seq).

message EventEnvelope {
  string envelope_id    = 1;
  string region         = 2;
  string source_id      = 3;
  string dedup_key      = 4;
  bytes  payload        = 5;
  int64  observed_at_ms = 6;
  bytes  signature      = 7;
  string signing_key_id = 8;
}

// PushAck — one ack per *batch*, not per envelope. Acked envelope
// IDs are listed; envelopes the receiver rejected (signature
// failure, replay-window violation, region mismatch) are listed
// in `rejected` with a code.
message PushAck {
  // Envelope ids the core accepted. Order is not significant.
  repeated string accepted = 1;
  // Envelope ids the core rejected, paired with reason.
  repeated RejectedEnvelope rejected = 2;
  // Core's wall clock at the time of ack, ms since epoch UTC.
  int64 acked_at_ms = 3;
}

message RejectedEnvelope {
  string envelope_id = 1;
  RejectionCode code = 2;
  // Optional human-readable detail; never include payload bytes.
  string detail = 3;
}

enum RejectionCode {
  REJECTION_UNSPECIFIED = 0;
  // Signature did not verify against the published cert for
  // signing_key_id.
  SIGNATURE_INVALID = 1;
  // signing_key_id's region prefix did not match envelope.region.
  REGION_MISMATCH = 2;
  // observed_at_ms was outside the configured replay window.
  REPLAY_WINDOW = 3;
  // signing_key_id was unknown to the core (key never registered
  // or was revoked via Vault PKI CRL).
  KEY_UNKNOWN = 4;
  // Adapter-supplied dedup_key collided with a different envelope
  // id within the dedup window — caller should drop and continue.
  DEDUP_COLLISION = 5;
  // payload exceeded the configured per-envelope size cap.
  PAYLOAD_TOO_LARGE = 6;
}

// HealthBeacon — unary. The agent calls every 30 s; the core
// replies with the most recent envelope_observed_at_ms it has
// processed for this region. Lag = now − that value.

message HealthBeaconRequest {
  string region            = 1;
  // Agent's local clock, ms since epoch UTC. The core compares
  // this against its own clock to detect drift.
  int64  agent_now_ms      = 2;
  // Total envelopes the agent has produced since process start.
  int64  agent_seq_total   = 3;
}

message HealthBeaconReply {
  // Highest observed_at_ms the core has accepted for this region.
  int64 last_observed_at_ms = 1;
  // Core's wall clock at reply, ms since epoch UTC.
  int64 core_now_ms          = 2;
  // If non-zero, the agent should slow its push rate by this many
  // milliseconds between envelopes (cooperative backpressure).
  int64 throttle_hint_ms     = 3;
}
