[project]
name = "vigil-common"
version = "0.1.0"
description = "Shared helpers for VIGIL APEX Python workers (logging, metrics, redis consumer base, postgres pool, vault, secrets, shutdown)."
requires-python = ">=3.12,<3.13"
license = { text = "UNLICENSED" }
authors = [{ name = "Junior Thuram Nana", email = "satoshinakamotobull@gmail.com" }]

dependencies = [
  "pydantic>=2.9.0,<3",
  "pydantic-settings>=2.5.0,<3",
  "structlog>=24.4.0,<25",
  "prometheus-client>=0.21.0,<1",
  "redis>=5.1.0,<6",
  "psycopg[binary,pool]>=3.2.0,<4",
  "httpx>=0.27.0,<1",
  "fastapi>=0.115.0,<1",
  "uvicorn[standard]>=0.30.0,<1",
  "hvac>=2.3.0,<3",                  # HashiCorp Vault client
  "tenacity>=9.0.0,<10",
]

[project.optional-dependencies]
test = [
  "pytest>=8.0,<9",
  "pytest-asyncio>=0.24.0,<1",
  "pytest-cov>=5.0.0,<6",
  "pytest-mock>=3.14.0,<4",
  "fakeredis>=2.24.0,<3",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
vigil_common = ["py.typed"]
