# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write

env:
  TURBO_TELEMETRY_DISABLED: 1
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  install:
    name: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 9.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Cache pnpm store
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  lint:
    name: lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint -- --max-warnings=0

  migration-locks:
    # Hardening mode 2.5 — reject CREATE INDEX against country-scale large
    # tables unless CONCURRENTLY is used OR the migration file carries an
    # acknowledged-locks marker. Without this gate, a future migration that
    # adds an index to finding.signal (10^7 rows) would block all writes
    # for the duration of the index build when applied in production.
    # See scripts/check-migration-locks.ts.
    name: migration-locks
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: enforce migration-lock discipline
        run: pnpm exec tsx scripts/check-migration-locks.ts

  compose-deps:
    # Hardening mode 1.3 — reject self-loops and cycles in the
    # docker-compose depends_on graph. Compose tolerates both at
    # runtime (silently ignoring them in some cases) which makes them
    # invisible failures of intent. See scripts/check-compose-deps.ts.
    name: compose-deps
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: enforce compose dependency-DAG acyclicity
        run: pnpm exec tsx scripts/check-compose-deps.ts

  helm-golden-drift:
    # Mode 9.1 Tier 2 — helm-template rendered diff against committed
    # golden manifests. Catches the case where someone edits a chart
    # template OR a values file in a way that materially changes the
    # rendered Kubernetes resources without explicitly re-rendering
    # the golden. Tier 1 (values-drift gate) catches the values-side
    # cases; this Tier 2 gate catches the template-side cases.
    #
    # Activation: skipped until the architect runs `scripts/render-
    # helm-golden.sh` (no --verify) once + commits the
    # `infra/k8s/charts/vigil-apex/golden/{dev,prod,cluster}.yaml`
    # files. The job's `if-no-golden` branch reports a notice and
    # exits 0.
    name: helm-golden-drift
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check whether golden manifests exist
        id: golden_present
        run: |
          if [ -f infra/k8s/charts/vigil-apex/golden/dev.yaml ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No golden manifests committed yet; mode 9.1 Tier 2 in pre-activation state. Run scripts/render-helm-golden.sh + commit infra/k8s/charts/vigil-apex/golden/ to activate this gate."
          fi
      - name: Install Helm (SHA-pinned action)
        if: steps.golden_present.outputs.present == 'true'
        uses: azure/setup-helm@b9e51907a09c216f16ebe8536097933489208112 # v4.3.0
        with:
          version: 'v3.16.2'
      - name: Verify rendered chart matches committed golden
        if: steps.golden_present.outputs.present == 'true'
        run: bash scripts/render-helm-golden.sh --verify

  scripts-tests:
    # Surface the 6 latent test files under scripts/__tests__/ that
    # had no test-runner picking them up. Pre-Cat-6 they existed as
    # documentation; this gate now runs them on every push + PR.
    # Coverage: cert-expiry-check, ntp-check, check-api-error-leaks,
    # check-compose-deps, check-migration-locks, check-rbac-coverage.
    name: scripts-tests
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Run scripts/__tests__/ via root vitest config
        # Invoked through @vigil/shared because pnpm `--filter` is the
        # required entry point for vitest from any package; the
        # `--config` flag points at the repo-root config which pins
        # `root: __dirname` so the include glob resolves to repo-root
        # `scripts/__tests__/`.
        run: pnpm --filter @vigil/shared exec vitest run --config $(pwd)/vitest.scripts.config.ts

  helm-values-drift:
    # Hardening mode 9.1 — Tier 1 config-drift gate for the Helm chart
    # values files. Asserts that values-prod.yaml pins images, sets
    # >= 2 replicas, sets resource limits, uses a non-staging cert
    # issuer, doesn't fall back to the kind/minikube `standard`
    # storage class, and is in worker + top-level-key parity with
    # values-dev.yaml. The orientation's "medium 1-3 days" closure
    # also includes a `helm template`-rendered diff against a
    # committed golden + an ArgoCD ApplicationSet; those are Phase
    # 12+ work. See scripts/check-helm-values-drift.ts.
    name: helm-values-drift
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: enforce values-prod.yaml drift discipline
        run: pnpm exec tsx scripts/check-helm-values-drift.ts

  api-error-leaks:
    # Hardening mode 4.9 — reject `message: String(err)` and
    # `message: err.message|stack` in API responses. These leak stack
    # traces / internal state to clients. See
    # scripts/check-api-error-leaks.ts.
    name: api-error-leaks
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: enforce no caught-error echo in API responses
        run: pnpm exec tsx scripts/check-api-error-leaks.ts

  migration-rollback:
    # Hardening modes 9.3 + 9.6 — round-trip rollback gate for the
    # hand-curated Drizzle migrations. Runs forward → reverse-order
    # down → forward against an ephemeral Postgres service. Catches
    # broken `*_down.sql` files (forgotten DROPs, bad SQL, dependency
    # violations) before they reach a dev who needs to roll back.
    # Prod rollback still uses PITR per docs/RESTORE.md; this gate
    # protects the dev-environment path that the `*_down.sql` headers
    # promise. See scripts/check-migration-rollback.ts.
    name: migration-rollback
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: postgres:16.2-alpine
        env:
          POSTGRES_USER: vigil
          POSTGRES_PASSWORD: vigil_test_password
          POSTGRES_DB: vigil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vigil -d vigil_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: forward → down → forward round-trip
        run: pnpm exec tsx scripts/check-migration-rollback.ts
        env:
          INTEGRATION_DB_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test

  typecheck:
    name: typecheck
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test:
    name: test
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16.2-alpine
        env:
          POSTGRES_USER: vigil
          POSTGRES_PASSWORD: vigil_test_password
          POSTGRES_DB: vigil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vigil -d vigil_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      # Apply drizzle migrations to the CI postgres so DB-gated integration
      # tests (e.g. audit-log CAS race) can run for real instead of skipping.
      - name: Apply DB migrations
        run: pnpm --filter @vigil/db-postgres run migrate
        env:
          POSTGRES_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
      # Workspace tests — every package's `test` script runs. Coverage
      # is collected only for packages that opt in via a `test:coverage`
      # script (currently @vigil/queue, @vigil/shared, @vigil/observability,
      # plus @vigil/patterns via the dedicated step below). The split
      # exists because most packages don't ship @vitest/coverage-v8 as a
      # dep — adding it everywhere is a separate workspace cleanup.
      - run: pnpm run test
        env:
          POSTGRES_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
          INTEGRATION_DB_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
          REDIS_URL: redis://localhost:6379
      - run: pnpm run test:coverage
        env:
          POSTGRES_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
          INTEGRATION_DB_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
          REDIS_URL: redis://localhost:6379
      # Block-B A5.4 — assert the audit-log CAS race test actually ran
      # (not silently skipped). The test is gated on INTEGRATION_DB_URL;
      # if a future change unsets that env or breaks the postgres service,
      # vitest skips the suite and the chain-integrity guarantee
      # disappears from CI without a red signal. This step re-runs the
      # CAS test with --reporter=verbose and greps for "rejects a stale
      # prior_event_id" — the test's own name. grep -q exits non-zero if
      # not found, failing the job.
      - name: audit-log CAS race regression must execute (not skip)
        run: |
          pnpm --filter @vigil/db-postgres exec vitest run audit-log-cas \
            --reporter=verbose 2>&1 | tee /tmp/cas-test.log
          grep -q "rejects a stale prior_event_id" /tmp/cas-test.log || {
            echo "FATAL: audit-log CAS test did not execute. Check INTEGRATION_DB_URL + postgres service health.";
            exit 1;
          }
          # Also assert it didn't skip (the check above passes on
          # describe.skipIf-skip output too, since vitest still prints
          # the test name with a SKIP marker). Reject any "skipped"
          # marker on the CAS suite line.
          if grep -E "audit-log per-actor CAS chain.*\(skipped\)|↓.*audit-log per-actor CAS chain" /tmp/cas-test.log; then
            echo "FATAL: audit-log CAS test was SKIPPED — INTEGRATION_DB_URL not exported to the test job.";
            exit 1;
          fi
        env:
          POSTGRES_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
          INTEGRATION_DB_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
      # Phase H5 — pattern coverage hard gate. Fails the job if the
      # @vigil/patterns suite drops under 80% lines/functions/statements
      # or 75% branches. The vitest config exits non-zero on threshold
      # breach; the run above already covers it, but we keep this
      # step explicit so the CI log clearly shows which package gated.
      - name: pattern coverage hard gate (≥80%)
        run: pnpm --filter @vigil/patterns test
      # DECISION-012 — pattern source ↔ fixture-test 1:1 coverage gate.
      - name: pattern fixture coverage gate
        # The hardcoded `node_modules/.pnpm/node_modules/.bin/tsx` path
        # was unreliable across pnpm versions (only populated under
        # specific hoisting configs). Use `pnpm exec tsx` now that tsx
        # is declared as a workspace-root devDependency (commit 94235d4)
        # — pnpm 9 symlinks it to `node_modules/.bin/tsx` reliably.
        run: pnpm exec tsx scripts/check-pattern-coverage.ts
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: coverage
          path: '**/coverage/**'
          if-no-files-found: ignore
          retention-days: 14

  build:
    name: build
    needs: [lint, typecheck]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  a11y:
    name: a11y (dashboard, public surfaces)
    needs: [install]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16.2-alpine
        env:
          POSTGRES_USER: vigil
          POSTGRES_PASSWORD: vigil_test_password
          POSTGRES_DB: vigil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vigil -d vigil_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      # `@playwright/test` is a devDep of apps/dashboard, not the
      # workspace root, so `pnpm exec` from root cannot find the
      # `playwright` CLI. Run via the dashboard filter so pnpm
      # resolves the binary from apps/dashboard/node_modules/.bin/.
      - run: pnpm --filter dashboard exec playwright install --with-deps chromium
      - run: pnpm run build
      - name: Apply DB migrations
        run: pnpm --filter @vigil/db-postgres run migrate
        env:
          POSTGRES_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
      - name: Run a11y suite
        # `playwright.config.ts` boots a Next dev server when CI=1.
        run: pnpm --filter dashboard exec playwright test tests/a11y/
        env:
          POSTGRES_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
          CI: '1'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: playwright-a11y-report
          path: apps/dashboard/playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  visual:
    name: visual regression (dashboard, public surfaces)
    needs: [install]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Self-protecting: skips gracefully (exit 0) until the architect
    # stamps baselines under
    # `apps/dashboard/tests/visual/public-surfaces.spec.ts-snapshots/`
    # against the canonical e2e-fixture stack — see
    # playwright-visual.config.ts header for the procedure. Once
    # baselines land, the `Check baselines` step's `if` flips on and
    # the job becomes hard-blocking against pixel diff > 0.1%.
    services:
      postgres:
        image: postgres:16.2-alpine
        env:
          POSTGRES_USER: vigil
          POSTGRES_PASSWORD: vigil_test_password
          POSTGRES_DB: vigil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vigil -d vigil_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Check baselines exist
        id: baselines
        run: |
          DIR="apps/dashboard/tests/visual/public-surfaces.spec.ts-snapshots"
          if [ -d "$DIR" ] && [ -n "$(ls -A "$DIR" 2>/dev/null)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
            echo "Baselines present in $DIR — visual regression will run."
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Visual-regression baselines not yet stamped (Block-E E.5 D7 pending architect-side run); skipping playwright + reporting OK."
          fi
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        if: steps.baselines.outputs.present == 'true'
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        if: steps.baselines.outputs.present == 'true'
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
        if: steps.baselines.outputs.present == 'true'
      - run: pnpm --filter dashboard exec playwright install --with-deps chromium
        if: steps.baselines.outputs.present == 'true'
      - run: pnpm run build
        if: steps.baselines.outputs.present == 'true'
      - name: Apply DB migrations
        if: steps.baselines.outputs.present == 'true'
        run: pnpm --filter @vigil/db-postgres run migrate
        env:
          POSTGRES_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
      - name: Run visual regression suite
        if: steps.baselines.outputs.present == 'true'
        run: pnpm --filter dashboard exec playwright test --config=playwright-visual.config.ts
        env:
          POSTGRES_URL: postgres://vigil:vigil_test_password@localhost:5432/vigil_test
          CI: '1'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always() && steps.baselines.outputs.present == 'true'
        with:
          name: playwright-visual-report
          path: apps/dashboard/playwright-visual-report/
          if-no-files-found: ignore
          retention-days: 7

  docker-build:
    name: docker-build
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - name: Build all images (no push)
        run: |
          docker buildx bake \
            --file infra/docker/docker-bake.hcl \
            --set '*.platform=linux/amd64' \
            --set '*.cache-from=type=gha' \
            --set '*.cache-to=type=gha,mode=max' \
            --load
        # Soft-gate retained for one cycle: the bake file now exists
        # (post-Phase-12a follow-up; 25 targets, parses + resolves
        # via `docker buildx bake --print`) but individual workers
        # may still fail to build until each app's TS build is
        # exercised end-to-end. The first CI run that completes the
        # bake successfully is the signal to flip this to a hard
        # gate. Tracked alongside the cosign-sign-images activation
        # in docs/runbooks/cosign-rollout.md.
        continue-on-error: true

  trivy-base-images:
    # Hardening modes 10.7 + 10.2(a) — base-image CVE gate.
    #
    # Scans every base image referenced by a Dockerfile under
    # `infra/docker/dockerfiles/` for HIGH + CRITICAL CVEs. Trivy pulls
    # each image, inventories its OS-package + library layer, and
    # cross-references against its CVE database. Hard fails on any HIGH
    # or CRITICAL finding — base-image compromise (mode 10.2) and CVE
    # drift (mode 10.7) close on this gate.
    #
    # The image list is enumerated dynamically by
    # `scripts/enumerate-base-images.ts` so adding a new Dockerfile
    # automatically extends the scan. Refresh procedure is documented in
    # `docs/runbooks/base-image-refresh.md` (mode 10.2(c)).
    #
    # Digest-pinning of FROM lines (mode 10.2(b)) is deferred to Phase 12
    # alongside the cosign chain (modes 9.8 + 9.9 + 10.8).
    name: trivy-base-images
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Enumerate base images from Dockerfiles
        id: enum
        run: |
          set -euo pipefail
          IMAGES=$(pnpm exec tsx scripts/enumerate-base-images.ts)
          {
            echo 'images<<EOF'
            echo "$IMAGES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Will scan:"
          echo "$IMAGES"
      # Mirrors the gitleaks install pattern from secret-scan.yml: pinned
      # version + sha256 checksum verify. Closes part of mode 10.3
      # (Compromised build tool) for the trivy binary surface. When
      # bumping the version, refresh BOTH the version string AND the
      # sha256 below; the new checksum is at
      # https://github.com/aquasecurity/trivy/releases/download/v$VERSION/trivy_${VERSION}_checksums.txt.
      - name: Install Trivy (sha256-verified)
        run: |
          set -euo pipefail
          TRIVY_VERSION=0.70.0
          TRIVY_SHA256=8b4376d5d6befe5c24d503f10ff136d9e0c49f9127a4279fd110b727929a5aa9
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
            -o /tmp/trivy.tar.gz
          echo "${TRIVY_SHA256}  /tmp/trivy.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/trivy.tar.gz -C /usr/local/bin trivy
          trivy --version
      - name: Trivy scan each base image (HIGH + CRITICAL hard gate)
        env:
          IMAGES: ${{ steps.enum.outputs.images }}
        run: |
          set -euo pipefail
          trivy --version
          FAIL=0
          # Iterate the enumerated list. `trivy image --exit-code 1`
          # returns non-zero ONLY when a finding at the requested
          # severity is present. Image-pull or scan-engine errors are
          # caught separately and treated as failures — a base image
          # we can't scan is a 10.2 signal worth surfacing.
          while IFS= read -r IMG; do
            [ -z "$IMG" ] && continue
            echo "::group::trivy image $IMG"
            # --vuln-type os scope: this gate's purpose is mode 10.2
            # (Compromised container base image), i.e. OS-layer CVEs in the
            # FROM image's distro packages. Application-binary findings
            # (caddy gobinary, playwright node-pkg) are the upstream
            # maintainer's responsibility — caddy releases a patched
            # binary, we pull the new tag. Our own npm/pip CVEs are
            # covered by Snyk + frozen-lockfile (modes 10.1, 10.4, 10.5).
            # The OS scope keeps this gate authoritative for what it can
            # remediate (bump the base image to a newer alpine/debian).
            if ! trivy image \
                --quiet \
                --severity HIGH,CRITICAL \
                --ignore-unfixed \
                --vuln-type os \
                --exit-code 1 \
                --format table \
                "$IMG"; then
              echo "::endgroup::"
              echo "::error::Trivy found HIGH or CRITICAL CVEs (or could not scan) in $IMG"
              FAIL=$((FAIL + 1))
            else
              echo "::endgroup::"
              echo "OK: $IMG"
            fi
          done <<< "$IMAGES"
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::Trivy gate failed for $FAIL image(s). See per-image groups above."
            exit 1
          fi
          echo "Trivy gate passed for all base images."
