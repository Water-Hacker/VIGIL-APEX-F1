# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: contract-test

on:
  push:
    paths:
      - 'contracts/**'
      - '.github/workflows/contract-test.yml'
  pull_request:
    paths:
      - 'contracts/**'

permissions:
  contents: read

jobs:
  hardhat:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - name: Compile
        run: pnpm --filter contracts run build
      - name: Test
        run: pnpm --filter contracts run test
      - name: Coverage
        run: pnpm --filter contracts run coverage
      - name: Gas report
        run: pnpm --filter contracts run gas
        env:
          REPORT_GAS: 'true'

  slither:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      # Slither shells out to Hardhat to discover the contract build,
      # so this job needs the same Node + pinned Hardhat that the
      # `hardhat` job above uses. Without setup-node + pnpm install,
      # slither would fall back to the runner's default Node (20.x)
      # and invoke `npx hardhat`, which pulls Hardhat 3.x — which
      # requires Node 22.13+ and fails.
      - uses: pnpm/action-setup@v4
        with: { version: 9.7.0 }
      - uses: actions/setup-node@v4
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install slither-analyzer solc-select
      - name: Pin solc 0.8.27 (matches contract pragma)
        run: |
          solc-select install 0.8.27
          solc-select use 0.8.27
      - name: Compile contracts (so slither finds the build artefacts)
        run: pnpm --filter contracts run build
      - name: Static analysis on contracts (gating)
        # Uses contracts/slither.config.json which suppresses OZ-internal
        # findings + documented false positives. Any new finding fails the job.
        # Baseline + reproduce instructions: docs/security/slither-baseline.md
        working-directory: contracts
        run: slither . --config-file slither.config.json --json ../slither-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-report
          path: slither-report.json
