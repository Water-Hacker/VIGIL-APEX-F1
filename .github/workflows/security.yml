# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: security

# E1, E5 from PHASE-1-COMPLETION.md.
#
# Runs:
#   - Snyk vulnerability scan (blocks on Critical, warns on High)
#   - SBOM generation via Syft (CycloneDX + SPDX) on every push to main
#   - SBOM uploaded as a release artefact + GitHub Dependency Submission
#
# The Snyk job runs only when SNYK_TOKEN is configured in repo secrets;
# without it the job is a no-op (SBOM still runs).

on:
  push:
    branches: [main]
    tags:
      - 'v*.*.*' # Block-E E.10: SBOM signed + attached to release
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 5 * * *' # daily at 05:23 UTC
  workflow_dispatch:

permissions:
  contents: write # required for release-asset upload (E.10)
  security-events: write
  pull-requests: read

env:
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  snyk:
    name: snyk
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # GitHub Actions does NOT expose `env` or `secrets` as named-values
    # in JOB-level `if:` expressions (only step-level conditions can read
    # `env`). The canonical pattern to skip a job when a secret is
    # missing is to hoist the secret into a job-level `env:` mapping
    # (where the `secrets.*` context IS valid because `env` mappings
    # are evaluated at job-resolution time, not at workflow parse) and
    # then gate each STEP on `env.SNYK_TOKEN != ''`. Cheap to read,
    # cheap to maintain, and avoids the workflow-parse error that the
    # prior `if: ${{ env.SNYK_TOKEN != '' }}` form raised at line 38
    # (fixed 2026-05-11).
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - if: env.SNYK_TOKEN != ''
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - if: env.SNYK_TOKEN != ''
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - if: env.SNYK_TOKEN != ''
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - if: env.SNYK_TOKEN != ''
        run: pnpm install --frozen-lockfile
      - name: Snyk monorepo open-source test
        if: env.SNYK_TOKEN != ''
        uses: snyk/actions/node@9cf6ca713d71123d2d229cc3d7f145b96ea3c518 # 2026-04-23 — track via Dependabot
        with:
          # `--all-projects` walks the workspace; severity threshold
          # blocks only Critical to keep the gate signal-rich (High +
          # below surface as warnings in the SARIF upload, per
          # OPERATIONS §4).
          # `--fail-on=upgradable` further narrows the block to findings
          # the architect can actually act on (an unfixable Critical is
          # an allowlist conversation, not a CI gate).
          # `--policy-path` consumes the architect-curated allowlist
          # under `.snyk-policy.yaml` (Block-E E.6); any rationale-
          # documented exception listed there is honoured by the gate.
          args: --all-projects --severity-threshold=critical --fail-on=upgradable --policy-path=.snyk-policy.yaml
      - name: Upload Snyk SARIF
        if: env.SNYK_TOKEN != '' && always()
        uses: github/codeql-action/upload-sarif@458d36d7d4f47d0dd16ca424c1d3cda0060f1360 # v3
        with:
          sarif_file: snyk.sarif
        continue-on-error: true

  sbom:
    name: sbom
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with: { version: 9.7.0 }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version-file: '.nvmrc', cache: 'pnpm' }
      - run: pnpm install --frozen-lockfile

      - name: Generate CycloneDX SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: vigil-apex.cdx.json
          dependency-snapshot: false

      - name: Generate SPDX SBOM (Syft)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          artifact-name: vigil-apex.spdx.json
          dependency-snapshot: false

      - name: Generate workspace dependency map
        run: pnpm tsx scripts/generate-sbom-summary.ts > vigil-apex.summary.json
        continue-on-error: true

      - name: Upload SBOMs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sboms
          path: |
            vigil-apex.cdx.json
            vigil-apex.spdx.json
            vigil-apex.summary.json
          retention-days: 90

      # ── Block-E E.10 / E5: release-time signing + attachment ───
      # Active only on tag-push events. The SBOMs above run on every
      # push / PR / schedule for visibility; only release tags (vN.N.N)
      # get the architect-signed deliverable. The signing key is the
      # architect's GPG signing subkey, exported via repo secret
      # GPG_SIGNING_KEY (ASCII-armored secret key); GPG_PASSPHRASE
      # unlocks it. Both secrets architect-provisioned per HSK-v1.
      # If either secret is absent, signing is skipped and the
      # release ships with unsigned SBOMs — which is wrong, so the
      # step fails the job to prevent a silent downgrade.
      - name: Import GPG signing key (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GPG_SIGNING_KEY: ${{ secrets.GPG_SIGNING_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${GPG_SIGNING_KEY}" ] || [ -z "${GPG_PASSPHRASE}" ]; then
            echo "::error::GPG_SIGNING_KEY / GPG_PASSPHRASE secrets must be set for tag-push SBOM signing (per BLOCK-E-PLAN §2.10 acceptance)."
            exit 1
          fi
          echo "${GPG_SIGNING_KEY}" | gpg --batch --import
          echo 'pinentry-mode loopback' >> ~/.gnupg/gpg.conf
          echo "use-agent" >> ~/.gnupg/gpg.conf

      - name: Sign SBOMs with architect's GPG key (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          for f in vigil-apex.cdx.json vigil-apex.spdx.json vigil-apex.summary.json; do
            if [ -f "$f" ]; then
              gpg --batch --yes --pinentry-mode loopback \
                --passphrase "${GPG_PASSPHRASE}" \
                --detach-sign --armor "$f"
              echo "signed $f → $f.asc"
            fi
          done

      - name: Attach signed SBOMs to GitHub release (release only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: |
            vigil-apex.cdx.json
            vigil-apex.cdx.json.asc
            vigil-apex.spdx.json
            vigil-apex.spdx.json.asc
            vigil-apex.summary.json
            vigil-apex.summary.json.asc
          fail_on_unmatched_files: false

  # ── Phase 12a / Modes 9.9 + 10.8: cosign sign container images ───
  #
  # Active only on tag-push events (matches the SBOM-signing job above).
  # The signing key (COSIGN_PRIVATE_KEY) + password (COSIGN_PASSWORD)
  # are architect-provisioned per docs/runbooks/cosign-key-rotation.md.
  # Both secrets are produced by `cosign generate-key-pair` and stored
  # in Vault; the architect copies them into repo secrets at first
  # release.
  #
  # ACTIVATION STATUS (2026-05-15): framework only. Steps are gated to
  # tag-push events; on every other event this job is a no-op (the
  # `if:` short-circuits before the cosign-install runs). On a real
  # tag-push, the step fails-loud if either COSIGN_PRIVATE_KEY or
  # COSIGN_PASSWORD is absent — mirroring the GPG_SIGNING_KEY pattern
  # above. Activation requires:
  #
  #   (1) Registry deployed at registry.vigilapex.local (Forgejo) so
  #       there's somewhere to push signed images. SRD §1253 declares
  #       this; deployment lands in Phase 12b.
  #   (2) `docker buildx bake` working end-to-end (currently
  #       continue-on-error: true in ci.yml's docker-build job
  #       because docker-bake.hcl is incomplete).
  #   (3) Architect runs the YubiKey-backed cosign key-gen ceremony
  #       per docs/runbooks/cosign-key-rotation.md and seeds the
  #       repo secrets.
  #
  # See docs/runbooks/cosign-rollout.md for the end-to-end activation
  # procedure.
  cosign-sign-images:
    name: cosign-sign-images
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [snyk, sbom]
    permissions:
      contents: read
      packages: write
      id-token: write # required for keyless / OIDC mode if we adopt later
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Validate cosign secrets present (release-gate)
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        run: |
          if [ -z "${COSIGN_PRIVATE_KEY}" ] || [ -z "${COSIGN_PASSWORD}" ]; then
            echo "::error::COSIGN_PRIVATE_KEY / COSIGN_PASSWORD secrets must be set for tag-push image signing (Phase 12a; see docs/runbooks/cosign-rollout.md)."
            exit 1
          fi
      # SHA-pinned per mode 10.3 discipline. sigstore/cosign-installer
      # v3.7.0 pulls a sha256-verified cosign binary from the cosign
      # release page (cosign verifies its own release SBOM, so this is
      # the canonical low-trust install path).
      - name: Install cosign (pinned)
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0
        with:
          cosign-release: 'v2.4.1'
      - name: Resolve image list to sign
        id: imagelist
        run: |
          set -euo pipefail
          # Enumerate the images we publish at release time. The list is
          # derived from infra/docker/dockerfiles/*.Dockerfile (one image
          # per worker dockerfile target). Future bake-rendered tags land
          # in this list once docker-bake.hcl is complete.
          IMAGES=$(pnpm exec tsx scripts/enumerate-publish-images.ts)
          {
            echo 'images<<EOF'
            echo "$IMAGES"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Will sign:"
          echo "$IMAGES"
      - name: Sign each image with cosign
        env:
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          IMAGES: ${{ steps.imagelist.outputs.images }}
        run: |
          set -euo pipefail
          # Write the key to a temp file (cosign expects --key file:...).
          KEY_FILE=$(mktemp)
          printf '%s' "${COSIGN_PRIVATE_KEY}" > "${KEY_FILE}"
          trap 'rm -f "${KEY_FILE}"' EXIT
          while IFS= read -r IMG; do
            [ -z "$IMG" ] && continue
            echo "::group::cosign sign $IMG"
            cosign sign --yes \
              --key "${KEY_FILE}" \
              "${IMG}"
            cosign verify \
              --key "${KEY_FILE}" \
              "${IMG}"
            echo "::endgroup::"
          done <<< "${IMAGES}"
