# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: secret-scan

# Block-D D.10 fix-up: replace gitleaks/gitleaks-action@v2 with a direct
# call to the gitleaks binary. The action requires a paid GITLEAKS_LICENSE
# secret for organisation repos (`Water-Hacker/VIGIL-APEX` is an org
# repo); without it the action fails fast (~6s) with what looks like a
# generic exit-code failure. The binary itself is MIT-licensed and free
# to run in CI; we get the same scan against the same content with the
# same `.gitleaks.toml` config, no third-party action dependency.
#
# Trufflehog stays as the second scanner (`--only-verified` mode) for
# defence in depth — a real verified-active credential trips both.

on:
  push:
  pull_request:
  schedule:
    - cron: '17 3 * * *' # daily at 03:17 UTC

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Install gitleaks (pinned + sha256-verified)
        # Pinned to v8.21.2 — recent + stable. When bumping, refresh the
        # version string here AND the sha256 below AND verify the
        # .gitleaks.toml config still parses against the new binary (the
        # project ran a clean scan against 8.21.x at Block-D D.10).
        #
        # The sha256 is from the upstream checksums file:
        # https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_checksums.txt
        # Mode 10.3 closure (Compromised build tool) requires the verify
        # — without it, a compromised release asset would land in CI as
        # the gitleaks binary.
        run: |
          set -euo pipefail
          GITLEAKS_VERSION=8.21.2
          GITLEAKS_SHA256=5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  /tmp/gitleaks.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/gitleaks.tar.gz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan full git history
        # `gitleaks detect` defaults to scanning all commits reachable
        # from HEAD. The repo's `.gitleaks.toml` is auto-detected at the
        # repo root (no --config flag needed). Default exit code on
        # findings is 1 → CI fails loud.
        run: |
          gitleaks detect \
            --redact \
            -v \
            --report-format sarif \
            --report-path results.sarif

      - name: Upload SARIF artifact (always — needed for triage on failure)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gitleaks-sarif
          path: results.sarif
          retention-days: 14

  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with: { fetch-depth: 0 }
      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@0fa069c12f0c7baf431041cd1e564a9c5058846c # 2026-04-23 — track via Dependabot
        with:
          path: ./
          base: ${{ github.event.before || github.event.pull_request.base.sha }}
          head: ${{ github.event.after || github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified
