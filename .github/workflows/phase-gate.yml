# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: phase-gate

# Per OPERATIONS.md §8 + EXEC §43.2 — refuses merge of Phase-N code that
# violates the precondition recorded in docs/decisions/log.md.

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Read current phase from decision log
        id: phase
        run: |
          # Extract `**Current phase: ...**` from docs/decisions/log.md
          phase=$(grep -E '^\*\*Current phase:' docs/decisions/log.md | head -1 | \
                  sed -E 's/.*Phase-([0-9]+).*/\1/' || echo "0")
          echo "current_phase=$phase" >> "$GITHUB_OUTPUT"
          echo "Current phase: $phase"

      - name: Verify dry-run decision (Phase 0+ requires GO)
        if: steps.phase.outputs.current_phase != 'pre-0'
        run: |
          if [ ! -f docs/decisions/DRY-RUN-DECISION.md ]; then
            echo "FATAL: DRY-RUN-DECISION.md missing; Phase 0 cannot proceed."
            exit 1
          fi
          status=$(grep -E '^\*\*Status:\s*' docs/decisions/DRY-RUN-DECISION.md | head -1 || true)
          if ! echo "$status" | grep -E 'GO\b|GO-with-note' >/dev/null; then
            echo "FATAL: DRY-RUN-DECISION status is not GO. Current: $status"
            exit 1
          fi
          echo "[gate] DRY-RUN-DECISION: GO ✔"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run scripts/check-decisions.ts (W-27 lint)
        # Implements OPERATIONS.md §7. Replaces the previous inline awk; the TS
        # lint understands DECISION block structure, the 7-day FINAL window, and
        # phase-reference validity.
        run: npx --yes tsx scripts/check-decisions.ts

      - name: Run scripts/audit-decision-log.ts (cross-link audit)
        # Verifies every markdown link, backtick file path, and DECISION-NNN
        # reference in the binding docs resolves to something on disk.
        run: npx --yes tsx scripts/audit-decision-log.ts

      - name: Run scripts/check-pattern-coverage.ts (1:1 src ↔ fixture)
        # Every pattern definition under packages/patterns/src/ must have a
        # paired fixture-test under packages/patterns/test/.
        run: npx --yes tsx scripts/check-pattern-coverage.ts
