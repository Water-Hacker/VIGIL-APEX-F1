# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: python-ci

on:
  push:
    paths:
      - 'apps/worker-satellite/**'
      - 'apps/worker-image-forensics/**'
      - 'packages/py-common/**'
      - 'ruff.toml'
      - 'mypy.ini'
      - 'pytest.ini'
      - '.github/workflows/python-ci.yml'
  pull_request:
    paths:
      - 'apps/worker-satellite/**'
      - 'apps/worker-image-forensics/**'
      - 'packages/py-common/**'

permissions:
  contents: read
  checks: write

jobs:
  py-lint-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: System deps for rasterio + opencv
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin libproj-dev libgeos-dev \
            libgl1 libglib2.0-0 libsm6 libxrender1 libxext6
      - name: pip install
        # Mode 10.3 — pin pip/wheel/setuptools to specific versions.
        # Floating `pip install --upgrade pip wheel setuptools` lets a
        # compromised PyPI mirror serve a malicious version and silently
        # ship it into the CI runner. When bumping, refresh ALL THREE
        # versions and verify against
        # https://pypi.org/project/{pip,wheel,setuptools}/.
        run: |
          python -m pip install --upgrade pip==25.2 wheel==0.45.1 setuptools==80.9.0
          pip install -e packages/py-common[test]
          pip install -e apps/worker-satellite[test]
          pip install -e apps/worker-image-forensics[test]
          pip install ruff mypy
      - name: Ruff lint + format check
        run: |
          ruff check packages/py-common apps/worker-satellite apps/worker-image-forensics
          ruff format --check packages/py-common apps/worker-satellite apps/worker-image-forensics
      - name: mypy --strict
        run: |
          mypy packages/py-common/src apps/worker-satellite/src apps/worker-image-forensics/src

  py-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin libproj-dev libgeos-dev \
            libgl1 libglib2.0-0 libsm6 libxrender1 libxext6
      - name: pip install
        # Mode 10.3 — pin pip/wheel/setuptools to specific versions.
        # Floating `pip install --upgrade pip wheel setuptools` lets a
        # compromised PyPI mirror serve a malicious version and silently
        # ship it into the CI runner. When bumping, refresh ALL THREE
        # versions and verify against
        # https://pypi.org/project/{pip,wheel,setuptools}/.
        run: |
          python -m pip install --upgrade pip==25.2 wheel==0.45.1 setuptools==80.9.0
          pip install -e packages/py-common[test]
          pip install -e apps/worker-satellite[test]
          pip install -e apps/worker-image-forensics[test]
      - name: pytest
        env:
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: |
          pytest --cov-fail-under=60 \
            --cov=vigil_common --cov=vigil_satellite --cov=vigil_forensics \
            apps/worker-satellite/tests apps/worker-image-forensics/tests
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: py-coverage
          path: '**/.coverage*'
          if-no-files-found: ignore
          retention-days: 14
