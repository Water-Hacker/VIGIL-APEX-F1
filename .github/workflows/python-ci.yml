# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: python-ci

on:
  push:
    paths:
      - 'apps/worker-satellite/**'
      - 'apps/worker-image-forensics/**'
      - 'packages/py-common/**'
      - 'ruff.toml'
      - 'mypy.ini'
      - 'pytest.ini'
      - '.github/workflows/python-ci.yml'
  pull_request:
    paths:
      - 'apps/worker-satellite/**'
      - 'apps/worker-image-forensics/**'
      - 'packages/py-common/**'

permissions:
  contents: read
  checks: write

jobs:
  py-lint-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: System deps for rasterio + opencv
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin libproj-dev libgeos-dev \
            libgl1 libglib2.0-0 libsm6 libxrender1 libxext6
      - name: pip install
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e packages/py-common[test]
          pip install -e apps/worker-satellite[test]
          pip install -e apps/worker-image-forensics[test]
          pip install ruff mypy
      - name: Ruff lint + format check
        run: |
          ruff check packages/py-common apps/worker-satellite apps/worker-image-forensics
          ruff format --check packages/py-common apps/worker-satellite apps/worker-image-forensics
      - name: mypy --strict
        run: |
          mypy packages/py-common/src apps/worker-satellite/src apps/worker-image-forensics/src

  py-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      redis:
        image: redis:7.2-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: System deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgdal-dev gdal-bin libproj-dev libgeos-dev \
            libgl1 libglib2.0-0 libsm6 libxrender1 libxext6
      - name: pip install
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -e packages/py-common[test]
          pip install -e apps/worker-satellite[test]
          pip install -e apps/worker-image-forensics[test]
      - name: pytest
        env:
          REDIS_HOST: localhost
          REDIS_PORT: '6379'
        run: |
          pytest --cov-fail-under=60 \
            --cov=vigil_common --cov=vigil_satellite --cov=vigil_forensics \
            apps/worker-satellite/tests apps/worker-image-forensics/tests
      - uses: actions/upload-artifact@v4
        with:
          name: py-coverage
          path: '**/.coverage*'
          if-no-files-found: ignore
          retention-days: 14
