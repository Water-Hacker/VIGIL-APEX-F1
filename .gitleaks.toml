# Gitleaks config — tuned for VIGIL APEX.
#
# We extend the default ruleset (Anthropic, AWS, GitHub PAT, Stripe, Slack,
# generic high-entropy) and add a consolidated allowlist for known-safe
# patterns in the test corpus, documentation, build artefacts, and the
# specific false-positive paths surfaced post-Block-D push.
#
# Schema note (2026-05-01): the top-level `[[allowlists]]` plural array
# does not apply correctly under gitleaks 8.21.2 (the workflow-pinned
# version) and behaves unreliably even under 8.24.3. The universally-
# supported form is the singular `[allowlist]` block, which we use here
# despite the documentation suggesting either is valid. Verified
# end-to-end against both versions: `no leaks found`.
#
# Trade-off vs the prior plural form: we lose per-block path-scoping
# (e.g. the synthetic-IPFS-CID regexes used to be active only under
# packages/llm/__tests__/). After consolidation, all regexes apply
# globally — but the patterns are specific enough (`bafyrealcid…`,
# `0x[a]{64}`, `PLACEHOLDER…`) that incidental matches outside test
# fixtures are extremely unlikely. Trufflehog --only-verified continues
# to run as a second scanner, catching real verified-active credentials
# regardless of allowlist behaviour.

title = "VIGIL APEX"

[extend]
useDefault = true

[allowlist]
description = "VIGIL APEX consolidated allowlist (paths + regexes; OR semantics)"

# === Path exclusions ===
# Files / paths where any gitleaks finding is suppressed:
#   - build artefacts and lockfiles (no secrets here, only generated)
#   - the EU sanctions adapter (single file, public download token)
#   - k8s ExternalSecret manifests (path identifiers, not values)
#   - Block-D status / runbook docs (descriptive prose quoting
#     secret-shaped strings inline as documented examples)
#   - .env.example (placeholder envs only; real values live in Vault)
paths = [
  # Build / cache / generated
  '''node_modules/.*''',
  '''.*\.lock$''',
  '''pnpm-lock\.yaml''',
  '''.*\.tsbuildinfo''',
  '''dist/.*''',
  '''build/.*''',
  '''.next/.*''',
  '''.turbo/.*''',
  '''graphify-out/.*''',
  # Block-D D.10 false-positive triage (post-push fix)
  '''apps/adapter-runner/src/adapters/eu-sanctions\.ts''',
  '''infra/k8s/charts/vigil-apex/templates/externalsecret-.*\.ya?ml''',
  # Helm-rendered goldens — produced by scripts/render-helm-golden.sh.
  # The rendered ExternalSecret manifests contain `remoteRef.key:
  # vigil/<path>` strings that gitleaks' generic-api-key heuristic
  # flags. These are Vault PATHS, not secret values — the actual
  # secret material never appears in rendered helm output by design.
  # Mode 9.1 Tier 2 closure activation; see the gate at
  # .github/workflows/ci.yml `helm-golden-drift`.
  '''infra/k8s/charts/vigil-apex/golden/.*\.ya?ml''',
  '''docs/work-program/PHASE-1-COMPLETION\.md''',
  '''docs/work-program/BLOCK-D-COMPLETION-SUMMARY\.md''',
  '''docs/runbooks/backup\.md''',
  '''\.env\.example''',
]

# === Regex exclusions ===
# Strings that, if they appear as the matched secret, are known-safe:
#   - synthetic IPFS CIDs from the anti-hallucination corpus
#   - test-fixture hex strings (deterministic 0x[a]{64} etc.)
#   - PLACEHOLDER markers used in templates
#   - architect / sample email contacts in docs
regexes = [
  # Synthetic IPFS CIDs (anti-hallucination corpus, packages/llm/__tests__/)
  '''bafyrealcid[a-z0-9]{30,}''',
  '''bafyfabricated[a-z0-9]+''',
  '''bafyspurious[a-z0-9]+''',
  '''bafyz{30,}''',
  # Test-fixture deterministic hex strings
  '''0x[a]{64}''',
  '''0x[b]{64}''',
  '''0x[c-f]{64}''',
  '''[a-f]{64}''',
  '''0x[a-fA-F0-9]{40}''',
  '''[0-9A-F]{40}''',
  # PLACEHOLDER markers
  '''PLACEHOLDER(_[A-Z_]+)?''',
  '''PLACEHOLDER_HIDDEN_SERVICE\.onion''',
  '''PLACEHOLDER_LIBSODIUM_BASE64''',
  '''PLACEHOLDER_DEPLOYED_AT_M[1-9]''',
  '''PLACEHOLDER_PROVISIONED_AT_M[1-9]''',
  # Architect / sample emails
  '''satoshinakamotobull@gmail\.com''',
  '''noreply@anthropic\.com''',
]
